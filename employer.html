<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Signup - Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(to right, #e0f7fa, #ffffff);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      border-radius: 1rem;
    }
    .form-control {
      border-radius: 0.5rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="card p-4 shadow-sm">
          <h3 class="text-center mb-3">Employer Sign Up</h3>

          <form id="signupForm">
            <div class="mb-3">
              <input type="text" class="form-control" id="employerName" placeholder="Full Name" required />
            </div>
            <div class="mb-3">
              <input type="email" class="form-control" id="employerEmail" placeholder="Email" required />
            </div>
            <div class="mb-3">
              <input type="password" class="form-control" id="employerPassword" placeholder="Password" required />
            </div>
            <button type="submit" class="btn btn-primary w-100" id="signupBtn">Create Account</button>

            <div class="text-center mt-3" id="signupStatus"></div>
          </form>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Scripts -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
  <script>
   const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};

    firebase.initializeApp(firebaseConfig);
  </script>

  <script>
    const form = document.getElementById("signupForm");
    const status = document.getElementById("signupStatus");
    const btn = document.getElementById("signupBtn");

    form.addEventListener("submit", function (e) {
      e.preventDefault();
      status.innerHTML = "";
      btn.disabled = true;
      btn.innerText = "Signing up...";

      const name = document.getElementById("employerName").value;
      const email = document.getElementById("employerEmail").value;
      const password = document.getElementById("employerPassword").value;

      firebase.auth().createUserWithEmailAndPassword(email, password)
        .then((userCredential) => {
          const user = userCredential.user;
          return firebase.firestore().collection("users").doc(user.uid).set({
            name: name,
            email: email,
            role: "employer",
            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
          });
        })
        .then(() => {
          status.innerHTML = "<div class='alert alert-success'>✅ Account created successfully. Redirecting...</div>";
          setTimeout(() => {
            window.location.href = "employer-dashboard.html";
          }, 1500);
        })
        .catch((error) => {
  if (error.code === "auth/email-already-in-use") {
    status.innerHTML = `
      <div class='alert alert-warning'>
        ⚠️ This email is already in use. <a href="employer-login.html">Login here</a>.
      </div>`;
  } else {
    status.innerHTML = `<div class='alert alert-danger'>❌ ${error.message}</div>`;
  }
});
    });
  </script>
</body>
</html>
