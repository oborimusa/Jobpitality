<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>View Profile - Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-light">
  <div class="container py-5">
    <div class="card">
      <div class="card-body">
        <h3 class="mb-4">👤 Profile Information</h3>
        <p><strong>Name:</strong> <span id="userName"></span></p>
        <p><strong>Email:</strong> <span id="userEmail"></span></p>
        <p><strong>Role:</strong> <span id="userRole"></span></p>
        <p><strong>Phone:</strong> <span id="userPhone"></span></p>
        <p><strong>Location:</strong> <span id="userLocation"></span></p>
        <a href="profile-edit.html" class="btn btn-primary mt-3">Edit Profile</a>
      </div>
    </div>
  </div>

  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }

      try {
        const doc = await db.collection("users").doc(user.uid).get();
        if (!doc.exists) {
          alert("User profile not found.");
          return;
        }

        const data = doc.data();
        document.getElementById("userName").textContent = data.name || "N/A";
        document.getElementById("userEmail").textContent = data.email || user.email;
        document.getElementById("userRole").textContent = data.role || "Not specified";
        document.getElementById("userPhone").textContent = data.phone || "N/A";
        document.getElementById("userLocation").textContent = data.location || "N/A";

      } catch (error) {
        console.error("Error loading profile:", error);
        alert("Failed to load profile.");
      }
    });
  </script>
</body>
</html>
