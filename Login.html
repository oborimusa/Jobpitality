<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>

<!-- Firebase Config and Login Script -->
<script>
  // Initialize Firebase
  const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};


  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();

  // Login Form Submission
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const rememberMe = document.getElementById('rememberMe').checked;
  const loginButton = document.getElementById('loginButton');
  const spinner = document.getElementById('loadingSpinner');
  const status = document.getElementById('loginStatus');

  if (!email || !password) {
    status.innerHTML = "<div class='alert alert-danger'>❌ Please fill all fields.</div>";
    return;
  }


     // ✅ Your try/catch block goes here:
  try {
    const persistence = rememberMe
      ? firebase.auth.Auth.Persistence.LOCAL
      : firebase.auth.Auth.Persistence.SESSION;

    await auth.setPersistence(persistence);
    const userCredential = await auth.signInWithEmailAndPassword(email, password);
    const user = userCredential.user;

  // 🔒 Email verification check
    if (!user.emailVerified) {
      spinner.style.display = "none";
      loginButton.disabled = false;
      loginButton.innerText = "Login";

      status.innerHTML = "<div class='alert alert-warning'>📩 Please verify your email before logging in.</div>";
      await auth.signOut();
      return;
    }

    // ✅ Login success
    status.innerHTML = "<div class='alert alert-success'>✅ Login successful! Redirecting...</div>";
    setTimeout(() => {
      if (email.toLowerCase() === 'superadmin@example.com') {
        window.location.href = 'admin-dashboard.html';
      } else {
        window.location.href = 'dashboard.html';
      }
    }, 1500);

  } catch (error) {
    spinner.style.display = "none";
    loginButton.disabled = false;
    loginButton.innerText = "Login";

    if (error.code === "auth/wrong-password" || error.code === "auth/user-not-found") {
      status.innerHTML = "<div class='alert alert-danger'>❌ Invalid email or password.</div>";
    } else {
      status.innerHTML = `<div class='alert alert-danger'>❌ ${error.message}</div>`;
    }
  }
});
  // Forgot Password Handler
  document.getElementById("forgotPasswordLink").addEventListener("click", function (e) {
    e.preventDefault();
    const email = document.getElementById("loginEmail").value.trim();

    if (!email) {
      alert("⚠️ Please enter your email first.");
      return;
    }

    firebase.auth().sendPasswordResetEmail(email)
      .then(() => {
        alert("📧 Password reset email sent to " + email);
      })
      .catch((error) => {
        alert("❌ " + error.message);
      });
  });
</script>
