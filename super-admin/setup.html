<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Super Admin | Jobpitality</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d1b2a, #1b263b);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .setup-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        .logo { font-size: 3rem; color: #ff9e00; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #666; margin-bottom: 1.5rem; }
        .credentials {
            background: #f5f5f5;
            padding: 1rem;
            border-radius: 12px;
            text-align: left;
            margin: 1.5rem 0;
        }
        .credentials p { margin-bottom: 0.5rem; }
        .credentials code {
            background: #e2e8f0;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            font-family: monospace;
        }
        button {
            background: #ff9e00;
            color: #0d1b2a;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
        }
        button:hover { background: #cc7e00; }
        .success { background: #10b981; color: white; margin-top: 1rem; display: none; }
        .success.show { display: block; }
    </style>
</head>
<body>
    <div class="setup-card">
        <div class="logo">⚡</div>
        <h1>Super Admin Setup</h1>
        <p>Create the first administrator account for Jobpitality</p>
        
        <div id="credentials" class="credentials" style="display: none;">
            <p><strong>✅ Admin Account Created!</strong></p>
            <p>📧 Email: <code>admin@jobpitality.com</code></p>
            <p>🔑 Password: <code>Admin@123</code></p>
            <p><a href="/super-admin/login.html" style="color: #ff9e00;">Click here to login →</a></p>
        </div>
        
        <button id="createBtn">Create Super Admin Account</button>
        <div id="successMsg" class="success"></div>
    </div>

    <script>
        document.getElementById('createBtn').addEventListener('click', () => {
            const superAdmin = {
                id: 'admin_' + Date.now(),
                name: 'Super Admin',
                email: 'admin@jobpitality.com',
                password: 'Admin@123',
                role: 'super_admin',
                type: 'admin',
                createdAt: new Date().toISOString()
            };
            
            localStorage.setItem('jobpitality_admin', JSON.stringify(superAdmin));
            
            document.getElementById('credentials').style.display = 'block';
            document.getElementById('createBtn').style.display = 'none';
            document.getElementById('successMsg').innerHTML = '✅ Super Admin created successfully!';
            document.getElementById('successMsg').classList.add('show');
        });
    </script>
</body>
</html>
