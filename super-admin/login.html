<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Admin Login | Jobpitality</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1b263b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
        }
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        .logo i {
            font-size: 3rem;
            color: #ff9e00;
        }
        .logo h1 {
            font-size: 1.75rem;
            margin-top: 0.5rem;
            color: #0d1b2a;
        }
        .logo p {
            color: #6c757d;
            font-size: 0.875rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #2d3748;
        }
        .form-group input {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: #ff9e00;
            box-shadow: 0 0 0 3px rgba(255,158,0,0.1);
        }
        .btn-login {
            width: 100%;
            padding: 0.875rem;
            background: #ff9e00;
            color: #0d1b2a;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #cc7e00;
            transform: translateY(-2px);
        }
        .error-msg {
            background: #fee2e2;
            color: #dc2626;
            padding: 0.75rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            display: none;
        }
        .back-link {
            text-align: center;
            margin-top: 1.5rem;
        }
        .back-link a {
            color: #ff9e00;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <h1>Super Admin</h1>
                <p>Jobpitality Platform Management</p>
            </div>
            <div id="errorMsg" class="error-msg"></div>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="adminEmail" placeholder="admin@jobpitality.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="adminPassword" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-login">Sign In</button>
                <!-- Add this button after the login form -->
<button onclick="createAdminAccount()" style="margin-top: 1rem; background: #10b981; color: white; border: none; padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;">
    Create Admin Account (First Time)
</button>

<script>
function createAdminAccount() {
    const superAdmin = {
        id: 'admin_' + Date.now(),
        name: 'Super Admin',
        email: 'admin@jobpitality.com',
        password: 'Admin@123',
        role: 'super_admin',
        type: 'admin',
        createdAt: new Date().toISOString()
    };
    localStorage.setItem('jobpitality_admin', JSON.stringify(superAdmin));
    alert('Super Admin created!\nEmail: admin@jobpitality.com\nPassword: Admin@123');
}
</script>
            </form>
            
            <div class="back-link">
                <a href="/">← Back to Home</a>
            </div>
        </div>
    </div>
    

    <script>
        // Super admin credentials (in production, this should be in Firebase)
        const SUPER_ADMIN = {
            email: "admin@jobpitality.com",
            password: "Admin@123",
            name: "Super Admin",
            role: "super_admin"
        };

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorMsg = document.getElementById('errorMsg');

            if (email === SUPER_ADMIN.email && password === SUPER_ADMIN.password) {
                // Store admin session
                const adminSession = {
                    email: SUPER_ADMIN.email,
                    name: SUPER_ADMIN.name,
                    role: SUPER_ADMIN.role,
                    loggedInAt: new Date().toISOString()
                };
                localStorage.setItem('jobpitality_admin', JSON.stringify(adminSession));
                window.location.href = '/super-admin/index.html';
            } else {
                errorMsg.textContent = 'Invalid email or password';
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 3000);
            }
        });
    </script>
</body>
</html>
