<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Profile – Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <style>
    .profile-img {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
    }
    .tab-content {
      padding-top: 20px;
    }
  </style>
</head>
<body class="bg-light">

<div class="container py-5">
  <div class="card shadow">
    <div class="card-body">
      <div class="text-center">
        <img id="profileImage" src="img/default-avatar.png" alt="Profile Image" class="profile-img mb-3">
        <h4 id="profileName">Loading...</h4>
        <p id="profileEmail" class="text-muted">...</p>
        <div>
          <a href="profile-edit.html" class="btn btn-sm btn-outline-primary">Edit Profile</a>
          <button onclick="window.print()" class="btn btn-sm btn-outline-secondary">Print</button>
          <button id="downloadBtn" class="btn btn-sm btn-outline-success">Download</button>
        </div>
      </div>

      <!-- Tabs -->
      <ul class="nav nav-tabs mt-4" id="profileTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#aboutTab" type="button" role="tab">About</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#jobsTab" type="button" role="tab">Jobs Posted</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" data-bs-toggle="tab" data-bs-target="#applicationsTab" type="button" role="tab">Applications</button>
        </li>
      </ul>

      <div class="tab-content">
        <div class="tab-pane fade show active" id="aboutTab" role="tabpanel">
          <p id="aboutText" class="mt-3">Loading profile details...</p>
        </div>
        <div class="tab-pane fade" id="jobsTab" role="tabpanel">
          <ul id="jobList" class="mt-3 list-group"></ul>
        </div>
        <div class="tab-pane fade" id="applicationsTab" role="tabpanel">
          <ul id="applicationList" class="mt-3 list-group"></ul>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};


  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(async user => {
    if (!user) return window.location.href = "login.html";

    const uid = user.uid;
    const userDoc = await db.collection("users").doc(uid).get();
    const data = userDoc.data();

    document.getElementById("profileName").textContent = data.name || "User";
    document.getElementById("profileEmail").textContent = data.email || user.email;
    document.getElementById("aboutText").textContent = data.about || "No bio added yet.";
    document.getElementById("profileImage").src = data.photoURL || "img/default-avatar.png";

    // Optional: Show jobs posted or applications
    if (data.role === "employer") {
      const jobs = await db.collection("jobPostings").where("postedBy", "==", uid).get();
      jobs.forEach(doc => {
        const li = document.createElement("li");
        li.classList.add("list-group-item");
        li.textContent = doc.data().title;
        document.getElementById("jobList").appendChild(li);
      });
    } else {
      const apps = await db.collection("applications").where("userId", "==", uid).get();
      apps.forEach(doc => {
        const li = document.createElement("li");
        li.classList.add("list-group-item");
        li.textContent = doc.data().jobTitle;
        document.getElementById("applicationList").appendChild(li);
      });
    }
  });

  // Download profile section as HTML
  document.getElementById("downloadBtn").addEventListener("click", () => {
    const element = document.body;
    const blob = new Blob([element.innerHTML], {type: "text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "jobpitality-profile.html";
    a.click();
    URL.revokeObjectURL(url);
  });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
