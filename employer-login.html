<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Employer Login – Jobspitality</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="container py-5">
    <h2 class="text-center mb-4">Employer Login</h2>
    <form id="loginForm" class="mx-auto" style="max-width: 500px;">
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" required />
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" required />
      </div>
      <button type="submit" class="btn btn-primary w-100">Log In</button>
    </form>
    
    <p class="text-center mt-3">
  <a href="#" id="forgotPasswordLink">Forgot Password?</a><br>
  Don’t have an account? <a href="employer-signup.html">Sign up here</a>.
</p>
  </div>
  <!-- ✅ Spinner functions — only once -->
<script>
  function showSpinner() {
    document.getElementById("spinner").style.display = "block";
    document.getElementById("mainContent").style.display = "none";
  }

  function hideSpinner() {
    document.getElementById("spinner").style.display = "none";
    document.getElementById("mainContent").style.display = "block";
  }
</script>

<!-- ✅ Firebase Logic -->
<script>
  const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};


  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // ✅ Forgot Password Handler
  document.getElementById("forgotPasswordLink").addEventListener("click", async (e) => {
    e.preventDefault();
    const email = prompt("🔐 Enter your registered email to receive a password reset link:");
    if (!email) return;

    try {
      await auth.sendPasswordResetEmail(email.trim());
      alert("✅ Reset link sent! Please check your inbox.");
    } catch (error) {
      console.error("Reset error:", error);
      if (error.code === "auth/user-not-found") {
        alert("❌ No user found with that email.");
      } else {
        alert("❌ Error sending reset link: " + error.message);
      }
    }
  });

  // ✅ Login Handler
  document.getElementById("loginForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const user = userCredential.user;

      const doc = await db.collection("users").doc(user.uid).get();

      if (!doc.exists) {
        alert("⛔ User record not found.");
        return;
      }

      const userData = doc.data();
      console.log("Role:", userData.role); // Debug log

      if (userData.role !== "employer" && userData.role !== "superadmin") {
        alert("⛔ Access denied. Only employers and superadmins can log in here.");
        await auth.signOut();
        return;
      }

      alert("✅ Login successful!");
      window.location.href = "dashboard.html";
    } catch (error) {
      console.error("Login Error:", error);
      alert("❌ Login failed: " + error.message);
    }
  });
</script>

</body>
</html>
