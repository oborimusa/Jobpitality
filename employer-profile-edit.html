<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit Employer Profile – Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-light">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8">
        <div class="card">
          <div class="card-header bg-primary text-white text-center">
            <h4>Edit Employer Profile</h4>
          </div>
          <div class="card-body">
            <form id="editEmployerForm">
              <div class="mb-3">
                <label for="companyName" class="form-label">Company Name</label>
                <input type="text" class="form-control" id="companyName" required />
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email (read-only)</label>
                <input type="email" class="form-control" id="email" readonly />
              </div>
              <div class="mb-3">
                <label for="contactPerson" class="form-label">Contact Person</label>
                <input type="text" class="form-control" id="contactPerson" />
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="text" class="form-control" id="phone" />
              </div>
              <div class="mb-3">
                <label for="location" class="form-label">Company Location</label>
                <input type="text" class="form-control" id="location" />
              </div>
              <button type="submit" class="btn btn-success w-100">Save Changes</button>
              <a href="employer-dashboard.html" class="btn btn-secondary w-100 mt-2">Back to Dashboard</a>
            </form>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase Config + Script -->
  <script>
    const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};


    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let currentUser;

    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        loadEmployerProfile(user.uid);
      } else {
        window.location.href = "login.html";
      }
    });

    function loadEmployerProfile(uid) {
      db.collection('users').doc(uid).get()
        .then(doc => {
          if (doc.exists) {
            const data = doc.data();
            document.getElementById('companyName').value = data.companyName || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('contactPerson').value = data.contactPerson || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('location').value = data.location || '';
          } else {
            alert("⚠️ No profile found.");
          }
        })
        .catch(error => {
          console.error("Error loading profile:", error);
        });
    }

    document.getElementById("editEmployerForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const updates = {
        companyName: document.getElementById('companyName').value.trim(),
        contactPerson: document.getElementById('contactPerson').value.trim(),
        phone: document.getElementById('phone').value.trim(),
        location: document.getElementById('location').value.trim(),
      };

      db.collection('users').doc(currentUser.uid).update(updates)
        .then(() => {
          alert("✅ Profile updated successfully.");
          window.location.href = "employer-dashboard.html";
        })
        .catch(error => {
          console.error("Error updating profile:", error);
          alert("❌ Failed to update profile.");
        });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
