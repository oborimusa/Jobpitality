<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Superadmin Dashboard | Jobpitality</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: #f8f9fa;
      }
      .table td,
      .table th {
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-dark bg-primary">
      <div class="container-fluid">
        <span class="navbar-brand mb-0 h1">Superadmin Dashboard</span>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
      </div>
    </nav>

    <div class="container py-4">
      <h2 id="headline">Welcome Superadmin 👑</h2>

      <!-- Users -->
      <section class="mt-4">
        <h4>System Users</h4>
        <div class="table-responsive">
          <table class="table table-striped table-bordered">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="usersTableBody">
              <tr>
                <td colspan="5" class="text-center">Loading users…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Applications Table -->
      <!-- <h3 class="mt-5">Applications</h3>
      <div class="table-responsive mt-3">
        <table class="table table-striped">
          <thead>
            <tr>
              <th>ID</th>
              <th>Applicant</th>
              <th>Job</th>
              <th>Status</th>
              <th>Resume</th>
              <th>Cover Letter</th>
            </tr>
          </thead>
          <tbody id="applicationsTable"> -->
            <!-- JS injects rows here -->
          <!-- </tbody>
        </table>
      </div> -->

      <!-- Jobs -->
      <section class="mt-4">
        <h4>Jobs</h4>
        <div class="table-responsive">
          <table class="table table-striped table-bordered">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Title</th>
                <th>Employer</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="jobsTableBody">
              <tr>
                <td colspan="5" class="text-center">Loading jobs…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Applications -->
      <section class="mt-4">
        <h4>Applications</h4>
        <div class="table-responsive">
          <table class="table table-striped table-bordered">
            <thead class="table-dark">
              <tr>
                <th>#</th>
                <th>Job Title</th>
                <th>Applicant</th>
                <th>Email</th>
                <th>Cover</th>
                <th>Resume</th>
                <th>Status</th>
                <th>Applied At</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="appsTableBody">
              <tr>
                <td colspan="9" class="text-center">Loading applications…</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="editModalTitle">Edit</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <form id="editForm" onsubmit="return false;">
              <input type="hidden" id="docId" />
              <!-- Field 1: either text input or select (we toggle display) -->
              <div class="mb-3" id="field1Group">
                <label class="form-label" id="field1Label">Field 1</label>
                <input id="field1Input" class="form-control" type="text" />
                <select id="field1Select" class="form-select d-none"></select>
              </div>

              <!-- Field 2: optional -->
              <div class="mb-3" id="field2Group">
                <label class="form-label" id="field2Label">Field 2</label>
                <input id="field2Input" class="form-control" type="text" />
                <select id="field2Select" class="form-select d-none"></select>
              </div>
            </form>
          </div>
          <div class="modal-footer">
            <button
              id="cancelBtn"
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button id="saveChangesBtn" type="button" class="btn btn-primary">
              Save changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import {
        getFirestore,
        collection,
        getDocs,
        doc,
        getDoc,
        updateDoc,
        deleteDoc,
      } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-auth.js";

      /* -------------------------
     Config & initialization
     ------------------------- */
      const firebaseConfig = {
        apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
        authDomain: "jobpitality-1cfb2.firebaseapp.com",
        projectId: "jobpitality-1cfb2",
        storageBucket: "jobpitality-1cfb2.appspot.com",
        messagingSenderId: "185191165097",
        measurementId: "G-SF5LWDZDKF",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);
      const auth = getAuth(app);

      /* -------------------------
     Applications loader
     ------------------------- */
      async function loadApplications() {
  try {
    const appsRef = collection(db, "applications");
    const snapshot = await getDocs(appsRef);

    const tbody = document.getElementById("appsTableBody");
    tbody.innerHTML = ""; // clear old rows

    if (snapshot.empty) {
      tbody.innerHTML = `<tr><td colspan="9" class="text-center">No applications found</td></tr>`;
      return;
    }

    let idx = 1;
    for (const docSnap of snapshot.docs) {
      const app = docSnap.data();

      // fetch applicant details
      let applicantName = "N/A";
      let applicantEmail = "N/A";
      if (app.applicantId) {
        const userDoc = await getDocs(collection(db, "users"));
        const user = userDoc.docs.find(u => u.id === app.applicantId);
        if (user) {
          applicantName = user.data().fullName || "N/A";
          applicantEmail = user.data().email || "N/A";
        }
      }

      // fetch job title
      let jobTitle = "N/A";
      if (app.jobId) {
        const jobDoc = await getDocs(collection(db, "jobs"));
        const job = jobDoc.docs.find(j => j.id === app.jobId);
        if (job) {
          jobTitle = job.data().title || "N/A";
        }
      }

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${idx++}</td>
        <td>${jobTitle}</td>
        <td>${applicantName}</td>
        <td>${applicantEmail}</td>
        <td>${app.coverLetter || ""}</td>
        <td><a href="${app.resumeUrl}" target="_blank">View Resume</a></td>
        <td>${app.status || "pending"}</td>
        <td>${app.appliedAt?.toDate ? app.appliedAt.toDate().toLocaleString() : ""}</td>
        <td>
          <button class="btn btn-sm btn-warning btn-edit"
            data-collection="applications"
            data-id="${docSnap.id}"
            data-f1="${app.status || "pending"}">Edit</button>
          <button class="btn btn-sm btn-danger btn-delete"
            data-collection="applications"
            data-id="${docSnap.id}">Delete</button>
        </td>
      `;
      tbody.appendChild(tr);
    }
  } catch (err) {
    console.error("Error loading applications:", err);
    document.getElementById("appsTableBody").innerHTML =
      `<tr><td colspan="9" class="text-center text-danger">Failed to load applications</td></tr>`;
  }
}
      /* -------------------------
     Users loader
     ------------------------- */
      async function loadUsers() {
        try {
          const snapshot = await getDocs(collection(db, "users"));
          const tbody = document.getElementById("usersTableBody");
          tbody.innerHTML = "";

          if (snapshot.empty) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center">No users</td></tr>`;
            return;
          }

          let idx = 1;
          snapshot.forEach((d) => {
            const u = d.data();
            const tr = document.createElement("tr");

            tr.appendChild(td(idx++));
            tr.appendChild(td(u.fullName || "-"));
            tr.appendChild(td(u.email || "-"));
            tr.appendChild(td(u.role || "-"));

            // actions
            const actionsTd = document.createElement("td");

            const editBtn = document.createElement("button");
            editBtn.className = "btn btn-sm btn-warning btn-edit me-2";
            editBtn.textContent = "Edit";
            editBtn.dataset.collection = "users";
            editBtn.dataset.id = d.id;
            editBtn.dataset.f1 = u.role || "";

            const delBtn = document.createElement("button");
            delBtn.className = "btn btn-sm btn-danger btn-delete";
            delBtn.textContent = "Delete";
            delBtn.dataset.collection = "users";
            delBtn.dataset.id = d.id;

            actionsTd.appendChild(editBtn);
            actionsTd.appendChild(delBtn);
            tr.appendChild(actionsTd);

            tbody.appendChild(tr);
          });
        } catch (err) {
          console.error("loadUsers error", err);
          document.getElementById(
            "usersTableBody"
          ).innerHTML = `<tr><td colspan="5" class="text-center text-danger">Failed to load users</td></tr>`;
        }
      }

      /* -------------------------
     Jobs loader
     ------------------------- */
      async function loadJobs() {
        try {
          const snapshot = await getDocs(collection(db, "jobs"));
          const tbody = document.getElementById("jobsTableBody");
          tbody.innerHTML = "";

          if (snapshot.empty) {
            tbody.innerHTML = `<tr><td colspan="5" class="text-center">No jobs</td></tr>`;
            return;
          }

          let idx = 1;
          snapshot.forEach((d) => {
            const j = d.data();
            const tr = document.createElement("tr");

            tr.appendChild(td(idx++));
            tr.appendChild(td(j.title || "-"));
            tr.appendChild(td(j.employer || "-"));
            tr.appendChild(td(j.status || "open"));

            const actionsTd = document.createElement("td");

            const viewApps = document.createElement("button");
            viewApps.className = "btn btn-sm btn-info btn-view-apps me-2";
            viewApps.textContent = "View Apps";
            viewApps.dataset.jobId = d.id;

            const editBtn = document.createElement("button");
            editBtn.className = "btn btn-sm btn-warning btn-edit me-2";
            editBtn.textContent = "Edit";
            editBtn.dataset.collection = "jobs";
            editBtn.dataset.id = d.id;
            editBtn.dataset.f1 = j.title || "";
            editBtn.dataset.f2 = j.status || "";

            const delBtn = document.createElement("button");
            delBtn.className = "btn btn-sm btn-danger btn-delete";
            delBtn.textContent = "Delete";
            delBtn.dataset.collection = "jobs";
            delBtn.dataset.id = d.id;

            actionsTd.appendChild(viewApps);
            actionsTd.appendChild(editBtn);
            actionsTd.appendChild(delBtn);
            tr.appendChild(actionsTd);

            tbody.appendChild(tr);
          });
        } catch (err) {
          console.error("loadJobs error", err);
          document.getElementById(
            "jobsTableBody"
          ).innerHTML = `<tr><td colspan="5" class="text-center text-danger">Failed to load jobs</td></tr>`;
        }
      }

      /* -------------------------
     Helper to build td
     ------------------------- */
      function td(content) {
        const cell = document.createElement("td");
        cell.textContent = content;
        return cell;
      }

      /* -------------------------
     Auth check + initial load
     ------------------------- */
      onAuthStateChanged(auth, async (user) => {
        if (!user) return (window.location.href = "login.html");

        try {
          const userDoc = await getDoc(doc(db, "users", user.uid));
          if (
            !userDoc.exists() ||
            (userDoc.data().role || "").toLowerCase() !== "superadmin"
          ) {
            alert("Access denied - not a superadmin.");
            await signOut(auth);
            return (window.location.href = "login.html");
          }

          const profile = userDoc.data();
          document.getElementById(
            "headline"
          ).textContent = `Welcome Superadmin 👑 ${profile.fullName || ""}`;

          await loadUsers();
          await loadJobs();
          await loadApplications();
        } catch (err) {
          console.error("Auth/load error", err);
          alert("Failed to initialize dashboard. Check console.");
        }
      });

      /* -------------------------
     Logout
     ------------------------- */
      document.getElementById("logoutBtn").addEventListener("click", () => {
        signOut(auth).then(() => (window.location.href = "login.html"));
      });
    </script>
  </body>
</html>
