<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Skill Assessment – Jobpitality</title>
  <meta name="description"
        content="Create and manage hospitality skill assessments to evaluate candidates before hiring." />

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    .hero {
      background: linear-gradient(90deg, rgba(11, 37, 69, 0.9), rgba(6, 125, 63, 0.85));
      color: #fff;
      height: 10vh;
      
      text-align: center;
      position: relative; 
    }
    .hero::before {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.4);
      z-index: 0;
    }
    .hero .container {
      position: relative;
      z-index: 1;
    }
    @media (max-width: 768px) {
      .hero h2 { font-size: 24px; }
      .hero p  { font-size: 14px; }
    }
  </style>
</head>
<body class="bg-light">

<!-- ===== Navbar ===== -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="img/final-job.png"
            alt="Jobpitality"
            style="height: 40px; margin-right: 8px"
          />
          <span class="fw-bold"></span>
        </a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav ms-auto btn-outline-danger">
        <li class="nav-item"><a class="nav-link" href="employers-landing.html">Dashboard</a></li>
        <li class="nav-item"><a class="nav-link active" aria-current="page" href="#">Skill Assessment</a></li>
        <li class="nav-item"><a class="nav-link" href="employer-corner.html">Manage Jobs</a></li>
        <li class="nav-item"><a class="nav-link" href="logout.html">Logout</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ===== Hero Section ===== -->
<header class="text-white text-center py-5 mb-4" style="background: linear-gradient(90deg, rgba(11, 37, 69, 0.9), rgba(6, 125, 63, 0.85));">
  <div class="container">
    <h1 class="display-6 fw-bold">Candidate Skill Assessments</h1>
    <p class="lead mb-0">
      Build and send assessments to evaluate applicants’ hospitality skills before hiring.
    </p>
  </div>
</header>

<main class="container mb-5">

  <!-- Create New Assessment -->
  <section class="mb-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="h5 mb-3">Create New Assessment</h2>
        <form id="createAssessmentForm" class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Assessment Title</label>
            <input type="text" class="form-control" id="assessmentTitle" placeholder="e.g. Front Office Skills">
          </div>
          <div class="col-md-6">
            <label class="form-label">Position / Role</label>
            <input type="text" class="form-control" id="assessmentRole" placeholder="e.g. Receptionist">
          </div>
          <div class="col-md-6">
            <label class="form-label">Category</label>
            <select class="form-select" id="assessmentCategory">
              <option>Front Office</option>
              <option>Food & Beverage</option>
              <option>Kitchen / Culinary</option>
              <option>Management</option>
              <option>Customer Service</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label">Deadline</label>
            <input type="date" class="form-control" id="assessmentDeadline">
          </div>
          <div class="col-12">
            <label class="form-label">Instructions</label>
            <textarea class="form-control" rows="3" id="assessmentInstructions"
                      placeholder="Provide details or links for the candidate."></textarea>
          </div>
          <div class="col-12 text-end">
            <button type="submit" class="btn btn-primary px-4">
              <i class="bi bi-plus-lg"></i> Create Assessment
            </button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- Existing Assessments -->
  <section>
    <h2 class="h5 mb-3">Existing Assessments</h2>
    <div class="row g-3" id="assessmentsList">
      <!-- Dynamic cards will be injected here -->
    </div>
  </section>

</main>

<footer class="bg-dark text-light text-center py-3">
  <small>&copy; <span id="year"></span> Jobpitality. All rights reserved.</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Simple demo data and render logic
  const assessments = [
    {
      id: 1,
      title: "Front Office Skills Test",
      role: "Receptionist",
      category: "Front Office",
      deadline: "2025-10-15",
      applicants: 12
    },
    {
      id: 2,
      title: "Kitchen Safety Assessment",
      role: "Chef",
      category: "Kitchen / Culinary",
      deadline: "2025-11-01",
      applicants: 8
    }
  ];

  const listEl = document.getElementById('assessmentsList');

  function renderAssessments() {
    listEl.innerHTML = '';
    assessments.forEach(a => {
      const col = document.createElement('div');
      col.className = 'col-12 col-md-6 col-lg-4';
      col.innerHTML = `
        <div class="card shadow-sm h-100">
          <div class="card-body d-flex flex-column">
            <h5 class="card-title mb-1">${a.title}</h5>
            <small class="text-muted">${a.category} · ${a.role}</small>
            <p class="mt-2 mb-3 text-muted small">
              Deadline: ${a.deadline}
            </p>
            <div class="mt-auto d-flex justify-content-between align-items-center">
              <span class="badge bg-info text-dark">${a.applicants} applicants</span>
              <a href="#" class="btn btn-outline-primary btn-sm">View Results</a>
            </div>
          </div>
        </div>
      `;
      listEl.appendChild(col);
    });
  }

  renderAssessments();
  document.getElementById('year').textContent = new Date().getFullYear();

  // Demo form handling
  document.getElementById('createAssessmentForm').addEventListener('submit', e => {
    e.preventDefault();
    alert('Assessment created (demo only).');
  });
</script>
</body>
</html>
