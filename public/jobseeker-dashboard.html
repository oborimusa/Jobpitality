<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Job Seeker Dashboard | Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body { background-color: #f8f9fa; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    nav.navbar { background-color: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); }
    .navbar-brand { font-weight: bold; color: #067d3f !important; }
    .welcome-container { max-width: 700px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .btn-primary { background-color: #067d3f; border: none; }
    .btn-primary:hover { background-color: #056d37; }
  </style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-light shadow-sm">
  <div class="container-fluid">
    <span class="navbar-brand">👤 Job Seeker Dashboard</span>
    <div class="ms-auto d-flex align-items-center">
      <a href="profile.html" class="btn btn-outline-success btn-sm me-2">My Profile</a>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
  </div>
</nav>

<!-- Dashboard Content -->
<div class="welcome-container text-center">
  <h3 class="text-primary fw-bold">Welcome, Job Seeker</h3>
  <p id="userEmail" class="text-muted"></p>
  <hr/>
  <p>Browse jobs, apply, and track your applications here.</p>
  <a href="profile.html" class="btn btn-primary mt-3">Go to Profile</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
    authDomain: "jobpitality-1cfb2.firebaseapp.com",
    projectId: "jobpitality-1cfb2",
    storageBucket: "jobpitality-1cfb2.appspot.com",
    messagingSenderId: "185191165097",
    appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const userEmail = document.getElementById("userEmail");

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const docSnap = await getDoc(doc(db, "users", user.uid));
      if (!docSnap.exists() || docSnap.data().role !== "jobseeker") {
        alert("Access denied: Job seekers only");
        window.location.href = "login.html";
        return;
      }
      userEmail.textContent = user.email;
    } else {
      window.location.href = "login.html";
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", async () => {
    await signOut(auth);
    window.location.href = "login.html";
  });
</script>

</body>
</html>
