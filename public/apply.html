<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Apply for Job | Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <style>
    :root { --success: #198754; }
    body {
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
      background: #f8f9fa;
    }
    .header-bar {
      background-color: var(--success);
      color: white;
      padding: 15px 0;
      margin-bottom: 40px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .apply-container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
    }
    .btn-theme {
      background: var(--success);
      color: white;
      border: none;
      transition: background 0.3s;
    }
    .btn-theme:hover {
      background: #157347;
      color: white;
    }
    .form-control:focus {
      border-color: var(--success);
      box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
    }
  </style>
</head>
<body>

  <div class="header-bar">
    <div class="container">
      <h3 class="mb-0 fw-bold">
        <i class="bi bi-person-lines-fill me-2"></i>Job Application
      </h3>
    </div>
  </div>

  <div class="container">
    <div class="apply-container">
      <h2 class="text-success mb-4 text-center">Application for <span id="jobTitlePlaceholder" class="fw-bolder">Job Role (ID: 123)</span></h2>
      <p class="text-muted text-center mb-4">Please fill out the form carefully. All fields are required.</p>

      <div id="statusMessageBox" class="alert p-3" style="display:none;" role="alert"></div>

      <form id="applicationForm">
        <input type="hidden" id="jobId" value="12345ABC">

        <div class="row">
          <div class="col-md-6 mb-3">
            <label for="fullName" class="form-label">Full Name</label>
            <input type="text" class="form-control" id="fullName" required>
          </div>
          <div class="col-md-6 mb-3">
            <label for="email" class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" required>
          </div>
        </div>

        <div class="mb-3">
          <label for="phone" class="form-label">Phone Number</label>
          <input type="tel" class="form-control" id="phone" required>
        </div>

        <div class="mb-3">
          <label for="resumeLink" class="form-label">Resume Link (e.g., Google Drive, LinkedIn)</label>
          <input type="url" class="form-control" id="resumeLink" placeholder="https://" required>
        </div>

        <div class="mb-4">
          <label for="coverLetter" class="form-label">Cover Letter Summary</label>
          <textarea class="form-control" id="coverLetter" rows="4" placeholder="Briefly state why you are the perfect fit for this role." required></textarea>
        </div>

        <div class="d-grid">
          <button type="submit" class="btn btn-theme btn-lg" id="submitBtn">
            <i class="bi bi-send-fill me-2"></i>Submit Application
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    // ✅ Direct Jobpitality Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "185191165097",
      appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const applicationForm = document.getElementById('applicationForm');
    const submitBtn = document.getElementById('submitBtn');
    const statusMessageBox = document.getElementById('statusMessageBox');

    let userId = 'anonymous';
    let isAuthReady = false;

    const displayStatus = (message, type = 'success') => {
      statusMessageBox.textContent = message;
      statusMessageBox.className = `alert mt-4 alert-${type}`;
      statusMessageBox.style.display = 'block';
      if (type === 'success') submitBtn.disabled = true;
    };

    const setLoading = (isLoading) => {
      submitBtn.disabled = isLoading;
      submitBtn.innerHTML = isLoading
        ? '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Submitting...'
        : '<i class="bi bi-send-fill me-2"></i>Submit Application';
    };

    // ✅ Anonymous Auth for Applicants
    const authenticate = async () => {
      try {
        const userCredential = await signInAnonymously(auth);
        userId = userCredential.user.uid;
        isAuthReady = true;
      } catch (error) {
        console.error("Auth failed:", error);
        displayStatus("Authentication failed. Please refresh and try again.", "danger");
      }
    };
    authenticate();

    // ✅ Handle Form Submission
    applicationForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      statusMessageBox.style.display = 'none';
      setLoading(true);

      if (!isAuthReady) {
        displayStatus("Authentication not ready. Please wait a moment and try again.", 'warning');
        setLoading(false);
        return;
      }

      const applicationData = {
        fullName: document.getElementById('fullName').value,
        email: document.getElementById('email').value,
        phone: document.getElementById('phone').value,
        resumeLink: document.getElementById('resumeLink').value,
        coverLetter: document.getElementById('coverLetter').value,
        jobId: document.getElementById('jobId').value,
        applicantUid: auth.currentUser ? auth.currentUser.uid : userId,
        appliedAt: new Date(),
        status: 'New'
      };

      try {
        const applicationsRef = collection(db, 'applications');
        const docRef = await addDoc(applicationsRef, applicationData);
        displayStatus(`✅ Application submitted successfully! Your tracking ID: ${docRef.id}`, 'success');
        applicationForm.reset();
      } catch (error) {
        console.error("Error submitting application:", error);
        displayStatus(`❌ Submission failed: ${error.message}`, 'danger');
      } finally {
        setLoading(false);
      }
    });
  </script>
</body>
</html>
