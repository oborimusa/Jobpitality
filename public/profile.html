<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | Jobpitality</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    nav.navbar {
      background: white
    }

    .navbar-brand img {
      width: 20%;
      height: auto;
    }

    #spinner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1050;
    }

    .profile-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      padding: 2rem;
      margin-top: 2rem;
    }

    footer {
      margin-top: 60px;
      background: #0b2545;
      color: white;
      text-align: center;
      padding: 20px 0;
    }

    .btn-primary {
      background-color: #067d3f;
      border: none;
    }

    .btn-primary:hover {
      background-color: #056d37;
    }
  </style>
</head>
<body>
  <!-- Spinner -->
  <div id="spinner">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm p-3">
    <div class="container">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center">
        <img src="img/final-job.png" alt="Jobpitality Logo" style="">
      </a>
      <div class="ms-auto">
        <button id="logoutBtn" class="btn btn-outline-primary btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Profile Section -->
  <div class="container" id="mainContent" style="display:none;">
    <div class="profile-card">
      <h3 class="fw-bold mb-4">My Profile</h3>

      <form id="profileForm">
        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Full Name</label>
            <input type="text" id="fullName" class="form-control" placeholder="Enter your name" required />
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" id="email" class="form-control" disabled />
          </div>
          <div class="col-md-6">
            <label class="form-label">Phone Number</label>
            <input type="text" id="phone" class="form-control" placeholder="Enter phone number" />
          </div>
          <div class="col-md-6">
            <label class="form-label">Location</label>
            <input type="text" id="location" class="form-control" placeholder="City, Country" />
          </div>
          <div class="col-12">
            <label class="form-label">About / Bio</label>
            <textarea id="bio" class="form-control" rows="4" placeholder="Tell us a bit about yourself..."></textarea>
          </div>
        </div>

        <div class="text-end mt-4">
          <button type="submit" class="btn btn-primary px-4">Save Changes</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p class="mb-0">&copy; 2025 Jobpitality. All rights reserved.</p>
  </footer>

  <!-- Firebase + Profile Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "185191165097",
      appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function hideSpinner() {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
    }

    function showSpinner() {
      document.getElementById("spinner").style.display = "flex";
      document.getElementById("mainContent").style.display = "none";
    }

    let currentUser;

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUser = user;
        document.getElementById("email").value = user.email;
        await loadProfile(user.uid);
        hideSpinner();
      } else {
        window.location.href = "login.html";
      }
    });

    async function loadProfile(uid) {
      const userRef = doc(db, "users", uid);
      const userSnap = await getDoc(userRef);
      if (userSnap.exists()) {
        const data = userSnap.data();
        document.getElementById("fullName").value = data.fullName || "";
        document.getElementById("phone").value = data.phone || "";
        document.getElementById("location").value = data.location || "";
        document.getElementById("bio").value = data.bio || "";
      }
    }

    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      const userRef = doc(db, "users", currentUser.uid);
      const profileData = {
        fullName: document.getElementById("fullName").value,
        phone: document.getElementById("phone").value,
        location: document.getElementById("location").value,
        bio: document.getElementById("bio").value,
        email: currentUser.email,
        updatedAt: new Date()
      };

      await setDoc(userRef, profileData, { merge: true });
      alert("✅ Profile updated successfully!");
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
