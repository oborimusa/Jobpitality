<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile | Jobpitality</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />

  <style>
    body {
      background: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Refined Navbar */
    nav.navbar {
      background: white;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .navbar-brand img {
      width: 120px;
      height: auto;
    }

    /* Spinner */
    #spinner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1050;
    }

    /* Profile Card */
    .profile-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
      padding: 2rem;
      margin-top: 2rem;
    }

    /* Tab Styles */
    .nav-tabs .nav-link.active {
      background-color: #067d3f;
      color: white;
      border-radius: 8px 8px 0 0;
    }
    .nav-tabs .nav-link {
      border: 1px solid #ddd;
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      color: #067d3f;
      margin-right: 5px;
    }

    .tab-content {
      border: 1px solid #ddd;
      border-radius: 0 0 12px 12px;
      background: white;
      padding: 1.5rem;
    }

    /* Skills Tag Styles */
    .skill-tag {
      display: inline-flex;
      align-items: center;
      background: #e9f5ef;
      color: #067d3f;
      padding: 5px 10px;
      border-radius: 20px;
      margin: 3px;
      font-size: 0.9rem;
    }
    .skill-tag i {
      cursor: pointer;
      margin-left: 5px;
    }

    /* Buttons */
    .btn-primary {
      background-color: #067d3f;
      border: none;
    }
    .btn-primary:hover {
      background-color: #056d37;
    }

    /* Footer */
    footer {
      margin-top: 60px;
      background: #0b2545;
      color: white;
      text-align: center;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <!-- Spinner -->
  <div id="spinner">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light shadow-sm p-3">
    <div class="container">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center">
        <img src="img/final-job.png" alt="Jobpitality Logo">
      </a>
      <div class="ms-auto">
        <button id="logoutBtn" class="btn btn-outline-primary btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Profile Section -->
  <div class="container" id="mainContent" style="display:none;">
    <div class="profile-card">
      <h3 class="fw-bold mb-4">My Profile</h3>

      <!-- Tabs -->
      <ul class="nav nav-tabs mb-3" id="profileTabs" role="tablist">
        <li class="nav-item" role="presentation">
          <button class="nav-link active" id="about-tab" data-bs-toggle="tab" data-bs-target="#about" type="button" role="tab">About</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="skills-tab" data-bs-toggle="tab" data-bs-target="#skills" type="button" role="tab">Skills</button>
        </li>
        <li class="nav-item" role="presentation">
          <button class="nav-link" id="resume-tab" data-bs-toggle="tab" data-bs-target="#resume" type="button" role="tab">Resume</button>
        </li>
      </ul>

      <!-- Tab Content -->
      <div class="tab-content" id="profileTabContent">
        <!-- About Tab -->
        <div class="tab-pane fade show active" id="about" role="tabpanel">
          <form id="profileForm">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" id="fullName" class="form-control" placeholder="Enter your name" required />
              </div>
              <div class="col-md-6">
                <label class="form-label">Email</label>
                <input type="email" id="email" class="form-control" disabled />
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="text" id="phone" class="form-control" placeholder="Enter phone number" />
              </div>
              <div class="col-md-6">
                <label class="form-label">Location</label>
                <input type="text" id="location" class="form-control" placeholder="City, Country" />
              </div>
              <div class="col-12">
                <label class="form-label">About / Bio</label>
                <textarea id="bio" class="form-control" rows="4" placeholder="Tell us a bit about yourself..."></textarea>
              </div>
            </div>

            <div class="text-end mt-4">
              <button type="submit" class="btn btn-primary px-4">Save Changes</button>
            </div>
          </form>
        </div>

        <!-- Skills Tab -->
        <div class="tab-pane fade" id="skills" role="tabpanel">
          <div class="mb-3">
            <label class="form-label">Add Skill</label>
            <div class="input-group">
              <input type="text" id="skillInput" class="form-control" placeholder="e.g., Bartending">
              <button class="btn btn-primary" id="addSkillBtn">Add</button>
            </div>
          </div>
          <div id="skillsContainer"></div>
        </div>

        <!-- Resume Tab -->
        <div class="tab-pane fade" id="resume" role="tabpanel">
          <div class="mb-3">
            <label class="form-label">Upload Resume (PDF/DOCX)</label>
            <input type="file" id="resumeFile" class="form-control" accept=".pdf,.doc,.docx" />
            <small class="text-muted">Maximum file size: 5MB</small>
          </div>
          <div id="resumeProgress" class="my-2" style="display:none;">
            <div class="progress">
              <div class="progress-bar" role="progressbar" style="width: 0%">0%</div>
            </div>
          </div>
          <div id="resumeLink" class="mt-2"></div>
          <button class="btn btn-primary mt-2" id="uploadResumeBtn">Upload Resume</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer>
    <p class="mb-0">&copy; 2025 Jobpitality. All rights reserved.</p>
  </footer>

  <!-- Firebase + Profile Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";
    import { getStorage, ref as storageRef, uploadBytesResumable, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "185191165097",
      appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // Spinner & main content
    const spinner = document.getElementById("spinner");
    const mainContent = document.getElementById("mainContent");
    function hideSpinner(){ spinner.style.display="none"; mainContent.style.display="block"; }

    let currentUser;
    let skills = [];

    onAuthStateChanged(auth, async (user) => {
      if(!user){ window.location.href="login.html"; return; }
      currentUser = user;
      document.getElementById("email").value = user.email;
      await loadProfile(user.uid);
      hideSpinner();
    });

    // Load profile
    async function loadProfile(uid){
      const userRef = doc(db,"users",uid);
      const snap = await getDoc(userRef);
      if(snap.exists()){
        const data = snap.data();
        document.getElementById("fullName").value = data.fullName||"";
        document.getElementById("phone").value = data.phone||"";
        document.getElementById("location").value = data.location||"";
        document.getElementById("bio").value = data.bio||"";
        skills = data.skills||[];
        renderSkills();
        if(data.resumeURL){
          showResumeLink(data.resumeURL);
        }
      }
    }

    // Save profile
    document.getElementById("profileForm").addEventListener("submit", async e=>{
      e.preventDefault();
      const userRef = doc(db,"users",currentUser.uid);
      await setDoc(userRef,{
        fullName: document.getElementById("fullName").value,
        phone: document.getElementById("phone").value,
        location: document.getElementById("location").value,
        bio: document.getElementById("bio").value,
        email: currentUser.email,
        skills: skills,
        updatedAt: new Date()
      }, {merge:true});
      alert("✅ Profile updated successfully!");
    });

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", async ()=>{
      await signOut(auth);
      window.location.href="login.html";
    });

    // --- Skills Logic ---
    const skillInput = document.getElementById("skillInput");
    const addSkillBtn = document.getElementById("addSkillBtn");
    const skillsContainer = document.getElementById("skillsContainer");

    function renderSkills(){
      skillsContainer.innerHTML="";
      skills.forEach((skill,index)=>{
        const span = document.createElement("span");
        span.className="skill-tag";
        span.innerHTML = skill+' <i class="bi bi-x-circle" onclick="removeSkill('+index+')"></i>';
        skillsContainer.appendChild(span);
      });
    }

    function removeSkill(index){
      skills.splice(index,1);
      renderSkills();
    }

    addSkillBtn.addEventListener("click", e=>{
      e.preventDefault();
      const val = skillInput.value.trim();
      if(val && !skills.includes(val)){
        skills.push(val);
        renderSkills();
        skillInput.value="";
      }
    });

    // --- Resume Upload ---
    const resumeFile = document.getElementById("resumeFile");
    const uploadResumeBtn = document.getElementById("uploadResumeBtn");
    const resumeProgress = document.getElementById("resumeProgress");
    const resumeLink = document.getElementById("resumeLink");

    function showResumeLink(url){
      resumeLink.innerHTML = `<a href="${url}" target="_blank" class="btn btn-outline-primary btn-sm"><i class="bi bi-download"></i> Download Resume</a>`;
    }

    uploadResumeBtn.addEventListener("click", async ()=>{
      const file = resumeFile.files[0];
      if(!file){ alert("Please select a file"); return; }

      const storageReference = storageRef(storage, `resumes/${currentUser.uid}/${Date.now()}_${file.name}`);
      const uploadTask = uploadBytesResumable(storageReference, file);

      resumeProgress.style.display="block";
      const progressBar = resumeProgress.querySelector(".progress-bar");

      uploadTask.on('state_changed', snapshot=>{
        const progress = (snapshot.bytesTransferred / snapshot.totalBytes)*100;
        progressBar.style.width = progress+"%";
        progressBar.textContent = Math.floor(progress)+"%";
      }, error=>{
        alert("❌ Upload failed: "+error.message);
      }, async ()=>{
        const downloadURL = await getDownloadURL(uploadTask.snapshot.ref);
        const userRef = doc(db,"users",currentUser.uid);
        await updateDoc(userRef,{resumeURL: downloadURL, updatedAt: new Date()});
        showResumeLink(downloadURL);
        progressBar.style.width="100%";
        progressBar.textContent="100%";
        setTimeout(()=>{ resumeProgress.style.display="none"; progressBar.style.width="0%"; progressBar.textContent="0%"; },1000);
        alert("✅ Resume uploaded successfully!");
      });
    });
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
