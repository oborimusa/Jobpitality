<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Availability Form – Jobpitality</title>
    <meta
      name="description"
      content="Let employers know you’re available for work in the hospitality industry. Submit your availability form to appear on Jobpitality’s Hire page."
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      :root {
        --green: #0ea861;
        --blue: #004aad;
        --dark: #0b2540;
        --muted: #6b7280;
      }

      body {
        font-family: "Inter", system-ui, sans-serif;
        background: #f5f8fb;
        color: var(--dark);
      }

      header {
        background: linear-gradient(160deg, var(--blue), var(--green));
        color: #fff;
        text-align: center;
        padding: 70px 20px;
        border-bottom-left-radius: 20px;
        border-bottom-right-radius: 20px;
      }

      .form-section {
        background: #fff;
        border-radius: 16px;
        padding: 40px 30px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.05);
        margin-top: -40px;
        position: relative;
        z-index: 5;
      }

      footer {
        background: #081226;
        color: #cfe9ff;
        text-align: center;
        padding: 20px;
        margin-top: 40px;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="container">
        <h1 class="fw-bold">Jobseeker Availability Form</h1>
        <p>
          Share your availability with employers and get discovered for new
          hospitality job opportunities.
        </p>
      </div>
    </header>

    <section class="container form-section">
      <form id="availabilityForm" class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input
            type="text"
            class="form-control"
            id="fullName"
            placeholder="John Doe"
            required
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Email Address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="you@example.com"
            required
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Job Role</label>
          <input
            type="text"
            class="form-control"
            id="jobRole"
            placeholder="Front Desk Officer, Chef, Waiter..."
            required
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Location</label>
          <input
            type="text"
            class="form-control"
            id="location"
            placeholder="City, Country"
            required
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Availability Date</label>
          <input
            type="date"
            class="form-control"
            id="availabilityDate"
            required
          />
        </div>

        <div class="col-md-6">
          <label class="form-label">Employment Type</label>
          <select class="form-select" id="employmentType" required>
            <option value="">Select type</option>
            <option>Full-Time</option>
            <option>Part-Time</option>
            <option>Contract</option>
            <option>Internship</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Expected Salary (optional)</label>
          <input
            type="text"
            class="form-control"
            id="salary"
            placeholder="e.g. NGN 100,000/month"
          />
        </div>

        <div class="col-12">
          <label class="form-label">Short Bio / Experience Summary</label>
          <textarea
            class="form-control"
            id="bio"
            rows="4"
            placeholder="Briefly describe your experience, key skills, or previous roles..."
          ></textarea>
        </div>

        <div class="col-12 text-center mt-3">
          <button type="submit" class="btn btn-success btn-lg">
            Submit Availability
          </button>
        </div>
      </form>

      <div id="statusMessage" class="mt-4 text-center"></div>
    </section>

    <footer>
      &copy; <span id="year"></span> Jobpitality. All rights reserved.
    </footer>

    <script>
      document.getElementById("year").textContent = new Date().getFullYear();
    </script>

    <!-- Firebase Integration -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
      import {
        getFirestore,
        collection,
        addDoc,
        serverTimestamp,
      } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
        authDomain: "jobpitality-1cfb2.firebaseapp.com",
        projectId: "jobpitality-1cfb2",
        storageBucket: "jobpitality-1cfb2.firebasestorage.app",
        messagingSenderId: "185191165097",
        appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
        measurementId: "G-SF5LWDZDKF",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      const form = document.getElementById("availabilityForm");
      const status = document.getElementById("statusMessage");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        status.innerHTML =
          '<div class="text-info">Submitting your availability...</div>';

        const data = {
          fullName: form.fullName.value.trim(),
          email: form.email.value.trim(),
          jobRole: form.jobRole.value.trim(),
          location: form.location.value.trim(),
          availabilityDate: form.availabilityDate.value,
          employmentType: form.employmentType.value,
          salary: form.salary.value.trim(),
          bio: form.bio.value.trim(),
          createdAt: serverTimestamp(),
        };

        try {
          await addDoc(collection(db, "availabilities"), data);
          status.innerHTML =
            '<div class="text-success fw-semibold mt-3">✅ Availability submitted successfully! You’ll now appear on the Hire page.</div>';
          form.reset();
        } catch (err) {
          console.error(err);
          status.innerHTML = `<div class="text-danger mt-3">❌ Error: ${err.message}</div>`;
        }
      });
    </script>
  </body>
</html>
