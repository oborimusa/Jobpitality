<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | Jobpitality</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f8f9fa;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      }

      nav.navbar {
        background: white;
        height: 8vh;
      }

      .navbar-brand img {
        width: 140px;
      }

      #spinner {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #fff;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 1050;
      }

      .dashboard-header {
        background: white;
        padding: 1.5rem;
        border-radius: 10px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        margin-bottom: 2rem;
      }

      .card {
        border: none;
        border-radius: 12px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
        transition: all 0.25s ease;
      }

      .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
      }

      footer {
        margin-top: 60px;
        padding: 20px 0;
        background: #0b2545;
        color: #fff;
        text-align: center;
      }
    </style>
  </head>

  <body>
    <!-- Spinner -->
    <div id="spinner">
      <div class="spinner-border text-primary" role="status"></div>
    </div>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light shadow-sm">
      <div class="container">
        <a href="index.html" class="navbar-brand d-flex align-items-center">
          <img src="img/final-job.png" alt="Jobpitality Logo" />
        </a>
        <div class="ms-auto">
          <button id="logoutBtn" class="btn btn-outline-primary btn-sm">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <!-- Dashboard Content -->
    <div class="container my-5" id="mainContent" style="display: none;">
      <div class="dashboard-header">
        <h3 class="fw-bold mb-1">Welcome to your Dashboard</h3>
        <p class="text-muted" id="userEmail">Loading user...</p>
      </div>

      <div class="row g-4">
        <!-- Profile -->
        <div class="col-md-3">
          <div class="card p-4 text-center">
            <i class="bi bi-person-circle display-5 text-primary mb-3"></i>
            <h5>Profile</h5>
            <p class="text-muted small">Manage your personal information.</p>
            <a href="profile.html" class="btn btn-outline-primary btn-sm">Go</a>
          </div>
        </div>

        <!-- Applications -->
        <div class="col-md-3">
          <div class="card p-4 text-center">
            <i class="bi bi-briefcase display-5 text-success mb-3"></i>
            <h5>My Applications</h5>
            <p class="text-muted small">Track and manage your job applications.</p>
            <a href="applications.html" class="btn btn-outline-success btn-sm">Go</a>
          </div>
        </div>

        <!-- Analytics -->
        <div class="col-md-3">
          <div class="card p-4 text-center">
            <i class="bi bi-graph-up display-5 text-warning mb-3"></i>
            <h5>Analytics</h5>
            <p class="text-muted small">Monitor job performance insights.</p>
            <button class="btn btn-warning btn-sm text-white" disabled>
              Coming Soon
            </button>
          </div>
        </div>

        <!-- Employers -->
        <div class="col-md-3">
          <div class="card p-4 text-center">
            <i class="bi bi-people display-5 text-info mb-3"></i>
            <h5>Post Vacancies</h5>
            <p class="text-muted small">
              Post Your Jobs.
            </p>
            <a href="post-job.html" class="btn btn-outline-info btn-sm">Go</a>
          </div>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer>
      <p class="mb-0">&copy; 2025 Jobpitality. All rights reserved.</p>
    </footer>

    <!-- Firebase Auth + Role Redirect -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
      import {
        getAuth,
        onAuthStateChanged,
        signOut,
      } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

      const firebaseConfig = {
        apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
        authDomain: "jobpitality-1cfb2.firebaseapp.com",
        projectId: "jobpitality-1cfb2",
        storageBucket: "jobpitality-1cfb2.appspot.com",
        messagingSenderId: "185191165097",
        appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const spinner = document.getElementById("spinner");
      const main = document.getElementById("mainContent");

      function toggleLoading(show) {
        spinner.style.display = show ? "flex" : "none";
        main.style.display = show ? "none" : "block";
      }

      // Role-based redirect logic
      onAuthStateChanged(auth, async (user) => {
        if (!user) {
          window.location.href = "login.html";
          return;
        }

        try {
          const userRef = doc(db, "users", user.uid);
          const userSnap = await getDoc(userRef);

          if (userSnap.exists()) {
            const data = userSnap.data();
            const role = data.role || "user";
            const email = user.email.toLowerCase();

            document.getElementById("userEmail").textContent = email;

            // Check for superadmin email
            const superadminEmails = [
              "superadmin@jobpitality.com", // <-- add your superadmin email(s) here
              "owner@jobpitality.com"
               ];

            if (superadminEmails.includes(email)) {
              window.location.href = "superadmin.html";
              return;
            }

            // Otherwise, check role
            if (role === "superadmin") {
              window.location.href = "superadmin.html";
              return;
            }

            if (role === "admin") {
              window.location.href = "admin.html";
              return;
            }

            // Regular user stays on dashboard
            toggleLoading(false);
          } else {
            console.warn("User record not found in Firestore.");
            toggleLoading(false);
          }
        } catch (err) {
          console.error("Error fetching user data:", err);
          toggleLoading(false);
        }
      });

      // Logout
      document.getElementById("logoutBtn").addEventListener("click", async () => {
        await signOut(auth);
        window.location.href = "login.html";
      });
    </script>
  </body>
</html>
