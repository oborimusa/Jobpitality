<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jobseeker Dashboard | Jobpitality</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    body {
      background-color: #f8f9fa;
      font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
    }
    .container {
      max-width: 700px;
      margin-top: 50px;
    }
    .card {
      border-radius: 10px;
      box-shadow: 0 3px 8px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-light bg-white shadow-sm">
    <div class="container">
      <a href="#" class="navbar-brand">
        <img src="img/final-job.png" alt="Jobpitality Logo" style="height:40px;">
      </a>
      <button id="logoutBtn" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
  </nav>

  <div class="container">
    <div class="card p-4 mt-4">
      <h3 class="fw-bold mb-3 text-center text-primary">Availability for Employment</h3>
      <p class="text-muted small text-center mb-4">Fill out your availability so employers can find and contact you.</p>

      <form id="availabilityForm">
        <div class="mb-3">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Preferred Job Role</label>
          <input type="text" class="form-control" id="jobRole" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Location</label>
          <input type="text" class="form-control" id="location" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Availability Date</label>
          <input type="date" class="form-control" id="availabilityDate" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Employment Type</label>
          <select class="form-select" id="employmentType" required>
            <option value="">Select one</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Internship</option>
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Expected Salary (optional)</label>
          <input type="text" class="form-control" id="salary" placeholder="e.g., ₦100,000 / month">
        </div>
        <div class="mb-3">
          <label class="form-label">Short Bio / Summary</label>
          <textarea class="form-control" id="bio" rows="3" placeholder="Describe your skills, experience, and availability..." required></textarea>
        </div>

        <button type="submit" class="btn btn-primary w-100" id="submitBtn">Submit Availability</button>
        <div id="statusMsg" class="mt-3 small text-center"></div>
      </form>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "690621064391",
      appId: "1:690621064391:web:26ff05dfc9f116823a8d8a"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    const form = document.getElementById("availabilityForm");
    const statusMsg = document.getElementById("statusMsg");
    const submitBtn = document.getElementById("submitBtn");

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "login.html";
      } else {
        currentUser = user;
      }
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      if (!currentUser) return;

      submitBtn.disabled = true;
      statusMsg.textContent = "Saving your availability...";

      const formData = {
        uid: currentUser.uid,
        fullName: document.getElementById("fullName").value.trim(),
        jobRole: document.getElementById("jobRole").value.trim(),
        location: document.getElementById("location").value.trim(),
        availabilityDate: document.getElementById("availabilityDate").value,
        employmentType: document.getElementById("employmentType").value,
        salary: document.getElementById("salary").value.trim(),
        bio: document.getElementById("bio").value.trim(),
        email: currentUser.email,
        createdAt: serverTimestamp(),
      };

      try {
        await addDoc(collection(db, "availabilities"), formData);
        statusMsg.classList.add("text-success");
        statusMsg.textContent = "✅ Availability submitted successfully!";
        form.reset();
      } catch (err) {
        console.error(err);
        statusMsg.classList.add("text-danger");
        statusMsg.textContent = "❌ Failed to submit availability.";
      } finally {
        submitBtn.disabled = false;
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
