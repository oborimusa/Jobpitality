<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Post a Job – Jobpitality</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* Optional fine-tuning for small screens */
    @media (max-width: 576px) {
      .navbar-brand img {
        max-width: 120px; /* scale logo further down on narrow phones */
      }
    }
  </style>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "185191165097",
      appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
      measurementId: "G-SF5LWDZDKF"
    };

    const app  = initializeApp(firebaseConfig);
    const db   = getFirestore(app);
    const auth = getAuth(app);

    // Redirect if not logged in
    onAuthStateChanged(auth, (user) => {
      if (!user) {
        alert("Please log in to post a job.");
        window.location.href = "employer-login.html";
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      const form = document.getElementById('jobForm');

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const newJob = {
          title:        document.getElementById('title').value,
          location:     document.getElementById('location').value,
          type:         document.getElementById('type').value,
          salary:       document.getElementById('salary').value || 'Not specified',
          description:  document.getElementById('description').value,
          requirements: document.getElementById('requirements').value,
          createdAt:    new Date()
        };

        try {
          await addDoc(collection(db, 'jobs'), newJob);
          alert('Job posted successfully!');
          window.location.href = 'my-jobs.html';
        } catch (error) {
          alert('Error posting job: ' + error.message);
        }
      });
    });
  </script>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-white navbar-light shadow sticky-top p-0 mb-5">
    <a href="index.html" class="navbar-brand d-flex align-items-center text-center py-0 px-4 px-lg-5">
      <img src="img/final-job.png" alt="Jobpitality Logo" class="img-fluid" style="max-width:150px;">
    </a>
    <button class="navbar-toggler me-4" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarCollapse">
      <div class="navbar-nav ms-auto p-4 p-lg-0">
        <a href="home.html" class="nav-item nav-link active">Home</a>
        <a href="about.html" class="nav-item nav-link">About</a>
        <a href="services.html" class="nav-item nav-link">Services</a>

        <div class="nav-item dropdown">
          <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Employers</a>
          <div class="dropdown-menu rounded-0 m-0">
            <a href="vacancy.html" class="dropdown-item">Post a Vacancy</a>
            <a href="Request-staff.html" class="dropdown-item">Request Staff</a>
            <a href="employer-account.html" class="dropdown-item">Open an Account</a>
          </div>
        </div>

        <div class="nav-item dropdown">
          <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Job Seekers</a>
          <div class="dropdown-menu rounded-0 m-0">
            <a href="job-openings.html" class="dropdown-item">Job Openings</a>
            <a href="job-detail.html" class="dropdown-item">Job Details</a>
            <a href="application-form.html" class="dropdown-item">Upload Your Resume</a>
            <a href="seeker-account.html" class="dropdown-item">Open an Account</a>
          </div>
        </div>

        <div class="nav-item dropdown">
          <a href="#" class="nav-link dropdown-toggle" data-bs-toggle="dropdown">Pages</a>
          <div class="dropdown-menu rounded-0 m-0">
            <a href="category.html" class="dropdown-item">Job Category</a>
            <a href="testimonial.html" class="dropdown-item">Testimonial</a>
            <a href="404.html" class="dropdown-item">404</a>
          </div>
        </div>

        <a href="contact.html" class="nav-item nav-link">Contact</a>
      </div>
      <a href="vacancy.html" class="btn btn-primary rounded-0 py-4 px-lg-5 d-none d-lg-block">
        Post A Job <i class="fa fa-arrow-right ms-3"></i>
      </a>
    </div>
  </nav>
  <!-- End Navbar -->

  <!-- Job Post Form -->
  <div class="container py-5 px-3 px-md-5">
    <h2 class="text-center mb-4">Post a Job Vacancy</h2>
    <form id="jobForm" class="mx-auto" style="max-width:700px;">
      <div class="mb-3">
        <label class="form-label">Job Title</label>
        <input type="text" class="form-control" id="title" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Location</label>
        <input type="text" class="form-control" id="location" required>
      </div>

      <div class="mb-3">
        <label class="form-label">Job Type</label>
        <select class="form-select" id="type" required>
          <option value="">Select job type</option>
          <option>Full-Time</option>
          <option>Part-Time</option>
          <option>Temporary</option>
          <option>Contract</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Salary (Optional)</label>
        <input type="text" class="form-control" id="salary">
      </div>

      <div class="mb-3">
        <label class="form-label">Job Description</label>
        <textarea class="form-control" id="description" rows="4" required></textarea>
      </div>

      <div class="mb-3">
        <label class="form-label">Requirements</label>
        <textarea class="form-control" id="requirements" rows="3" required></textarea>
      </div>

      <button type="submit" class="btn btn-success w-100">Post Job</button>
    </form>
  </div>
  <!-- End Job Post Form -->

  <!-- Bootstrap JS Bundle (for navbar collapse) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
