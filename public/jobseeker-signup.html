  <div class="signup-box">
    <h3 class="text-center mb-4">Sign Up as Job Seeker</h3>
    <form id="jobseekerSignupForm">
      <div class="mb-3">
        <label for="fullName" class="form-label">Full Name</label>
        <input type="text" id="fullName" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="phone" class="form-label">Phone Number</label>
        <input type="tel" id="phone" class="form-control">
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Create Password</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Create Account</button>
    </form>
    <p class="text-center mt-3">Already registered? <a href="job-openings.html">Log in</a></p>
  </div>

  <script type="module">
  // Replace with the config you copied from Firebase Console
  const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  // Handle signup
  document.getElementById("jobseekerSignupForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const phone = document.getElementById("phone").value.trim();

    try {
      const userCredential = await auth.createUserWithEmailAndPassword(email, password);
      const user = userCredential.user;

      await db.collection("users").doc(user.uid).set({
        fullName,
        email,
        phone,
        role: "jobseeker",
        plan: "free",
        isPremium: false,
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });

      alert("✅ Account created successfully!");
      window.location.href = "dash-board.html"; // your jobseeker dashboard
    } catch (error) {
      console.error("Error during Job Seeker registration:", error);

      let message = "Registration failed. Please try again.";
      switch (error.code) {
        case "auth/weak-password":
          message = "Password must be at least 6 characters long.";
          break;
        case "auth/invalid-email":
          message = "Please enter a valid email address.";
          break;
        case "auth/email-already-in-use":
          message = "This email is already registered. Redirecting to login page...";
          alert(message);
          window.location.href = "login.html";
          return;
        default:
          message = error.message;
      }

      alert(message);
    }
  });
  
</script>
