<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employer Dashboard – Jobpitality</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="#">Jobpitality</a>
        <div class="d-flex">
          <span class="navbar-text me-3" id="welcomeText"
            >Welcome Employer</span
          >
          <button class="btn btn-outline-light btn-sm" id="logoutBtn">
            Logout
          </button>
        </div>
      </div>
    </nav>

    <div class="container my-5">
      <!-- Jobs Section -->
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>My Jobs</h2>
        <button
          class="btn btn-primary"
          data-bs-toggle="modal"
          data-bs-target="#createJobModal"
        >
          + Post New Job
        </button>
      </div>

      <table class="table table-bordered">
        <thead class="table-dark">
          <tr>
            <th>#</th>
            <th>Title</th>
            <th>Status</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody id="jobsTableBody">
          <tr>
            <td colspan="4" class="text-center">Loading jobs…</td>
          </tr>
        </tbody>
      </table>

      <!-- Applications Section -->
      <h2 class="mt-5 mb-3">Applications</h2>
      <table class="table table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th>#</th>
            <th>Job Title</th>
            <th>Applicant</th>
            <th>Email</th>
            <th>Cover Letter</th>
            <th>Resume</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="applicationsTableBody">
          <tr>
            <td colspan="7" class="text-center">Loading applications…</td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Create Job Modal -->
    <div
      class="modal fade"
      id="createJobModal"
      tabindex="-1"
      aria-labelledby="createJobLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="createJobForm">
            <div class="modal-header">
              <h5 class="modal-title" id="createJobLabel">Post New Job</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <div class="modal-body">
              <div class="mb-3">
                <label for="createJobTitle" class="form-label">Job Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="createJobTitle"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="createJobStatus" class="form-label">Status</label>
                <select class="form-select" id="createJobStatus">
                  <option value="open">Open</option>
                  <option value="closed">Closed</option>
                  <option value="paused">Paused</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>
              <button type="submit" class="btn btn-success">Post Job</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Edit Job Modal -->
    <div
      class="modal fade"
      id="editJobModal"
      tabindex="-1"
      aria-labelledby="editJobLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <form id="editJobForm">
            <div class="modal-header">
              <h5 class="modal-title" id="editJobLabel">Edit Job</h5>
              <button
                type="button"
                class="btn-close"
                data-bs-dismiss="modal"
              ></button>
            </div>
            <div class="modal-body">
              <input type="hidden" id="editJobId" />
              <div class="mb-3">
                <label for="editJobTitle" class="form-label">Job Title</label>
                <input
                  type="text"
                  class="form-control"
                  id="editJobTitle"
                  required
                />
              </div>
              <div class="mb-3">
                <label for="editJobStatus" class="form-label">Status</label>
                <select class="form-select" id="editJobStatus">
                  <option value="open">Open</option>
                  <option value="closed">Closed</option>
                  <option value="paused">Paused</option>
                </select>
              </div>
            </div>
            <div class="modal-footer">
              <button
                type="button"
                class="btn btn-secondary"
                data-bs-dismiss="modal"
              >
                Cancel
              </button>
              <button type="submit" class="btn btn-primary">
                Save Changes
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
  // Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
    authDomain: "jobpitality-1cfb2.firebaseapp.com",
    projectId: "jobpitality-1cfb2",
    storageBucket: "jobpitality-1cfb2.appspot.com",
    messagingSenderId: "185191165097",
    appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
    measurementId: "G-SF5LWDZDKF",
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let employerName = "";
  let employerId = "";
  let editModal, createModal;

  document.addEventListener("DOMContentLoaded", () => {
    editModal = new bootstrap.Modal(document.getElementById("editJobModal"));
    createModal = new bootstrap.Modal(document.getElementById("createJobModal"));
  });

  // 🔔 Toast notification
  function showToast(message, type = "success") {
    const toastEl = document.getElementById("statusToast");
    const toastMsg = document.getElementById("toastMessage");

    toastMsg.textContent = message;
    toastEl.className = `toast align-items-center text-bg-${type} border-0`;

    const toast = new bootstrap.Toast(toastEl);
    toast.show();
  }

  // 🔐 Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    auth.signOut().then(() => (window.location.href = "login.html"));
  });

  // 🔐 Auth Check
  auth.onAuthStateChanged(async (user) => {
    if (!user) return (window.location.href = "login.html");

    const doc = await db.collection("users").doc(user.uid).get();
    if (!doc.exists || doc.data().role !== "employer") {
      alert("Access denied!");
      auth.signOut().then(() => (window.location.href = "login.html"));
      return;
    }

    employerName = doc.data().fullName || "Employer";
    employerId = user.uid;
    document.getElementById("welcomeText").textContent = `Welcome ${employerName} 🏢`;

    listenToJobs();
    listenToApplications();
  });

  // 📌 Listen to Jobs
  function listenToJobs() {
    const tbody = document.getElementById("jobsTableBody");
    db.collection("jobs")
      .where("employerId", "==", employerId)
      .onSnapshot((snapshot) => {
        tbody.innerHTML = "";
        if (snapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center">No jobs found.</td></tr>`;
          return;
        }
        let idx = 1;
        snapshot.forEach((doc) => {
          const job = doc.data();
          const tr = document.createElement("tr");
          tr.innerHTML = `
            <td>${idx++}</td>
            <td>${job.title || "-"}</td>
            <td>${job.status || "-"}</td>
            <td>
              <button class="btn btn-sm btn-primary" onclick="editJob('${doc.id}', '${job.title}', '${job.status}')">Edit</button>
              <button class="btn btn-sm btn-danger" onclick="deleteJob('${doc.id}')">Delete</button>
            </td>
          `;
          tbody.appendChild(tr);
        });
      });
  }

  // 📌 Listen to Applications (with instant badge + toast)
  function listenToApplications() {
    const tbody = document.getElementById("applicationsTableBody");
    db.collection("applications")
      .where("employerId", "==", employerId)
      .onSnapshot((snapshot) => {
        tbody.innerHTML = "";
        if (snapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="7" class="text-center">No applications yet.</td></tr>`;
          return;
        }
        let idx = 1;
        snapshot.forEach((doc) => {
          const app = doc.data();
          const tr = document.createElement("tr");
          tr.id = "app-" + doc.id;

          // Badge color
          let badgeClass = "bg-secondary";
          if (app.status === "approved") badgeClass = "bg-success";
          else if (app.status === "rejected") badgeClass = "bg-danger";
          else if (app.status === "pending") badgeClass = "bg-warning text-dark";

          tr.innerHTML = `
            <td>${idx++}</td>
            <td>${app.jobTitle || "-"}</td>
            <td>${app.applicantName || "-"}</td>
            <td>${app.applicantEmail || "-"}</td>
            <td>${app.coverLetter || "-"}</td>
            <td><a href="${app.resumeUrl}" target="_blank">View Resume</a></td>
            <td>
              <span class="badge ${badgeClass} me-2 status-badge">${app.status || "pending"}</span>
              <select class="form-select form-select-sm d-inline-block w-auto app-status-select" data-id="${doc.id}">
                <option value="pending">Pending</option>
                <option value="approved">Approved</option>
                <option value="rejected">Rejected</option>
              </select>
            </td>
          `;
          tbody.appendChild(tr);

          // Dropdown + badge instant update
          const select = tr.querySelector(".app-status-select");
          const badge = tr.querySelector(".status-badge");
          select.value = app.status || "pending";

          select.addEventListener("change", (e) => {
            const newStatus = e.target.value;
            badge.textContent = newStatus;
            badge.className = "badge me-2 status-badge";
            if (newStatus === "approved") badge.classList.add("bg-success");
            else if (newStatus === "rejected") badge.classList.add("bg-danger");
            else if (newStatus === "pending") badge.classList.add("bg-warning", "text-dark");
            else badge.classList.add("bg-secondary");

            db.collection("applications").doc(doc.id).update({ status: newStatus })
              .then(() => showToast(`Status changed to ${newStatus} ✅`, "success"))
              .catch(() => showToast("Error updating status ❌", "danger"));
          });
        });
      });
  }

  // 📌 Open Edit Modal
  function editJob(id, title, status) {
    document.getElementById("editJobId").value = id;
    document.getElementById("editJobTitle").value = title;
    document.getElementById("editJobStatus").value = status;
    editModal.show();
  }

  // 📌 Save Job Changes
  document.getElementById("editJobForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const id = document.getElementById("editJobId").value;
    const title = document.getElementById("editJobTitle").value;
    const status = document.getElementById("editJobStatus").value;

    try {
      await db.collection("jobs").doc(id).update({ title, status });
      editModal.hide();
      showToast("Job updated ✅", "success");
    } catch (err) {
      console.error("Error updating job:", err);
      showToast("Failed to update job ❌", "danger");
    }
  });

  // 📌 Create New Job
  document.getElementById("createJobForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const title = document.getElementById("createJobTitle").value;
    const status = document.getElementById("createJobStatus").value;

    try {
      await db.collection("jobs").add({
        title,
        status,
        employerId,
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
      createModal.hide();
      e.target.reset();
      showToast("Job created ✅", "success");
    } catch (err) {
      console.error("Error creating job:", err);
      showToast("Failed to create job ❌", "danger");
    }
  });

  // 📌 Delete Job
  async function deleteJob(id) {
    if (confirm("Are you sure you want to delete this job?")) {
      try {
        await db.collection("jobs").doc(id).delete();
        showToast("Job deleted ✅", "success");
      } catch (err) {
        console.error("Error deleting job:", err);
        showToast("Failed to delete job ❌", "danger");
      }
    }
  }
</script>

<!-- ✅ Toast Container -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 1100">
  <div id="statusToast" class="toast align-items-center text-bg-success border-0" role="alert" aria-live="assertive" aria-atomic="true">
    <div class="d-flex">
      <div class="toast-body" id="toastMessage">Status updated successfully ✅</div>
      <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
    </div>
  </div>
</div>
  </body>
</html>
