<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Employer Dashboard | Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>
<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-dark bg-success">
  <div class="container-fluid d-flex justify-content-between align-items-center">
    <a class="navbar-brand fw-bold">Employer Dashboard</a>
    <button class="btn btn-danger" id="logoutBtn">Logout</button>
  </div>
</nav>

<!-- Dashboard Content -->
<div class="container py-5">
  <h2 class="fw-bold">Welcome Employer 🏢</h2>
  <p class="mb-4">Manage your job postings below.</p>

  <!-- Post Job Button -->
  <button class="btn btn-success mb-4" data-bs-toggle="modal" data-bs-target="#jobModal">
    + Post New Job
  </button>

  <!-- Job Listings Table -->
  <div class="card shadow-sm">
    <div class="card-header bg-success text-white">
      <h5 class="mb-0">Your Job Postings</h5>
    </div>
    <div class="card-body">
      <table class="table table-bordered align-middle">
        <thead class="table-light">
          <tr>
            <th>Title</th>
            <th>Location</th>
            <th>Type</th>
            <th>Experience</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="jobsTable">
          <tr><td colspan="5" class="text-center text-muted">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Job Modal -->
<div class="modal fade" id="jobModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <form id="jobForm">
        <div class="modal-header bg-success text-white">
          <h5 class="modal-title">Post / Edit Job</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="jobId" />
          <div class="mb-3">
            <label class="form-label">Job Title</label>
            <input type="text" id="jobTitle" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" id="jobLocation" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Type</label>
            <select id="jobType" class="form-select" required>
              <option value="Full-time">Full-time</option>
              <option value="Part-time">Part-time</option>
              <option value="Contract">Contract</option>
            </select>
          </div>
          <div class="mb-3">
            <label class="form-label">Experience</label>
            <input type="text" id="jobExperience" class="form-control" required />
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea id="jobDescription" class="form-control" rows="3" required></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="submit" class="btn btn-success">Save Job</button>
        </div>
      </form>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // Firebase config
  const firebaseConfig = {
    apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
    authDomain: "jobpitality-1cfb2.firebaseapp.com",
    projectId: "jobpitality-1cfb2",
    storageBucket: "jobpitality-1cfb2.appspot.com",
    messagingSenderId: "185191165097",
    appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
    measurementId: "G-SF5LWDZDKF"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  let currentUser;

  // Auth check
  auth.onAuthStateChanged(async user => {
    if (!user) return window.location.href = "login.html";
    const doc = await db.collection("users").doc(user.uid).get();
    if (!doc.exists || doc.data().role !== "employer") {
      alert("Access denied!");
      auth.signOut();
      return window.location.href = "login.html";
    }
    currentUser = user;
    loadJobs();
  });

  // Logout
  document.getElementById("logoutBtn").addEventListener("click", () => {
    auth.signOut().then(() => window.location.href = "login.html");
  });

  // Load employer's jobs
  async function loadJobs() {
    const jobsTable = document.getElementById("jobsTable");
    jobsTable.innerHTML = "<tr><td colspan='5' class='text-center text-muted'>Loading...</td></tr>";

    const snapshot = await db.collection("jobs").where("employerId", "==", currentUser.uid).get();
    if (snapshot.empty) {
      jobsTable.innerHTML = "<tr><td colspan='5' class='text-center text-muted'>No jobs posted yet.</td></tr>";
      return;
    }

    jobsTable.innerHTML = "";
    snapshot.forEach(doc => {
      const job = doc.data();
      const row = `
        <tr>
          <td>${job.title}</td>
          <td>${job.location}</td>
          <td>${job.type}</td>
          <td>${job.experience}</td>
          <td>
            <button class="btn btn-sm btn-primary" onclick="editJob('${doc.id}')">Edit</button>
            <button class="btn btn-sm btn-danger" onclick="deleteJob('${doc.id}')">Delete</button>
          </td>
        </tr>`;
      jobsTable.innerHTML += row;
    });
  }

  // Add or Update Job
  document.getElementById("jobForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const jobId = document.getElementById("jobId").value;
    const jobData = {
      title: document.getElementById("jobTitle").value,
      location: document.getElementById("jobLocation").value,
      type: document.getElementById("jobType").value,
      experience: document.getElementById("jobExperience").value,
      description: document.getElementById("jobDescription").value,
      employerId: currentUser.uid,
      postedAt: new Date()
    };

    if (jobId) {
      await db.collection("jobs").doc(jobId).update(jobData);
      alert("Job updated successfully!");
    } else {
      await db.collection("jobs").add(jobData);
      alert("Job posted successfully!");
    }

    document.getElementById("jobForm").reset();
    document.getElementById("jobId").value = "";
    const modal = bootstrap.Modal.getInstance(document.getElementById("jobModal"));
    modal.hide();
    loadJobs();
  });

  // Edit Job
  async function editJob(id) {
    const doc = await db.collection("jobs").doc(id).get();
    if (!doc.exists) return alert("Job not found!");

    const job = doc.data();
    document.getElementById("jobId").value = id;
    document.getElementById("jobTitle").value = job.title;
    document.getElementById("jobLocation").value = job.location;
    document.getElementById("jobType").value = job.type;
    document.getElementById("jobExperience").value = job.experience;
    document.getElementById("jobDescription").value = job.description;

    const modal = new bootstrap.Modal(document.getElementById("jobModal"));
    modal.show();
  }

  // Delete Job
  async function deleteJob(id) {
    if (confirm("Are you sure you want to delete this job?")) {
      await db.collection("jobs").doc(id).delete();
      alert("Job deleted successfully!");
      loadJobs();
    }
  }
</script>

</body>
</html>
