<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Job Details – Jobpitality</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">Jobpitality</a>
      </div>
    </nav>

    <!-- Job Detail Section -->
    <main class="container my-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card shadow-sm">
            <div class="card-body">
              <span id="jobType" class="badge bg-primary mb-3"></span>
              <h2 id="jobTitle">Loading...</h2>
              <p class="text-muted mb-2" id="jobEmployer"></p>
              <p class="text-muted small" id="jobLocation"></p>
              <hr />
              <h5>Description</h5>
              <p id="jobDescription"></p>
              <h5>Requirements</h5>
              <ul id="jobRequirements"></ul>
            </div>
            <div class="card-footer text-end">
              <button class="btn btn-primary" id="applyBtn">Apply Now</button>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

    <script>
      // Firebase Config
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "jobpitality-1cfb2.firebaseapp.com",
        projectId: "jobpitality-1cfb2",
        storageBucket: "jobpitality-1cfb2.appspot.com",
        messagingSenderId: "185191165097",
        appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
        measurementId: "G-SF5LWDZDKF",
      };
      firebase.initializeApp(firebaseConfig);
      const db = firebase.firestore();

      // ✅ Helper: Get jobId from URL (job-detail.html?jobId=XYZ)
      function getJobIdFromURL() {
        const params = new URLSearchParams(window.location.search);
        return params.get("jobId");
      }

      // ✅ Load Job Detail
      async function loadJobDetail() {
        const jobId = getJobIdFromURL();

        const jobTitle = document.getElementById("jobTitle");
        const jobEmployer = document.getElementById("jobEmployer");
        const jobLocation = document.getElementById("jobLocation");
        const jobType = document.getElementById("jobType");
        const jobDescription = document.getElementById("jobDescription");
        const jobRequirements = document.getElementById("jobRequirements");
        const applyBtn = document.getElementById("applyBtn");

        if (!jobId) {
          jobTitle.innerText = "Job not found";
          return;
        }

        try {
          const doc = await db.collection("jobs").doc(jobId).get();
          if (!doc.exists) {
            jobTitle.innerText = "Job not found";
            return;
          }

          const job = doc.data();

          jobTitle.innerText = job.title || "Untitled Job";
          jobEmployer.innerText = job.employer || "";
          jobLocation.innerText = job.location || "Unknown location";
          jobType.innerText = job.type || "N/A";
          jobDescription.innerText =
            job.description || "No description available";

          // Requirements (if array)
          jobRequirements.innerHTML = "";
          if (Array.isArray(job.requirements)) {
            job.requirements.forEach((r) => {
              const li = document.createElement("li");
              li.textContent = r;
              jobRequirements.appendChild(li);
            });
          } else {
            jobRequirements.innerHTML = "<li>Not specified</li>";
          }

          // Apply button
          applyBtn.onclick = () => {
            window.location.href = `apply.html?jobId=${jobId}`;
          };
        } catch (err) {
          console.error("❌ Error loading job detail:", err);
          jobTitle.innerText = "Error loading job";
        }
      }

      loadJobDetail();
    </script>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
      <p class="mb-0">&copy; 2025 Jobpitality. All rights reserved.</p>
    </footer>
  </body>
</html>
