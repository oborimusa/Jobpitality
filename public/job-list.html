<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Job Listings – Jobpitality</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

  <style>
    body { background-color: #f8f9fa; }
    @media (max-width: 575.98px) {
      .page-header h1 { font-size: 1.75rem; }
      .job-card .card-body p { font-size: 0.9rem; }

    }

    

    
  </style>
</head>

<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow sticky-top p-0">
    <a href="index.html" class="navbar-brand d-flex align-items-center text-center py-0 px-4 px-lg-5 m-2">
      <div class="img pb-2 pt-2">
        <img src="img/final-job.png" alt="Logo" style="width: 20%; height: auto; margin: 2px 0;">
      </div>
    </a>
    <button class="navbar-toggler me-3" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarCollapse">
      <div class="navbar-nav ms-auto p-3">
        <a href="index.html" class="nav-item nav-link">Home</a>
        <a href="about.html" class="nav-item nav-link">About</a>
        <a href="contact.html" class="nav-item nav-link">Contact</a>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="text-center mb-4">Current Job Openings</h2>

    <!-- Search Form -->
    <form id="searchForm" class="row g-3 justify-content-center mb-4">
      <div class="col-12 col-md-4">
        <input type="text" class="form-control" id="searchTitle" placeholder="Job title or keyword" />
      </div>
      <div class="col-12 col-md-3">
        <input type="text" class="form-control" id="searchLocation" placeholder="Location" />
      </div>
      <div class="col-12 col-md-2">
        <button class="btn btn-primary w-100" type="submit">Search</button>
      </div>
    </form>

    <!-- Job Listings -->
    <div id="jobListings" class="row g-4">
      <p class="text-muted text-center">Loading jobs…</p>
    </div>
  </div>

  <!-- Firebase (Modular SDK) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } 
      from "https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "185191165097",
      appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
      measurementId: "G-SF5LWDZDKF"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function loadJobs() {
      const container = document.getElementById("jobListings");
      container.innerHTML = "";

      try {
        const q = query(collection(db, "jobs"), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          container.innerHTML = '<p class="text-muted text-center">No job postings found.</p>';
          return;
        }

        snapshot.forEach(doc => {
          const job = doc.data();
          container.innerHTML += `
            <div class="col-12 col-md-4">
              <div class="card job-card h-100 shadow-sm">
                <div class="card-body">
                  <h5 class="card-title">${job.title}</h5>
                  <p class="card-text"><strong>Location:</strong> ${job.location || "Not specified"}</p>
                  ${job.type ? `<p class="card-text"><strong>Type:</strong> ${job.type}</p>` : ""}
                  ${job.salary ? `<p class="card-text"><strong>Salary:</strong> ${job.salary}</p>` : ""}
                  <p class="card-text"><strong>Description:</strong> ${job.description || ""}</p>
                  ${job.requirements ? `<p class="card-text"><strong>Requirements:</strong> ${job.requirements}</p>` : ""}
                </div>
              </div>
            </div>`;
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p class="text-danger text-center">Failed to load jobs.</p>';
      }
    }

    // Simple client-side search filter
    document.getElementById("searchForm").addEventListener("submit", e => {
      e.preventDefault();
      const titleFilter = document.getElementById("searchTitle").value.toLowerCase();
      const locationFilter = document.getElementById("searchLocation").value.toLowerCase();
      const cards = document.querySelectorAll("#jobListings .card");
      cards.forEach(card => {
        const text = card.innerText.toLowerCase();
        const show = (!titleFilter || text.includes(titleFilter)) &&
                     (!locationFilter || text.includes(locationFilter));
        card.parentElement.style.display = show ? "" : "none";
      });
    });

    loadJobs();
  </script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
