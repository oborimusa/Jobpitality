<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Player - Jobpitality</title>
    
    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #4169e1;
            --primary-dark: #3151c9;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --light-text: #6c757d;
            --border-radius: 12px;
            --shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
        }
        
        body {
            font-family: "Heebo", sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            padding-top: 76px;
        }
        
        .course-header {
            background: linear-gradient(135deg, var(--primary-color), #5a7df5);
            color: white;
            padding: 2rem 0;
        }
        
        .sidebar {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            height: fit-content;
            position: sticky;
            top: 90px;
        }
        
        .content-area {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            min-height: 500px;
        }
        
        .module-item {
            padding: 1rem;
            border-bottom: 1px solid #e9ecef;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .module-item:hover {
            background-color: #f8f9fa;
        }
        
        .module-item.active {
            background-color: rgba(65, 105, 225, 0.1);
            border-left: 4px solid var(--primary-color);
        }
        
        .lesson-item {
            padding: 0.75rem 1rem 0.75rem 2rem;
            border-bottom: 1px solid #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .lesson-item:hover {
            background-color: #f8f9fa;
        }
        
        .lesson-item.active {
            background-color: rgba(65, 105, 225, 0.05);
            color: var(--primary-color);
            font-weight: 500;
        }
        
        .lesson-item.completed::before {
            content: "✓ ";
            color: #28a745;
            font-weight: bold;
        }
        
        .video-container {
            background: #000;
            border-radius: var(--border-radius);
            overflow: hidden;
            margin-bottom: 1.5rem;
        }
        
        .video-placeholder {
            width: 100%;
            height: 400px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 4rem;
        }
        
        .content-section {
            padding: 2rem;
        }
        
        .quiz-option {
            padding: 1rem;
            margin-bottom: 0.5rem;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .quiz-option:hover {
            border-color: var(--primary-color);
        }
        
        .quiz-option.selected {
            border-color: var(--primary-color);
            background-color: rgba(65, 105, 225, 0.1);
        }

        .lessons-container {
            display: none;
        }

        .lessons-container.show {
            display: block;
        }

        .module-header {
            display: flex;
            justify-content: between;
            align-items: center;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white fixed-top shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <img src="img/final-job.png" alt="Jobpitality" style="height: 40px">
            </a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="mylearning.html">
                    <i class="fas fa-arrow-left me-1"></i>Back to Learning
                </a>
            </div>
        </div>
    </nav>

    <!-- Course Header -->
    <div class="course-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-8">
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb mb-2">
                            <li class="breadcrumb-item"><a href="mylearning.html" class="text-white">My Learning</a></li>
                            <li class="breadcrumb-item text-white" id="courseCategory">Course</li>
                            <li class="breadcrumb-item active text-white" id="courseTitle">Loading...</li>
                        </ol>
                    </nav>
                    <h2 id="courseTitleHeader">Loading Course...</h2>
                    <p class="mb-0" id="courseDescription"></p>
                </div>
                <div class="col-md-4 text-md-end">
                    <div class="bg-white rounded p-3 text-dark">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <span>Your Progress</span>
                            <span id="courseProgress">0%</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container mt-4">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-lg-4 mb-4">
                <div class="sidebar">
                    <div class="p-3 border-bottom">
                        <h5 class="mb-0"><i class="fas fa-list-ul me-2"></i>Course Content</h5>
                    </div>
                    <div id="courseContent">
                        <!-- Course modules and lessons will be loaded here -->
                    </div>
                </div>
            </div>

            <!-- Content Area -->
            <div class="col-lg-8">
                <div class="content-area">
                    <div id="lessonContent">
                        <div class="content-section text-center">
                            <i class="fas fa-play-circle fa-4x text-muted mb-3"></i>
                            <h4>Welcome to Your Course</h4>
                            <p class="text-muted">Select a lesson from the sidebar to start learning</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Course content data
        const courseContent = {
            "front-office": {
                title: "Front Office Essentials",
                category: "Front Office",
                description: "Master reception, guest check-in procedures, phone etiquette, and reservation systems.",
                modules: [
                    {
                        title: "Introduction to Front Office",
                        lessons: [
                            {
                                id: "fo-1-1",
                                title: "Welcome to Front Office Operations",
                                type: "video",
                                duration: "5:30",
                                content: `
                                    <div class="content-section">
                                        <h3>Welcome to Front Office Operations</h3>
                                        <div class="video-container">
                                            <div class="video-placeholder">
                                                <i class="fas fa-play-circle"></i>
                                            </div>
                                        </div>
                                        <div class="mt-4">
                                            <h5>Course Overview</h5>
                                            <p>This comprehensive course will equip you with the essential skills needed to excel in front office operations within the hospitality industry.</p>
                                            
                                            <div class="row mt-4">
                                                <div class="col-md-6">
                                                    <div class="card border-primary mb-3">
                                                        <div class="card-header bg-primary text-white">
                                                            <i class="fas fa-check-circle me-2"></i>What You'll Learn
                                                        </div>
                                                        <div class="card-body">
                                                            <ul class="mb-0">
                                                                <li>Guest registration procedures</li>
                                                                <li>Effective communication techniques</li>
                                                                <li>Reservation system management</li>
                                                                <li>Problem-solving strategies</li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="card border-success mb-3">
                                                        <div class="card-header bg-success text-white">
                                                            <i class="fas fa-trophy me-2"></i>Skills You'll Gain
                                                        </div>
                                                        <div class="card-body">
                                                            <ul class="mb-0">
                                                                <li>Professional guest service</li>
                                                                <li>Conflict resolution</li>
                                                                <li>Time management</li>
                                                                <li>Team coordination</li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `
                            },
                            {
                                id: "fo-1-2",
                                title: "The Role of Front Office Staff",
                                type: "video",
                                duration: "8:15",
                                content: `
                                    <div class="content-section">
                                        <h3>The Role of Front Office Staff</h3>
                                        <div class="video-container">
                                            <div class="video-placeholder">
                                                <i class="fas fa-play-circle"></i>
                                            </div>
                                        </div>
                                        <div class="mt-4">
                                            <h5>Key Responsibilities</h5>
                                            <p>Front office staff serve as the face of the establishment and play a crucial role in ensuring guest satisfaction and smooth operations.</p>
                                            
                                            <div class="row mt-4">
                                                <div class="col-md-6">
                                                    <h6>Primary Duties:</h6>
                                                    <ul>
                                                        <li>Guest registration and check-in</li>
                                                        <li>Room assignment and key management</li>
                                                        <li>Information and concierge services</li>
                                                        <li>Payment processing</li>
                                                    </ul>
                                                </div>
                                                <div class="col-md-6">
                                                    <h6>Secondary Duties:</h6>
                                                    <ul>
                                                        <li>Mail and message handling</li>
                                                        <li>Safety deposit services</li>
                                                        <li>Emergency procedure coordination</li>
                                                        <li>Guest complaint resolution</li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `
                            }
                        ]
                    },
                    {
                        title: "Guest Services Excellence",
                        lessons: [
                            {
                                id: "fo-2-1",
                                title: "Communication Skills Mastery",
                                type: "video",
                                duration: "12:20",
                                content: `
                                    <div class="content-section">
                                        <h3>Communication Skills Mastery</h3>
                                        <div class="video-container">
                                            <div class="video-placeholder">
                                                <i class="fas fa-play-circle"></i>
                                            </div>
                                        </div>
                                        <div class="mt-4">
                                            <h5>Effective Communication Principles</h5>
                                            <p>Mastering communication is essential for providing exceptional guest service and building lasting relationships.</p>
                                            
                                            <div class="alert alert-info mt-3">
                                                <h6><i class="fas fa-lightbulb me-2"></i>Professional Tip</h6>
                                                Always maintain eye contact and use the guest's name when possible to create a personalized experience.
                                            </div>
                                            
                                            <div class="row mt-4">
                                                <div class="col-md-6">
                                                    <div class="card border-success mb-3">
                                                        <div class="card-header bg-success text-white">
                                                            <i class="fas fa-check me-2"></i>Best Practices
                                                        </div>
                                                        <div class="card-body">
                                                            <ul class="mb-0">
                                                                <li>Active listening techniques</li>
                                                                <li>Clear and concise speech</li>
                                                                <li>Empathetic responses</li>
                                                                <li>Positive language usage</li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                                <div class="col-md-6">
                                                    <div class="card border-danger mb-3">
                                                        <div class="card-header bg-danger text-white">
                                                            <i class="fas fa-times me-2"></i>Avoid These
                                                        </div>
                                                        <div class="card-body">
                                                            <ul class="mb-0">
                                                                <li>Interrupting guests</li>
                                                                <li>Using technical jargon</li>
                                                                <li>Making assumptions</li>
                                                                <li>Showing frustration</li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `
                            }
                        ]
                    }
                ]
            },
            "kitchen-safety": {
                title: "Kitchen Hygiene & Safety",
                category: "Kitchen",
                description: "Comprehensive food safety training, HACCP basics, cleaning routines, and kitchen safety protocols.",
                modules: [
                    {
                        title: "Food Safety Fundamentals",
                        lessons: [
                            {
                                id: "ks-1-1",
                                title: "Introduction to Food Safety",
                                type: "video",
                                duration: "6:45",
                                content: `
                                    <div class="content-section">
                                        <h3>Introduction to Food Safety</h3>
                                        <div class="video-container">
                                            <div class="video-placeholder">
                                                <i class="fas fa-play-circle"></i>
                                            </div>
                                        </div>
                                        <div class="mt-4">
                                            <h5>Why Food Safety Matters</h5>
                                            <p>Food safety is critical in preventing foodborne illnesses and ensuring the wellbeing of both guests and staff.</p>
                                            
                                            <div class="row mt-4 text-center">
                                                <div class="col-md-4">
                                                    <div class="p-3 border rounded">
                                                        <i class="fas fa-bacteria fa-2x text-danger mb-2"></i>
                                                        <h6>Prevent Illness</h6>
                                                        <small class="text-muted">Stop foodborne diseases</small>
                                                    </div>
                                                </div>
                                                <div class="col-md-4">
                                                    <div class="p-3 border rounded">
                                                        <i class="fas fa-shield-alt fa-2x text-warning mb-2"></i>
                                                        <h6>Legal Compliance</h6>
                                                        <small class="text-muted">Meet health regulations</small>
                                                    </div>
                                                </div>
                                                <div class="col-md-4">
                                                    <div class="p-3 border rounded">
                                                        <i class="fas fa-award fa-2x text-success mb-2"></i>
                                                        <h6>Quality Standards</h6>
                                                        <small class="text-muted">Maintain excellence</small>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                `
                            }
                        ]
                    }
                ]
            }
        };

        // Global variables
        let currentCourse = null;
        let currentLessonElement = null;

        // Initialize course player
        document.addEventListener('DOMContentLoaded', function() {
            initializeCoursePlayer();
        });

        function initializeCoursePlayer() {
            const urlParams = new URLSearchParams(window.location.search);
            const courseId = urlParams.get('course') || 'front-office'; // Default to front-office if no course specified
            
            if (courseContent[courseId]) {
                currentCourse = courseContent[courseId];
                loadCourse(courseId);
            } else {
                showCourseNotFound();
            }
        }

        function showCourseNotFound() {
            document.getElementById('lessonContent').innerHTML = `
                <div class="content-section text-center">
                    <i class="fas fa-exclamation-triangle fa-4x text-warning mb-3"></i>
                    <h4>Course Not Found</h4>
                    <p class="text-muted">The requested course could not be loaded.</p>
                    <a href="mylearning.html" class="btn btn-primary">Return to My Learning</a>
                </div>
            `;
        }

        // Load course data
        function loadCourse(courseId) {
            const course = courseContent[courseId];
            
            // Update page information
            document.title = `${course.title} - Jobpitality`;
            document.getElementById('courseTitle').textContent = course.title;
            document.getElementById('courseTitleHeader').textContent = course.title;
            document.getElementById('courseCategory').textContent = course.category;
            document.getElementById('courseDescription').textContent = course.description;
            
            // Load course content
            loadCourseContent(course);
            
            // Update progress
            updateProgress(courseId);
        }

        // Load course modules and lessons
        function loadCourseContent(course) {
            const contentContainer = document.getElementById('courseContent');
            contentContainer.innerHTML = '';
            
            course.modules.forEach((module, moduleIndex) => {
                // Create module element
                const moduleElement = document.createElement('div');
                moduleElement.className = 'module-item';
                moduleElement.innerHTML = `
                    <div class="d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">${module.title}</h6>
                        <small class="text-muted">${module.lessons.length} lesson${module.lessons.length !== 1 ? 's' : ''}</small>
                    </div>
                `;
                
                // Create lessons container
                const lessonsContainer = document.createElement('div');
                lessonsContainer.className = 'lessons-container';
                if (moduleIndex === 0) {
                    lessonsContainer.classList.add('show');
                }
                
                module.lessons.forEach((lesson, lessonIndex) => {
                    const isCompleted = checkLessonCompleted(lesson.id);
                    const lessonElement = document.createElement('div');
                    lessonElement.className = `lesson-item ${isCompleted ? 'completed' : ''}`;
                    lessonElement.setAttribute('data-lesson-id', lesson.id);
                    lessonElement.innerHTML = `
                        <div class="d-flex justify-content-between align-items-center">
                            <span>${lesson.title}</span>
                            <small class="text-muted">${lesson.duration}</small>
                        </div>
                    `;
                    
                    // Add click event listener
                    lessonElement.addEventListener('click', function() {
                        loadLesson(lesson, course, this);
                    });
                    
                    lessonsContainer.appendChild(lessonElement);
                    
                    // Auto-load first lesson of first module
                    if (moduleIndex === 0 && lessonIndex === 0) {
                        setTimeout(() => {
                            loadLesson(lesson, course, lessonElement);
                        }, 100);
                    }
                });
                
                // Toggle lessons visibility
                moduleElement.addEventListener('click', function(e) {
                    // Don't toggle if clicking on a lesson item
                    if (e.target.closest('.lesson-item')) return;
                    
                    const isVisible = lessonsContainer.classList.contains('show');
                    document.querySelectorAll('.lessons-container').forEach(container => {
                        container.classList.remove('show');
                    });
                    
                    if (!isVisible) {
                        lessonsContainer.classList.add('show');
                    }
                });
                
                contentContainer.appendChild(moduleElement);
                contentContainer.appendChild(lessonsContainer);
            });
        }

        // Load a specific lesson
        function loadLesson(lesson, course, lessonElement) {
            console.log('Loading lesson:', lesson.title);
            
            // Update lesson content
            document.getElementById('lessonContent').innerHTML = lesson.content;
            
            // Update active states
            document.querySelectorAll('.lesson-item').forEach(item => {
                item.classList.remove('active');
            });
            lessonElement.classList.add('active');
            currentLessonElement = lessonElement;
            
            // Store current lesson
            localStorage.setItem('currentLessonId', lesson.id);
            
            // Mark lesson as completed after viewing time
            if (!checkLessonCompleted(lesson.id)) {
                setTimeout(() => {
                    markLessonCompleted(lesson.id);
                    updateProgress(getCurrentCourseId());
                    lessonElement.classList.add('completed');
                    console.log(`Lesson ${lesson.id} marked as completed`);
                }, 10000); // 10 seconds
            }
        }

        // Check if lesson is completed
        function checkLessonCompleted(lessonId) {
            try {
                const completed = JSON.parse(localStorage.getItem('completedLessons') || '{}');
                return completed[lessonId] || false;
            } catch (e) {
                console.error('Error reading completed lessons:', e);
                return false;
            }
        }

        // Mark lesson as completed
        function markLessonCompleted(lessonId) {
            try {
                const completed = JSON.parse(localStorage.getItem('completedLessons') || '{}');
                completed[lessonId] = true;
                localStorage.setItem('completedLessons', JSON.stringify(completed));
                console.log(`Lesson ${lessonId} completed and saved`);
            } catch (e) {
                console.error('Error saving completed lesson:', e);
            }
        }

        // Get current course ID from URL
        function getCurrentCourseId() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('course') || 'front-office';
        }

        // Update progress display
        function updateProgress(courseId) {
            const course = courseContent[courseId];
            if (!course) return;
            
            const totalLessons = course.modules.reduce((total, module) => total + module.lessons.length, 0);
            const completedLessons = course.modules.reduce((total, module) => {
                return total + module.lessons.filter(lesson => checkLessonCompleted(lesson.id)).length;
            }, 0);
            
            const progressPercentage = totalLessons > 0 ? Math.round((completedLessons / totalLessons) * 100) : 0;
            
            const progressElement = document.getElementById('courseProgress');
            const progressBar = document.getElementById('progressBar');
            
            if (progressElement) progressElement.textContent = `${progressPercentage}%`;
            if (progressBar) progressBar.style.width = `${progressPercentage}%`;
            
            console.log(`Progress updated: ${completedLessons}/${totalLessons} (${progressPercentage}%)`);
        }

        // Add keyboard navigation
        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') {
                navigateToAdjacentLesson(1);
            } else if (event.key === 'ArrowLeft') {
                navigateToAdjacentLesson(-1);
            }
        });

        function navigateToAdjacentLesson(direction) {
            if (!currentLessonElement) return;
            
            const allLessons = Array.from(document.querySelectorAll('.lesson-item'));
            const currentIndex = allLessons.indexOf(currentLessonElement);
            const newIndex = currentIndex + direction;
            
            if (newIndex >= 0 && newIndex < allLessons.length) {
                const newLessonElement = allLessons[newIndex];
                const lessonId = newLessonElement.getAttribute('data-lesson-id');
                const lesson = findLessonById(lessonId);
                
                if (lesson && currentCourse) {
                    // Trigger click event on the lesson element
                    newLessonElement.click();
                }
            }
        }

        function findLessonById(lessonId) {
            if (!currentCourse) return null;
            
            for (const module of currentCourse.modules) {
                for (const lesson of module.lessons) {
                    if (lesson.id === lessonId) {
                        return lesson;
                    }
                }
            }
            return null;
        }

        // Initialize progress on load
        setTimeout(() => {
            updateProgress(getCurrentCourseId());
        }, 500);
    </script>
</body>
</html>
