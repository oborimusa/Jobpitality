<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In | Jobpitality</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary-color: #4169e1;
        --primary-dark: #3151c9;
        --success-color: #28a745;
        --warning-color: #ffc107;
      }
      
      body {
        background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        display: flex;
        align-items: center;
      }
      
      .login-container {
        max-width: 450px;
        width: 100%;
        margin: 0 auto;
      }
      
      .card {
        border: none;
        border-radius: 16px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }
      
      .card-header {
        background: linear-gradient(135deg, var(--primary-color), #5a7df5);
        color: white;
        text-align: center;
        padding: 2rem 1rem;
        border-bottom: none;
      }
      
      .logo {
        text-align: center;
        margin-bottom: 1.5rem;
      }
      
      .logo img {
        max-width: 220px;
        height: auto;
        filter: brightness(0) invert(1);
      }
      
      .form-control {
        border-radius: 8px;
        padding: 0.75rem 1rem;
        border: 1px solid #dee2e6;
        transition: all 0.3s;
      }
      
      .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 0.2rem rgba(65, 105, 225, 0.25);
      }
      
      .btn-primary {
        background: linear-gradient(135deg, var(--primary-color), #5a7df5);
        border: none;
        border-radius: 8px;
        padding: 0.75rem;
        font-weight: 600;
        transition: all 0.3s;
      }
      
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(65, 105, 225, 0.3);
      }
      
      .forgot-link {
        text-align: right;
        margin-bottom: 1.5rem;
      }
      
      .forgot-link a {
        font-size: 0.9rem;
        color: var(--primary-color);
        text-decoration: none;
        transition: color 0.2s;
      }
      
      .forgot-link a:hover {
        color: var(--primary-dark);
        text-decoration: underline;
      }
      
      .divider {
        display: flex;
        align-items: center;
        margin: 1.5rem 0;
      }
      
      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #dee2e6;
      }
      
      .divider-text {
        padding: 0 1rem;
        color: #6c757d;
        font-size: 0.9rem;
      }
      
      .role-badges {
        display: flex;
        justify-content: center;
        gap: 10px;
        margin-top: 1rem;
      }
      
      .role-badge {
        background: rgba(255, 255, 255, 0.2);
        color: white;
        padding: 0.25rem 0.75rem;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 500;
      }
      
      .footer-links {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
      }
      
      .footer-links a {
        color: #6c757d;
        text-decoration: none;
        margin: 0 0.5rem;
      }
      
      .footer-links a:hover {
        color: var(--primary-color);
        text-decoration: underline;
      }
      
      .loading-spinner {
        display: inline-block;
        width: 1rem;
        height: 1rem;
        border: 2px solid transparent;
        border-top: 2px solid currentColor;
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
      }
      
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      
      .password-toggle {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        color: #6c757d;
        cursor: pointer;
      }
      
      .password-container {
        position: relative;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="login-container">
        <!-- Login Card -->
        <div class="card">
          <div class="card-header">
            <div class="logo">
              <img src="img/final-job.png" alt="Jobpitality Logo" />
            </div>
            <h4 class="mb-0">Welcome to Jobpitality</h4>
            <p class="mb-0 mt-2 opacity-75">Sign in to your account</p>
            
            <div class="role-badges">
              <span class="role-badge">Job Seekers</span>
              <span class="role-badge">Employers</span>
              <span class="role-badge">Administrators</span>
            </div>
          </div>
          
          <div class="card-body p-4">
            <form id="loginForm">
              <div class="mb-3">
                <label for="email" class="form-label fw-semibold">Email Address</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  required
                  placeholder="Enter your email address"
                />
              </div>
              
              <div class="mb-1">
                <label for="password" class="form-label fw-semibold">Password</label>
                <div class="password-container">
                  <input
                    type="password"
                    class="form-control"
                    id="password"
                    required
                    placeholder="Enter your password"
                  />
                  <button type="button" class="password-toggle" id="passwordToggle">
                    <i class="bi bi-eye"></i>
                  </button>
                </div>
              </div>

              <!-- Forgot Password -->
              <div class="forgot-link">
                <a href="#" id="forgotPasswordLink">Forgot your password?</a>
              </div>

              <button
                type="submit"
                class="btn btn-primary w-100 mb-3"
                id="loginBtn"
              >
                Sign In
              </button>
              
              <div class="divider">
                <span class="divider-text">New to Jobpitality?</span>
              </div>
              
              <div class="d-grid gap-2">
                <a href="register.html" class="btn btn-outline-primary">
                  Create an Account
                </a>
              </div>
            </form>

            <!-- Message Display -->
            <div id="message" class="mt-3"></div>
          </div>
          
          <div class="card-footer bg-transparent border-top-0 pt-0">
            <div class="footer-links">
              <a href="privacy.html">Privacy Policy</a>
              <a href="terms.html">Terms of Service</a>
              <a href="support.html">Contact Support</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
      import {
        getAuth,
        signInWithEmailAndPassword,
        sendPasswordResetEmail,
      } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc,
      } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

      // Firebase Configuration
      const firebaseConfig = {
        apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
        authDomain: "jobpitality-1cfb2.firebaseapp.com",
        projectId: "jobpitality-1cfb2",
        storageBucket: "jobpitality-1cfb2.appspot.com",
        messagingSenderId: "185191165097",
        appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
      };

      // Initialize Firebase
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // Ensure user Firestore profile exists
      async function ensureUserProfile(user) {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          console.log("Creating Firestore profile for:", user.email);
          await setDoc(userRef, {
            email: user.email,
            role: "jobseeker",
            name: user.displayName || user.email.split("@")[0],
            createdAt: new Date(),
            isActive: true,
            lastLogin: new Date()
          });
          return "jobseeker";
        } else {
          // Update last login time
          await setDoc(userRef, {
            lastLogin: new Date()
          }, { merge: true });
          
          const data = userSnap.data();
          return data.role || "jobseeker";
        }
      }

      // Login function
      async function loginUser(email, password) {
        try {
          const userCredential = await signInWithEmailAndPassword(
            auth,
            email,
            password
          );
          const user = userCredential.user;
          const role = await ensureUserProfile(user);

          let redirectURL = "dashboard.html";
          switch (role) {
            case "superadmin":
              redirectURL = "superadmin.html";
              break;
            case "employer":
              redirectURL = "employer-dashboard.html";
              break;
            case "jobseeker":
            default:
              redirectURL = "jobseeker-dashboard.html";
          }

          showMessage(
            `Welcome back! Redirecting to your dashboard...`,
            "success"
          );
          setTimeout(() => (window.location.href = redirectURL), 1500);
        } catch (error) {
          console.error("Login error:", error.code, error.message);
          switch (error.code) {
            case "auth/invalid-credential":
            case "auth/user-not-found":
            case "auth/wrong-password":
              throw new Error("The email or password you entered is incorrect.");
            case "auth/too-many-requests":
              throw new Error("Too many failed login attempts. Please try again later.");
            case "auth/network-request-failed":
              throw new Error("Network connection error. Please check your internet connection.");
            case "auth/user-disabled":
              throw new Error("This account has been disabled. Please contact support.");
            default:
              throw new Error("Login failed. Please try again.");
          }
        }
      }

      // Show message function
      function showMessage(message, type) {
        const messageDiv = document.getElementById("message");
        messageDiv.innerHTML = `
          <div class="alert alert-${type} alert-dismissible fade show" role="alert">
            <div class="d-flex align-items-center">
              <i class="bi ${type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-triangle-fill'} me-2"></i>
              <div>${message}</div>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
          </div>`;
      }

      // Password visibility toggle
      document.getElementById('passwordToggle').addEventListener('click', function() {
        const passwordInput = document.getElementById('password');
        const icon = this.querySelector('i');
        
        if (passwordInput.type === 'password') {
          passwordInput.type = 'text';
          icon.classList.remove('bi-eye');
          icon.classList.add('bi-eye-slash');
        } else {
          passwordInput.type = 'password';
          icon.classList.remove('bi-eye-slash');
          icon.classList.add('bi-eye');
        }
      });

      // Handle form submission
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();
        const btn = document.getElementById("loginBtn");

        // Basic validation
        if (!email || !password) {
          showMessage("Please enter both email and password.", "warning");
          return;
        }

        btn.disabled = true;
        btn.innerHTML = `<span class="loading-spinner me-2"></span>Signing in...`;

        try {
          await loginUser(email, password);
        } catch (error) {
          showMessage(error.message, "danger");
        } finally {
          btn.disabled = false;
          btn.textContent = "Sign In";
        }
      });

      // Forgot Password Handler
      document.getElementById("forgotPasswordLink").addEventListener("click", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value.trim();
        
        if (!email) {
          showMessage("Please enter your email address to reset your password.", "warning");
          return;
        }

        try {
          await sendPasswordResetEmail(auth, email);
          showMessage(
            `Password reset instructions have been sent to <strong>${email}</strong>. Please check your inbox.`,
            "success"
          );
        } catch (error) {
          console.error("Password reset error:", error.code, error.message);
          if (error.code === "auth/user-not-found") {
            showMessage("No account found with this email address.", "danger");
          } else if (error.code === "auth/invalid-email") {
            showMessage("Please enter a valid email address.", "warning");
          } else {
            showMessage(
              "Failed to send password reset email. Please try again.",
              "danger"
            );
          }
        }
      });

      // Focus on email field when page loads
      document.addEventListener('DOMContentLoaded', function() {
        document.getElementById('email').focus();
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
