<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Jobpitality – Edit Profile</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>

  <style>
    body {
      background: #f4f7f6;
      font-family: 'Heebo', sans-serif;
    }
    .profile-container {
      max-width: 700px;
      margin: 40px auto;
      background: #fff;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .profile-img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid #0d6efd;
      margin-bottom: 10px;
      cursor: pointer;
    }
    .upload-section {
      margin-top: 15px;
    }
    .btn-logout {
      background-color: #dc3545;
      color: white;
      border: none;
      padding: 8px 18px;
      border-radius: 50px;
      font-weight: 500;
      transition: background-color 0.3s ease;
    }
    .btn-logout:hover {
      background-color: #c82333;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="jobseeker-dashboard.html">Jobpitality</a>
      <div class="d-flex ms-auto">
        <span id="userEmailNav" class="me-3 fw-semibold"></span>
        <button id="logoutButton" class="btn btn-outline-danger btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="profile-container">
    <div class="text-center">
      <img src="https://via.placeholder.com/150" alt="Profile Photo" id="profileImage" class="profile-img">
      <h3 id="userName">Loading...</h3>
      <p class="text-muted" id="userEmail">Loading...</p>

      <!-- Upload button -->
      <div class="upload-section">
        <input type="file" id="photoUpload" accept="image/*" class="form-control" />
        <button id="uploadBtn" class="btn btn-primary mt-2">Upload New Photo</button>
        <div id="uploadStatus" class="small mt-2 text-muted"></div>
      </div>
    </div>

    <hr class="my-4">

    <!-- Edit Form -->
    <form id="profileForm">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label">Full Name</label>
          <input type="text" class="form-control" id="fullName" placeholder="Your name">
        </div>
        <div class="col-md-6">
          <label class="form-label">Phone</label>
          <input type="text" class="form-control" id="phone" placeholder="e.g. +234700000000">
        </div>
        <div class="col-md-6">
          <label class="form-label">Location</label>
          <input type="text" class="form-control" id="location" placeholder="City, Country">
        </div>
        <div class="col-md-6">
          <label class="form-label">Desired Role</label>
          <input type="text" class="form-control" id="role" placeholder="e.g. Front Desk Officer">
        </div>
      </div>

      <div class="mt-4 d-flex justify-content-between">
        <a href="jobseeker-dashboard.html" class="btn btn-secondary">Back to Dashboard</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </form>
    <div id="statusMsg" class="mt-3"></div>
  </div>

  <!-- Firebase JS SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-storage-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "185191165097",
      appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
      measurementId: "G-SF5LWDZDKF",
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db   = firebase.firestore();
    const storage = firebase.storage();

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        window.location.href = "login.html";
        return;
      }
      document.getElementById("userEmailNav").textContent = user.email;
      document.getElementById("userEmail").textContent = user.email;

      const doc = await db.collection("users").doc(user.uid).get();
      if (doc.exists) {
        const d = doc.data();
        document.getElementById("fullName").value = d.name || "";
        document.getElementById("phone").value    = d.phone || "";
        document.getElementById("location").value = d.location || "";
        document.getElementById("role").value     = d.role || "";
        if (d.photoURL) document.getElementById("profileImage").src = d.photoURL;
        if (d.name) document.getElementById("userName").textContent = d.name;
      } else {
        document.getElementById("userName").textContent = "New User";
      }
    });

    // Save text fields
    document.getElementById("profileForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const user = auth.currentUser;
      if (!user) return;

      const updated = {
        name: document.getElementById("fullName").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        location: document.getElementById("location").value.trim(),
        role: document.getElementById("role").value.trim()
      };

      try {
        await db.collection("users").doc(user.uid).set(updated, { merge: true });
        document.getElementById("statusMsg").innerHTML =
          "<div class='alert alert-success'>Profile updated successfully ✅</div>";
        if (updated.name) document.getElementById("userName").textContent = updated.name;
      } catch (err) {
        document.getElementById("statusMsg").innerHTML =
          `<div class='alert alert-danger'>Error: ${err.message}</div>`;
      }
    });

    // Upload photo
    document.getElementById("uploadBtn").addEventListener("click", async () => {
      const fileInput = document.getElementById("photoUpload");
      const file = fileInput.files[0];
      if (!file) {
        alert("Please select an image to upload.");
        return;
      }

      const user = auth.currentUser;
      if (!user) return;

      const storageRef = storage.ref(`profilePictures/${user.uid}/${file.name}`);
      const uploadStatus = document.getElementById("uploadStatus");
      uploadStatus.textContent = "Uploading...";

      try {
        await storageRef.put(file);
        const downloadURL = await storageRef.getDownloadURL();

        await db.collection("users").doc(user.uid).set({ photoURL: downloadURL }, { merge: true });
        document.getElementById("profileImage").src = downloadURL;
        uploadStatus.textContent = "✅ Photo updated successfully!";
      } catch (err) {
        uploadStatus.textContent = "❌ Upload failed: " + err.message;
      }
    });

    // Logout
    document.getElementById("logoutButton").addEventListener("click", async () => {
      try {
        await auth.signOut();
        window.location.href = "login.html";
      } catch (err) {
        alert("Logout failed: " + err.message);
      }
    });
  </script>
</body>
</html>
