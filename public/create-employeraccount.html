<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Create Employer Account | Jobpitality</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <style>
      :root {
        --success: #198754;
      }
      body {
        font-family: "Inter", system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial;
        background: #f8f9fa;
      }
      .signup-container {
        max-width: 450px;
        margin: 80px auto;
        background: #fff;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      }
      .btn-theme {
        background: var(--success);
        color: #fff;
        border: none;
      }
      .btn-theme:hover {
        background: #157347;
      }
      .btn-google {
        background-color: #4285f4;
        color: white;
        border: none;
      }
      .btn-google:hover {
        background-color: #357ae8;
      }
    </style>
  </head>

  <body>
    <div class="signup-container">
      <div class="text-center mb-4">
        <i class="bi bi-building-check display-5 text-success mb-2"></i>
        <h2 class="fw-bold mb-1">Employer Registration</h2>
        <p class="text-muted small">
          Create your employer account to start posting jobs and finding talent.
        </p>
      </div>

      <div
        id="errorMsgBox"
        class="alert alert-danger p-2 small"
        style="display: none"
        role="alert"
      ></div>

      <form id="signupForm">
        <div class="d-grid mb-3">
          <button type="button" class="btn btn-google btn-lg" id="googleSignupBtn">
            <i class="bi bi-google me-2"></i>Sign Up with Google
          </button>
        </div>

        <div class="text-center small text-muted mb-3">
          OR sign up with your email
        </div>

        <div class="mb-3">
          <input
            type="email"
            class="form-control"
            id="email"
            placeholder="Business Email Address"
            required
          />
        </div>

        <div class="mb-4">
          <input
            type="password"
            class="form-control"
            id="password"
            placeholder="Password (min. 6 characters)"
            required
          />
        </div>

        <button
          type="submit"
          class="btn btn-theme btn-lg d-block w-100"
          id="submitBtn"
        >
          Register Employer Account
        </button>

        <div class="d-flex justify-content-between small mt-3">
          <a
            href="#"
            class="text-muted"
            data-bs-toggle="modal"
            data-bs-target="#passwordResetModal"
            >Forgot Password?</a
          >
        </div>

        <p class="text-center small mt-4 mb-0">
          Already have an account?
          <a href="login.html" class="fw-semibold text-decoration-none text-success"
            >Log In</a
          >
        </p>
      </form>
    </div>

    <!-- Password Reset Modal -->
    <div
      class="modal fade"
      id="passwordResetModal"
      tabindex="-1"
      aria-labelledby="passwordResetModalLabel"
      aria-hidden="true"
    >
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title" id="passwordResetModalLabel">
              Reset Password
            </h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
              aria-label="Close"
            ></button>
          </div>
          <div class="modal-body">
            <p class="text-muted small">
              Enter your email address to receive a password reset link.
            </p>
            <input
              type="email"
              class="form-control mb-3"
              id="resetEmail"
              placeholder="Email Address"
              required
            />
            <div id="resetStatus" class="small mt-2"></div>
          </div>
          <div class="modal-footer">
            <button
              type="button"
              class="btn btn-secondary"
              data-bs-dismiss="modal"
            >
              Cancel
            </button>
            <button type="button" class="btn btn-primary" id="sendResetLinkBtn">
              Send Reset Link
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
      import {
        getAuth,
        createUserWithEmailAndPassword,
        GoogleAuthProvider,
        signInWithPopup,
        sendPasswordResetEmail
      } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
      import {
        getFirestore,
        doc,
        setDoc,
        getDoc
      } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

      // --- Firebase Config (Jobpitality) ---
      const firebaseConfig = {
        apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
        authDomain: "jobpitality-1cfb2.firebaseapp.com",
        projectId: "jobpitality-1cfb2",
        storageBucket: "jobpitality-1cfb2.appspot.com",
        messagingSenderId: "185191165097",
        appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      const signupForm = document.getElementById("signupForm");
      const errorMsgBox = document.getElementById("errorMsgBox");
      const googleSignupBtn = document.getElementById("googleSignupBtn");
      const submitBtn = document.getElementById("submitBtn");

      const displayError = (msg) => {
        errorMsgBox.textContent = msg.replace("Firebase: ", "");
        errorMsgBox.style.display = "block";
      };

      const setLoading = (btn, loading, text) => {
        btn.disabled = loading;
        btn.textContent = loading ? "Processing..." : text;
      };

      // Save employer info to Firestore
      const saveUserData = async (user, email) => {
        const userRef = doc(db, "users", user.uid);
        await setDoc(userRef, {
          email,
          role: "employer",
          createdAt: new Date(),
          verified: false
        });
      };

      // Redirect after signup
      const redirectUser = () => {
        window.location.href = "dashboard.html";
      };

      // --- Email Signup ---
      signupForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        setLoading(submitBtn, true, "Register Employer Account");
        errorMsgBox.style.display = "none";

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;

        try {
          const userCredential = await createUserWithEmailAndPassword(
            auth,
            email,
            password
          );
          await saveUserData(userCredential.user, email);
          redirectUser();
        } catch (error) {
          displayError(error.message);
          setLoading(submitBtn, false, "Register Employer Account");
        }
      });

      // --- Google Signup ---
      googleSignupBtn.addEventListener("click", async () => {
        setLoading(googleSignupBtn, true, "Sign Up with Google");
        const provider = new GoogleAuthProvider();
        try {
          const result = await signInWithPopup(auth, provider);
          const userRef = doc(db, "users", result.user.uid);
          const userSnap = await getDoc(userRef);

          if (!userSnap.exists()) {
            await saveUserData(result.user, result.user.email);
          }
          redirectUser();
        } catch (error) {
          displayError("Google Sign-up failed: " + error.message);
        } finally {
          setLoading(googleSignupBtn, false, "Sign Up with Google");
        }
      });

      // --- Password Reset ---
      document.getElementById("sendResetLinkBtn").addEventListener("click", async () => {
        const resetEmail = document.getElementById("resetEmail").value;
        const resetStatus = document.getElementById("resetStatus");
        resetStatus.textContent = "";
        if (!resetEmail) {
          resetStatus.textContent = "Please enter your email.";
          resetStatus.classList.add("text-danger");
          return;
        }

        try {
          await sendPasswordResetEmail(auth, resetEmail);
          resetStatus.textContent = `Reset link sent to ${resetEmail}`;
          resetStatus.classList.add("text-success");
        } catch (error) {
          resetStatus.textContent = error.message.replace("Firebase: ", "");
          resetStatus.classList.add("text-danger");
        }
      });
    </script>
  </body>
</html>
