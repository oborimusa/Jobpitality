<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Job Listings – Employer Dashboard | Jobpitality</title>
    <meta
      name="description"
      content="View and manage all your active hospitality job postings in one place."
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
  </head>
  <body class="bg-light">
    <!-- ===== Employer Navbar ===== -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-light shadow-sm">
      <div class="container">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="img/final-job.png"
            alt="Jobpitality"
            style="height: 40px; margin-right: 8px"
          />
          <span class="fw-bold"></span>
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navContent"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item">
              <a class="nav-link active text-black" href="standard-listing.html"
                >My Listings</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-black" href="request-staff.html"
                >Request Staff</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-black" href="skill-assessment.html"
                >Skill Assessment</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-black" href="employer-profile.html"
                >Profile</a
              >
            </li>
            <li class="nav-item">
              <a class="nav-link text-black" href="logout.html">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- ===== Page Header ===== -->
    <header class="bg-white shadow-sm py-4 mb-4">
      <div
        class="container d-flex justify-content-between align-items-center flex-wrap gap-2"
      >
        <div>
          <h1 class="h4 mb-0">My Job Listings</h1>
          <small class="text-muted"
            >Manage, edit or close your current openings</small
          >
        </div>
        <a href="employer-corner.html" class="btn btn-primary">
          <i class="bi bi-plus-circle me-1"></i> Post a New Job
        </a>
      </div>
    </header>

    <main class="container mb-5">
      <!-- Filter/Search -->
      <div class="card shadow-sm p-3 mb-4">
        <form id="filterForm" class="row g-3 align-items-end">
          <div class="col-md-4">
            <label class="form-label">Keyword</label>
            <input
              type="text"
              id="keyword"
              class="form-control"
              placeholder="e.g. Barista"
            />
          </div>
          <div class="col-md-3">
            <label class="form-label">Status</label>
            <select id="status" class="form-select">
              <option value="">All</option>
              <option value="Open">Open</option>
              <option value="Closed">Closed</option>
            </select>
          </div>
          <div class="col-md-2 d-grid">
            <button type="submit" class="btn btn-primary">
              <i class="bi bi-search"></i> Filter
            </button>
          </div>
        </form>
      </div>

      <!-- Listings Grid -->
      <div id="listingGrid" class="row g-4">
        <!-- Job cards injected here -->
      </div>
    </main>

    <footer class="bg-dark text-light text-center py-3">
      <small
        >&copy; <span id="year"></span> Jobpitality. All rights reserved.</small
      >
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      /* ==== Demo Employer Data ==== */
      const myJobs = [
        {
          id: "e1",
          title: "Front Office Supervisor",
          location: "Lagos, Nigeria",
          category: "Front Office",
          type: "Full-time",
          applicants: 12,
          status: "Open",
          posted: "2025-09-20",
        },
        {
          id: "e2",
          title: "Sous Chef",
          location: "Abuja, Nigeria",
          category: "Kitchen",
          type: "Full-time",
          applicants: 7,
          status: "Open",
          posted: "2025-09-15",
        },
        {
          id: "e3",
          title: "Barista",
          location: "Port Harcourt, Nigeria",
          category: "Food & Beverage",
          type: "Part-time",
          applicants: 4,
          status: "Closed",
          posted: "2025-08-28",
        },
      ];

      const listingGrid = document.getElementById("listingGrid");

      function escapeHtml(str) {
        return String(str || "").replace(
          /[&<>"']/g,
          (m) =>
            ({
              "&": "&amp;",
              "<": "&lt;",
              ">": "&gt;",
              '"': "&quot;",
              "'": "&#39;",
            }[m])
        );
      }

      function renderListings(filterFn) {
        listingGrid.innerHTML = "";
        const jobs = filterFn ? myJobs.filter(filterFn) : myJobs;
        if (!jobs.length) {
          listingGrid.innerHTML =
            '<div class="col-12 text-center text-muted">No job listings found.</div>';
          return;
        }
        jobs.forEach((job) => {
          const col = document.createElement("div");
          col.className = "col-12";
          col.innerHTML = `
      <div class="card shadow-sm border-0">
        <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center">
          <div class="mb-3 mb-md-0">
            <h5 class="card-title mb-1">${escapeHtml(job.title)}</h5>
            <small class="text-muted">${escapeHtml(
              job.location
            )} · ${escapeHtml(job.category)} · ${escapeHtml(
            job.type
          )}</small><br>
            <small class="text-muted">Posted ${escapeHtml(job.posted)}</small>
          </div>
          <div class="text-md-end">
            <span class="badge ${
              job.status === "Open" ? "bg-success" : "bg-secondary"
            } mb-2">${escapeHtml(job.status)}</span><br>
            <small class="text-muted d-block mb-2">${
              job.applicants
            } Applicants</small>
            <a href="edit-job.html?jobId=JOB_DOC_ID" class="btn btn-outline-primary btn-sm">
            <i class="bi bi-pencil"></i> Edit
            </a>
            <button class="btn btn-outline-danger btn-sm" onclick="closeJob('${
              job.id
            }')">
              <i class="bi bi-x-circle"></i> Close
            </button>
          </div>
        </div>
      </div>`;
          listingGrid.appendChild(col);
        });
      }

      function closeJob(id) {
        const job = myJobs.find((j) => j.id === id);
        if (job && confirm(`Close listing: ${job.title}?`)) {
          job.status = "Closed";
          renderListings(currentFilter);
        }
      }

      /* Filtering */
      let currentFilter = null;
      document.getElementById("filterForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const keyword = document
          .getElementById("keyword")
          .value.trim()
          .toLowerCase();
        const status = document.getElementById("status").value;
        currentFilter = (j) =>
          (!keyword ||
            j.title.toLowerCase().includes(keyword) ||
            j.category.toLowerCase().includes(keyword)) &&
          (!status || j.status === status);
        renderListings(currentFilter);
      });

      /* Init */
      document.getElementById("year").textContent = new Date().getFullYear();
      renderListings();
    </script>
  </body>
</html>
