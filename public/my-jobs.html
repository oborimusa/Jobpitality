<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Jobs - Jobpitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

   const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};


    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('jobListings');
      try {
        const q = query(collection(db, 'jobs'), orderBy("createdAt", "desc"));
        const snapshot = await getDocs(q);
        if (snapshot.empty) {
          container.innerHTML = '<p class="text-muted">No job postings found.</p>';
          return;
        }

        snapshot.forEach(doc => {
          const job = doc.data();
          container.innerHTML += `
            <div class="card mb-3 shadow-sm">
              <div class="card-body">
                <h5 class="card-title">${job.title}</h5>
                <p class="card-text"><strong>Location:</strong> ${job.location}</p>
                <p class="card-text"><strong>Type:</strong> ${job.type}</p>
                <p class="card-text"><strong>Salary:</strong> ${job.salary}</p>
                <p class="card-text"><strong>Description:</strong> ${job.description}</p>
                <p class="card-text"><strong>Requirements:</strong> ${job.requirements}</p>
              </div>
            </div>
          `;
        });
      } catch (error) {
        container.innerHTML = '<p class="text-danger">Failed to load jobs.</p>';
        console.error(error);
      }
    });
  </script>
</head>
<body>
  <div class="container py-5">
    <h2 class="text-center mb-4">My Job Listings</h2>
    <div id="jobListings"></div>
  </div>

</body>
</html>
