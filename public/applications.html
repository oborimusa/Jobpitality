<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applications – Jobpitality</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background-color: #f8f9fa;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    nav.navbar {
      background: linear-gradient(90deg, rgba(11, 37, 69, 0.9), rgba(6, 125, 63, 0.85));
    }

    #spinner {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      background: white;
      z-index: 1050;
    }

    .app-card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
      padding: 1.5rem;
      margin-bottom: 1.2rem;
    }

    footer {
      background: #0b2545;
      color: white;
      text-align: center;
      padding: 20px 0;
      margin-top: 60px;
    }
  </style>
</head>
<body>
  <!-- Spinner -->
  <div id="spinner">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark shadow-sm p-3">
    <div class="container">
      <a href="dashboard.html" class="navbar-brand d-flex align-items-center">
        <img src="img/final-job.png" alt="Jobpitality" style="width: 140px; height: auto;">
      </a>
      <div class="ms-auto">
        <button id="logoutBtn" class="btn btn-outline-light btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <!-- Applications Section -->
  <div class="container my-5" id="mainContent" style="display:none;">
    <h2 class="mb-4 fw-bold">Submitted Applications</h2>
    <div id="appList"></div>
  </div>

  <!-- Footer -->
  <footer>
    <p class="mb-0">&copy; 2025 Jobpitality. All rights reserved.</p>
  </footer>

  <!-- Firebase Script -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
    import { getFirestore, collection, getDocs, getDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

    // Firebase Config
    const firebaseConfig = {
      apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
      authDomain: "jobpitality-1cfb2.firebaseapp.com",
      projectId: "jobpitality-1cfb2",
      storageBucket: "jobpitality-1cfb2.appspot.com",
      messagingSenderId: "185191165097",
      appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
      measurementId: "G-SF5LWDZDKF"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    function hideSpinner() {
      document.getElementById("spinner").style.display = "none";
      document.getElementById("mainContent").style.display = "block";
    }

    // Check Authentication
    onAuthStateChanged(auth, async (user) => {
      if (!user) {
        document.getElementById("appList").innerHTML = "<p class='text-danger'>You must be logged in to view applications.</p>";
        hideSpinner();
        return;
      }

      try {
        const userRef = doc(db, "users", user.uid);
        const userSnap = await getDoc(userRef);

        if (!userSnap.exists()) {
          document.getElementById("appList").innerHTML = "<p class='text-danger'>User data not found.</p>";
          hideSpinner();
          return;
        }

        const role = userSnap.data().role || "";
        if (role !== "admin" && role !== "superadmin") {
          document.getElementById("appList").innerHTML = "<p class='text-danger'>Access denied. Admins only.</p>";
          hideSpinner();
          return;
        }

        await loadApplications();
      } catch (error) {
        console.error("❌ Error verifying user role:", error);
        document.getElementById("appList").innerHTML = "<p class='text-danger'>Error verifying permissions.</p>";
      } finally {
        hideSpinner();
      }
    });

    // Load Applications
    async function loadApplications() {
      const appList = document.getElementById("appList");
      appList.innerHTML = "<p>Loading applications...</p>";

      try {
        const q = query(collection(db, "applications"), orderBy("appliedAt", "desc"));
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          appList.innerHTML = "<p>No applications submitted yet.</p>";
          return;
        }

        let html = "";
        snapshot.forEach((docSnap) => {
          const app = docSnap.data();
          const appliedAt = app.appliedAt?.toDate ? app.appliedAt.toDate().toLocaleString() : "N/A";

          html += `
            <div class="app-card">
              <h5 class="mb-1">${app.name || "Anonymous"} 
                <small class="text-muted">(${app.email || "No email"})</small>
              </h5>
              <p class="mb-1"><strong>Job ID:</strong> ${app.jobId || "N/A"}</p>
              <p class="mb-2">${app.cover || "No cover letter provided."}</p>
              <small class="text-muted">${appliedAt}</small>
            </div>
          `;
        });

        appList.innerHTML = html;
      } catch (error) {
        console.error("❌ Error loading applications:", error);
        appList.innerHTML = `<p class="text-danger">Error loading applications: ${error.message}</p>`;
      }
    }

    // Logout
    document.getElementById("logoutBtn").addEventListener("click", async () => {
      await signOut(auth);
      window.location.href = "login.html";
    });
  </script>
</body>
</html>
