  <div class="container py-5">
    <h2 class="text-center mb-4">Create an Employer Account</h2>
    <form id="signupForm" class="mx-auto" style="max-width: 600px;">
      <div class="mb-3">
        <label for="companyName" class="form-label">Company Name</label>
        <input type="text" class="form-control" id="companyName" name="companyName" required>
      </div>
      <div class="mb-3">
        <label for="fullName" class="form-label">Your Full Name</label>
        <input type="text" class="form-control" id="fullName" name="fullName" required>
      </div>
      <div class="mb-3">
        <label for="email" class="form-label">Company Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Create Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Sign Up</button>
    </form>
    <p class="text-center mt-3">Already have an account? <a href="employer-login.html">Log in here</a>.</p>
  </div>

  <script>
    // Firebase Config
    const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};


    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Signup Handler
    document.getElementById("signupForm").addEventListener("submit", async function (e) {
      e.preventDefault();

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();
      const fullName = document.getElementById("fullName").value.trim();
      const companyName = document.getElementById("companyName").value.trim();

      try {
        const userCredential = await auth.createUserWithEmailAndPassword(email, password);
        const user = userCredential.user;

        await db.collection("users").doc(user.uid).set({
          email,
          fullName,
          companyName,
          role: "employer",
          createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });

        alert("✅ Account created successfully!");
        window.location.href = "dashboard.html";
      } catch (error) {
        if (error.code === 'auth/email-already-in-use') {
          alert("This email is already registered. Please log in.");
          window.location.href = "employer-login.html";
        } else {
          alert("❌ Error: " + error.message);
        }
      }
    });
  </script>
