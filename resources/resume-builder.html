<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>
      Resume Builder | Jobpitality - Create Professional Hospitality Resume
    </title>
    <meta
      name="description"
      content="Create a professional hospitality resume with our free resume builder. Customize templates, add experience, and download your resume."
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />

    <!-- html2pdf for PDF generation -->
    <script
      src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"
      integrity="sha512-GsLlZN/3F2ErC5ifS5QtgpiJtWd43JWSuIgh7mbzZ8zBps+dvLusV+eNQATqgA/HdeKFVgA5v3S/cIrLF7QnIg=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    ></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --color-primary: #0d1b2a;
        --color-primary-dark: #070d13;
        --color-accent: #ff9e00;
        --color-accent-dark: #cc7e00;
        --color-emergency: #e63946;
        --color-success: #2a9d8f;
        --color-gray-900: #1b263b;
        --color-gray-800: #415a77;
        --color-gray-700: #778da9;
        --color-gray-600: #a0aec0;
        --color-gray-300: #e2e8f0;
        --color-gray-200: #edf2f7;
        --color-gray-100: #f7fafc;
        --color-white: #ffffff;
        --font-sans:
          "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Oxygen, Ubuntu, sans-serif;
        --space-xs: 0.5rem;
        --space-sm: 1rem;
        --space-md: 1.5rem;
        --space-lg: 2rem;
        --space-xl: 3rem;
        --radius-sm: 4px;
        --radius-md: 8px;
        --radius-lg: 12px;
        --radius-xl: 16px;
        --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.08);
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family: var(--font-sans);
        font-weight: 400;
        line-height: 1.6;
        color: var(--color-dark);
        background: var(--color-gray-100);
      }

      /* Header */
      .site-header {
        background: var(--color-white);
        box-shadow: var(--shadow-md);
        position: sticky;
        top: 0;
        z-index: 1000;
      }

      .header-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1280px;
        margin: 0 auto;
        padding: 1rem 2rem;
      }

      /* Header */
      .site-header {
        background: var(--color-white);
        box-shadow: var(--shadow-md);
        position: sticky;
        top: 0;
        z-index: 1000;
        border-bottom: 3px solid var(--color-accent);
      }

      .header-container {
        display: flex;
        align-items: center;
        justify-content: space-between;
        max-width: 1280px;
        margin: 0 auto;
        padding: 0.75rem 2rem;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        text-decoration: none;
      }

      .logo i {
        font-size: 1.75rem;
        color: var(--color-accent);
      }

      .logo h1 {
        font-size: 1.5rem;
        font-weight: 900;
        margin: 0;
        letter-spacing: -1px;
      }

      .logo .brand-name {
        background: linear-gradient(
          90deg,
          var(--color-primary) 0%,
          var(--color-accent) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }

      @media (min-width: 768px) {
        .logo h1 {
          font-size: 2rem;
        }
        .logo i {
          font-size: 2rem;
        }
      }

      .nav-links {
        display: flex;
        gap: 2rem;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: var(--color-gray-700);
        font-weight: 500;
        transition: color 0.3s;
      }

      .nav-links a:hover {
        color: var(--color-accent);
      }

      .btn-outline {
        background: transparent;
        color: var(--color-primary);
        border: 2px solid var(--color-primary);
        padding: 0.5rem 1.25rem;
        border-radius: var(--radius-lg);
        font-weight: 600;
        text-decoration: none;
        transition: all 0.3s;
      }

      .btn-outline:hover {
        background: var(--color-primary);
        color: var(--color-white);
      }

      /* Responsive */
      @media (max-width: 768px) {
        .header-container {
          padding: 0.75rem 1rem;
        }

        .nav-links {
          gap: 1rem;
        }

        .nav-links a {
          font-size: 0.875rem;
        }

        .btn-outline {
          padding: 0.375rem 0.875rem;
          font-size: 0.875rem;
        }
      }
      /* .btn-outline {
            background: transparent;
            color: var(--color-primary);
            border: 2px solid var(--color-primary);
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-lg);
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
        }
        
        .btn-outline:hover {
            background: var(--color-primary);
            color: var(--color-white);
        } */

      /* Main Container */
      .builder-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 2rem;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
      }

      @media (max-width: 1024px) {
        .builder-container {
          grid-template-columns: 1fr;
        }
      }

      /* Form Section */
      .form-section {
        background: var(--color-white);
        border-radius: var(--radius-xl);
        padding: 1.5rem;
        border: 1px solid var(--color-gray-200);
        height: fit-content;
      }

      .form-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid var(--color-gray-200);
      }

      .form-header h2 {
        font-size: 1.5rem;
        margin-bottom: 0;
      }

      .form-tabs {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
      }

      .form-tab {
        padding: 0.5rem 1rem;
        background: var(--color-gray-100);
        border: none;
        border-radius: var(--radius-lg);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .form-tab.active {
        background: var(--color-accent);
        color: var(--color-primary);
      }

      .form-panel {
        display: none;
      }

      .form-panel.active {
        display: block;
        animation: fadeIn 0.3s ease;
      }

      .form-group {
        margin-bottom: 1.25rem;
      }

      .form-label {
        display: block;
        margin-bottom: 0.5rem;
        font-weight: 600;
        color: var(--color-gray-700);
        font-size: 0.9rem;
      }

      .form-control {
        width: 100%;
        padding: 0.75rem 1rem;
        border: 2px solid var(--color-gray-300);
        border-radius: var(--radius-lg);
        font-family: var(--font-sans);
        font-size: 0.95rem;
        transition: all 0.3s;
      }

      .form-control:focus {
        outline: none;
        border-color: var(--color-accent);
        box-shadow: 0 0 0 3px rgba(255, 158, 0, 0.1);
      }

      textarea.form-control {
        resize: vertical;
        min-height: 80px;
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1rem;
      }

      @media (max-width: 640px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }

      /* Experience & Education Items */
      .experience-item,
      .education-item {
        background: var(--color-gray-100);
        border-radius: var(--radius-lg);
        padding: 1rem;
        margin-bottom: 1rem;
        border: 1px solid var(--color-gray-200);
      }

      .item-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.75rem;
      }

      .item-title {
        font-weight: 700;
        color: var(--color-primary);
      }

      .remove-item {
        background: none;
        border: none;
        color: var(--color-emergency);
        cursor: pointer;
        font-size: 1rem;
      }

      .add-btn {
        background: none;
        border: 2px dashed var(--color-gray-300);
        padding: 0.75rem;
        width: 100%;
        border-radius: var(--radius-lg);
        cursor: pointer;
        color: var(--color-gray-600);
        font-weight: 600;
        transition: all 0.3s;
      }

      .add-btn:hover {
        border-color: var(--color-accent);
        color: var(--color-accent);
      }

      /* Skills Tags */
      .skills-container {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin-bottom: 1rem;
      }

      .skill-tag {
        background: var(--color-gray-200);
        padding: 0.5rem 1rem;
        border-radius: 50px;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.85rem;
      }

      .skill-tag button {
        background: none;
        border: none;
        color: var(--color-gray-600);
        cursor: pointer;
      }

      .add-skill {
        display: flex;
        gap: 0.5rem;
      }

      .add-skill input {
        flex: 1;
        padding: 0.5rem 1rem;
        border: 2px solid var(--color-gray-300);
        border-radius: var(--radius-lg);
      }

      /* Resume Preview */
      .preview-section {
        background: var(--color-white);
        border-radius: var(--radius-xl);
        border: 1px solid var(--color-gray-200);
        position: sticky;
        top: 100px;
        height: fit-content;
      }

      .preview-header {
        padding: 1rem 1.5rem;
        border-bottom: 1px solid var(--color-gray-200);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .preview-header h2 {
        font-size: 1.25rem;
        margin-bottom: 0;
      }

      .preview-actions {
        display: flex;
        gap: 0.5rem;
      }

      .preview-actions button {
        padding: 0.5rem 1rem;
        border-radius: var(--radius-lg);
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
      }

      .btn-preview {
        background: var(--color-gray-100);
        border: 1px solid var(--color-gray-300);
      }

      .btn-download {
        background: var(--color-accent);
        border: none;
        color: var(--color-primary);
      }

      .resume-preview {
        padding: 2rem;
        min-height: 500px;
        background: var(--color-white);
      }

      /* Resume Styles */
      .resume {
        font-family: var(--font-sans);
        max-width: 100%;
      }

      .resume-header {
        text-align: center;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 2px solid var(--color-accent);
      }

      .resume-name {
        font-size: 2rem;
        font-weight: 800;
        color: var(--color-primary);
        margin-bottom: 0.25rem;
      }

      .resume-title {
        font-size: 1rem;
        color: var(--color-accent);
        font-weight: 600;
        margin-bottom: 0.5rem;
      }

      .resume-contact {
        display: flex;
        justify-content: center;
        gap: 1rem;
        flex-wrap: wrap;
        font-size: 0.85rem;
        color: var(--color-gray-600);
      }

      .resume-section {
        margin-bottom: 1.5rem;
      }

      .resume-section-title {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--color-primary);
        margin-bottom: 0.75rem;
        padding-bottom: 0.25rem;
        border-bottom: 2px solid var(--color-gray-200);
      }

      .resume-summary {
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--color-gray-700);
      }

      .resume-experience-item,
      .resume-education-item {
        margin-bottom: 1rem;
      }

      .resume-item-title {
        font-weight: 700;
        color: var(--color-primary);
        font-size: 0.95rem;
      }

      .resume-item-subtitle {
        font-weight: 600;
        color: var(--color-accent);
        font-size: 0.85rem;
        margin-bottom: 0.25rem;
      }

      .resume-item-date {
        font-size: 0.8rem;
        color: var(--color-gray-500);
        margin-bottom: 0.5rem;
      }

      .resume-item-description {
        font-size: 0.85rem;
        color: var(--color-gray-700);
      }

      .resume-skills {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .resume-skill {
        background: var(--color-gray-100);
        padding: 0.25rem 0.75rem;
        border-radius: 50px;
        font-size: 0.8rem;
        color: var(--color-gray-700);
      }

      /* Notification */
      .notification {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: var(--color-white);
        padding: 1rem 1.5rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-xl);
        display: flex;
        align-items: center;
        gap: 0.75rem;
        z-index: 10001;
        border-left: 4px solid var(--color-success);
        animation: slideIn 0.3s ease;
      }

      @keyframes slideIn {
        from {
          transform: translateX(100%);
          opacity: 0;
        }
        to {
          transform: translateX(0);
          opacity: 1;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .footer {
        background: var(--color-primary);
        color: var(--color-white);
        text-align: center;
        padding: 2rem;
        margin-top: 3rem;
      }
    </style>
  </head>
  <body>
   <header class="site-header">
    <div class="header-container">
        <a href="/candidates-dashboard/index.html" class="logo">
            <i class="fas fa-bolt"></i>
            <h1><span class="brand-name">JOBPITALITY</span></h1>
        </a>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/candidates/job-board/index.html">Jobs</a>
            <a href="/resources/resume-builder.html" style="color: var(--color-accent);">Resume Builder</a>
            <a href="/candidates/login/" class="btn-outline">Sign In</a>
        </div>
    </div>
</header>

    <div class="builder-container">
      <!-- Form Section -->
      <div class="form-section">
        <div class="form-header">
          <h2><i class="fas fa-file-alt"></i> Resume Builder</h2>
          <i class="fas fa-edit" style="color: var(--color-accent)"></i>
        </div>

        <div class="form-tabs">
          <button class="form-tab active" data-tab="personal">Personal</button>
          <button class="form-tab" data-tab="experience">Experience</button>
          <button class="form-tab" data-tab="education">Education</button>
          <button class="form-tab" data-tab="skills">Skills</button>
        </div>

        <!-- Personal Info Panel -->
        <div class="form-panel active" id="personal-panel">
          <div class="form-group">
            <label class="form-label">Full Name</label>
            <input
              type="text"
              id="fullName"
              class="form-control"
              placeholder="John Doe"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Professional Title</label>
            <input
              type="text"
              id="title"
              class="form-control"
              placeholder="Executive Chef | Hotel Manager"
            />
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Email</label>
              <input
                type="email"
                id="email"
                class="form-control"
                placeholder="john@example.com"
              />
            </div>
            <div class="form-group">
              <label class="form-label">Phone</label>
              <input
                type="tel"
                id="phone"
                class="form-control"
                placeholder="+234 801 234 5678"
              />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Location</label>
              <input
                type="text"
                id="location"
                class="form-control"
                placeholder="Lagos, Nigeria"
              />
            </div>
            <div class="form-group">
              <label class="form-label">LinkedIn</label>
              <input
                type="url"
                id="linkedin"
                class="form-control"
                placeholder="linkedin.com/in/username"
              />
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Professional Summary</label>
            <textarea
              id="summary"
              class="form-control"
              rows="4"
              placeholder="Experienced hospitality professional with 8+ years in luxury hotels..."
            ></textarea>
          </div>
        </div>

        <!-- Experience Panel -->
        <div class="form-panel" id="experience-panel">
          <div id="experienceList"></div>
          <button class="add-btn" id="addExperienceBtn">
            <i class="fas fa-plus"></i> Add Experience
          </button>
        </div>

        <!-- Education Panel -->
        <div class="form-panel" id="education-panel">
          <div id="educationList"></div>
          <button class="add-btn" id="addEducationBtn">
            <i class="fas fa-plus"></i> Add Education
          </button>
        </div>

        <!-- Skills Panel -->
        <div class="form-panel" id="skills-panel">
          <div class="skills-container" id="skillsList"></div>
          <div class="add-skill">
            <input
              type="text"
              id="newSkill"
              placeholder="Add a skill (e.g., Hotel Management)"
            />
            <button
              class="add-btn"
              id="addSkillBtn"
              style="width: auto; padding: 0.5rem 1rem"
            >
              Add
            </button>
          </div>
          <div
            class="form-help"
            style="
              margin-top: 0.5rem;
              font-size: 0.8rem;
              color: var(--color-gray-600);
            "
          >
            <i class="fas fa-info-circle"></i> Add skills relevant to
            hospitality (e.g., Fine Dining, Revenue Management, Guest Relations)
          </div>
        </div>
      </div>

      <!-- Preview Section -->
      <div class="preview-section">
        <div class="preview-header">
          <h2><i class="fas fa-eye"></i> Live Preview</h2>
          <div class="preview-actions">
            <button class="btn-preview" id="refreshPreviewBtn">
              <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="btn-download" id="downloadPdfBtn">
              <i class="fas fa-download"></i> Download PDF
            </button>
          </div>
        </div>
        <div class="resume-preview" id="resumePreview">
          <!-- Resume will be rendered here -->
        </div>
      </div>
    </div>

    <footer class="footer">
      <p>
        &copy; 2024 Jobpitality. All rights reserved. Build your professional
        hospitality resume.
      </p>
    </footer>

    <script>
      // ========== DATA STORAGE ==========
      let resumeData = {
        personal: {
          fullName: "",
          title: "",
          email: "",
          phone: "",
          location: "",
          linkedin: "",
          summary: "",
        },
        experiences: [],
        educations: [],
        skills: [],
      };

      // ========== DOM ELEMENTS ==========
      const fullNameInput = document.getElementById("fullName");
      const titleInput = document.getElementById("title");
      const emailInput = document.getElementById("email");
      const phoneInput = document.getElementById("phone");
      const locationInput = document.getElementById("location");
      const linkedinInput = document.getElementById("linkedin");
      const summaryInput = document.getElementById("summary");
      const experienceList = document.getElementById("experienceList");
      const educationList = document.getElementById("educationList");
      const skillsList = document.getElementById("skillsList");
      const newSkillInput = document.getElementById("newSkill");

      // ========== LOAD SAVED RESUME FROM LOCALSTORAGE ==========
      function loadSavedResume() {
        const saved = localStorage.getItem("jobpitality_resume");
        if (saved) {
          try {
            const data = JSON.parse(saved);
            resumeData = data;

            // Populate form fields
            fullNameInput.value = data.personal.fullName || "";
            titleInput.value = data.personal.title || "";
            emailInput.value = data.personal.email || "";
            phoneInput.value = data.personal.phone || "";
            locationInput.value = data.personal.location || "";
            linkedinInput.value = data.personal.linkedin || "";
            summaryInput.value = data.personal.summary || "";

            renderExperienceList();
            renderEducationList();
            renderSkillsList();
            renderResume();
          } catch (e) {
            console.error("Error loading saved resume:", e);
          }
        } else {
          // Load demo data for first-time users
          loadDemoData();
        }
      }

      function loadDemoData() {
        resumeData = {
          personal: {
            fullName: "John Doe",
            title: "Executive Chef",
            email: "john.doe@example.com",
            phone: "+234 801 234 5678",
            location: "Lagos, Nigeria",
            linkedin: "linkedin.com/in/johndoe",
            summary:
              "Award-winning Executive Chef with over 10 years of experience in luxury hotels and fine dining restaurants. Expertise in menu development, kitchen operations, and team leadership. Passionate about creating exceptional culinary experiences.",
          },
          experiences: [
            {
              title: "Executive Chef",
              company: "Luxury Hotel Group",
              startDate: "2020-01",
              endDate: "Present",
              description:
                "Lead a team of 25 kitchen staff, manage food cost optimization resulting in 15% savings, develop seasonal menus, and maintain 5-star food safety ratings.",
            },
            {
              title: "Sous Chef",
              company: "Fine Dining Restaurant",
              startDate: "2016-03",
              endDate: "2019-12",
              description:
                'Assisted in kitchen operations, supervised 12 staff members, managed inventory, and contributed to menu development that won "Best Restaurant" award.',
            },
          ],
          educations: [
            {
              degree: "Culinary Arts Diploma",
              institution: "Culinary Institute of America",
              year: "2015",
              description: "Specialized in French cuisine and pastry arts.",
            },
            {
              degree: "Bachelor of Hospitality Management",
              institution: "University of Lagos",
              year: "2012",
              description:
                "Focused on hotel operations and food service management.",
            },
          ],
          skills: [
            "Menu Development",
            "Kitchen Management",
            "Food Cost Control",
            "Team Leadership",
            "HACCP Certified",
            "Fine Dining",
            "Inventory Management",
          ],
        };

        // Populate form fields
        fullNameInput.value = resumeData.personal.fullName;
        titleInput.value = resumeData.personal.title;
        emailInput.value = resumeData.personal.email;
        phoneInput.value = resumeData.personal.phone;
        locationInput.value = resumeData.personal.location;
        linkedinInput.value = resumeData.personal.linkedin;
        summaryInput.value = resumeData.personal.summary;

        renderExperienceList();
        renderEducationList();
        renderSkillsList();
        renderResume();
        saveToLocalStorage();
      }

      // ========== SAVE TO LOCALSTORAGE ==========
      function saveToLocalStorage() {
        localStorage.setItem("jobpitality_resume", JSON.stringify(resumeData));
      }

      // ========== UPDATE PERSONAL INFO ==========
      function updatePersonalInfo() {
        resumeData.personal = {
          fullName: fullNameInput.value,
          title: titleInput.value,
          email: emailInput.value,
          phone: phoneInput.value,
          location: locationInput.value,
          linkedin: linkedinInput.value,
          summary: summaryInput.value,
        };
        saveToLocalStorage();
        renderResume();
      }

      // ========== EXPERIENCE FUNCTIONS ==========
      function addExperience() {
        resumeData.experiences.push({
          title: "",
          company: "",
          startDate: "",
          endDate: "",
          description: "",
        });
        renderExperienceList();
        saveToLocalStorage();
      }

      function updateExperience(index, field, value) {
        resumeData.experiences[index][field] = value;
        saveToLocalStorage();
        renderResume();
      }

      function removeExperience(index) {
        resumeData.experiences.splice(index, 1);
        renderExperienceList();
        saveToLocalStorage();
        renderResume();
      }

      function renderExperienceList() {
        experienceList.innerHTML = resumeData.experiences
          .map(
            (exp, index) => `
                <div class="experience-item">
                    <div class="item-header">
                        <span class="item-title">Experience ${index + 1}</span>
                        <button class="remove-item" onclick="removeExperience(${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Job Title" value="${escapeHtml(exp.title)}" onchange="updateExperience(${index}, 'title', this.value)">
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Company" value="${escapeHtml(exp.company)}" onchange="updateExperience(${index}, 'company', this.value)">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <input type="month" class="form-control" placeholder="Start Date" value="${exp.startDate}" onchange="updateExperience(${index}, 'startDate', this.value)">
                        </div>
                        <div class="form-group">
                            <input type="month" class="form-control" placeholder="End Date" value="${exp.endDate}" onchange="updateExperience(${index}, 'endDate', this.value)">
                        </div>
                    </div>
                    <div class="form-group">
                        <textarea class="form-control" rows="2" placeholder="Job Description" onchange="updateExperience(${index}, 'description', this.value)">${escapeHtml(exp.description)}</textarea>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // ========== EDUCATION FUNCTIONS ==========
      function addEducation() {
        resumeData.educations.push({
          degree: "",
          institution: "",
          year: "",
          description: "",
        });
        renderEducationList();
        saveToLocalStorage();
      }

      function updateEducation(index, field, value) {
        resumeData.educations[index][field] = value;
        saveToLocalStorage();
        renderResume();
      }

      function removeEducation(index) {
        resumeData.educations.splice(index, 1);
        renderEducationList();
        saveToLocalStorage();
        renderResume();
      }

      function renderEducationList() {
        educationList.innerHTML = resumeData.educations
          .map(
            (edu, index) => `
                <div class="education-item">
                    <div class="item-header">
                        <span class="item-title">Education ${index + 1}</span>
                        <button class="remove-item" onclick="removeEducation(${index})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Degree" value="${escapeHtml(edu.degree)}" onchange="updateEducation(${index}, 'degree', this.value)">
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Institution" value="${escapeHtml(edu.institution)}" onchange="updateEducation(${index}, 'institution', this.value)">
                    </div>
                    <div class="form-group">
                        <input type="text" class="form-control" placeholder="Year" value="${escapeHtml(edu.year)}" onchange="updateEducation(${index}, 'year', this.value)">
                    </div>
                    <div class="form-group">
                        <textarea class="form-control" rows="2" placeholder="Description" onchange="updateEducation(${index}, 'description', this.value)">${escapeHtml(edu.description)}</textarea>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // ========== SKILLS FUNCTIONS ==========
      function addSkill() {
        const skill = newSkillInput.value.trim();
        if (skill && !resumeData.skills.includes(skill)) {
          resumeData.skills.push(skill);
          renderSkillsList();
          saveToLocalStorage();
          renderResume();
          newSkillInput.value = "";
        }
      }

      function removeSkill(skill) {
        resumeData.skills = resumeData.skills.filter((s) => s !== skill);
        renderSkillsList();
        saveToLocalStorage();
        renderResume();
      }

      function renderSkillsList() {
        skillsList.innerHTML = resumeData.skills
          .map(
            (skill) => `
                <div class="skill-tag">
                    ${escapeHtml(skill)}
                    <button onclick="removeSkill('${escapeHtml(skill)}')">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
            `,
          )
          .join("");
      }

      // ========== RENDER RESUME PREVIEW ==========
      function renderResume() {
        const personal = resumeData.personal;
        const experiences = resumeData.experiences;
        const educations = resumeData.educations;
        const skills = resumeData.skills;

        const formatDate = (dateStr) => {
          if (!dateStr) return "";
          const [year, month] = dateStr.split("-");
          const monthNames = [
            "Jan",
            "Feb",
            "Mar",
            "Apr",
            "May",
            "Jun",
            "Jul",
            "Aug",
            "Sep",
            "Oct",
            "Nov",
            "Dec",
          ];
          return `${monthNames[parseInt(month) - 1]} ${year}`;
        };

        const html = `
                <div class="resume">
                    <div class="resume-header">
                        <div class="resume-name">${escapeHtml(personal.fullName || "Your Name")}</div>
                        <div class="resume-title">${escapeHtml(personal.title || "Professional Title")}</div>
                        <div class="resume-contact">
                            ${personal.email ? `<span><i class="fas fa-envelope"></i> ${escapeHtml(personal.email)}</span>` : ""}
                            ${personal.phone ? `<span><i class="fas fa-phone"></i> ${escapeHtml(personal.phone)}</span>` : ""}
                            ${personal.location ? `<span><i class="fas fa-map-marker-alt"></i> ${escapeHtml(personal.location)}</span>` : ""}
                            ${personal.linkedin ? `<span><i class="fab fa-linkedin"></i> ${escapeHtml(personal.linkedin)}</span>` : ""}
                        </div>
                    </div>
                    
                    ${
                      personal.summary
                        ? `
                    <div class="resume-section">
                        <div class="resume-section-title">Professional Summary</div>
                        <div class="resume-summary">${escapeHtml(personal.summary)}</div>
                    </div>
                    `
                        : ""
                    }
                    
                    ${
                      experiences.length > 0
                        ? `
                    <div class="resume-section">
                        <div class="resume-section-title">Work Experience</div>
                        ${experiences
                          .map(
                            (exp) => `
                            <div class="resume-experience-item">
                                <div class="resume-item-title">${escapeHtml(exp.title || "Position")}</div>
                                <div class="resume-item-subtitle">${escapeHtml(exp.company || "Company")}</div>
                                <div class="resume-item-date">
                                    ${exp.startDate ? formatDate(exp.startDate) : ""} - ${exp.endDate ? formatDate(exp.endDate) : "Present"}
                                </div>
                                <div class="resume-item-description">${escapeHtml(exp.description || "")}</div>
                            </div>
                        `,
                          )
                          .join("")}
                    </div>
                    `
                        : ""
                    }
                    
                    ${
                      educations.length > 0
                        ? `
                    <div class="resume-section">
                        <div class="resume-section-title">Education</div>
                        ${educations
                          .map(
                            (edu) => `
                            <div class="resume-education-item">
                                <div class="resume-item-title">${escapeHtml(edu.degree || "Degree")}</div>
                                <div class="resume-item-subtitle">${escapeHtml(edu.institution || "Institution")}</div>
                                ${edu.year ? `<div class="resume-item-date">${escapeHtml(edu.year)}</div>` : ""}
                                <div class="resume-item-description">${escapeHtml(edu.description || "")}</div>
                            </div>
                        `,
                          )
                          .join("")}
                    </div>
                    `
                        : ""
                    }
                    
                    ${
                      skills.length > 0
                        ? `
                    <div class="resume-section">
                        <div class="resume-section-title">Skills</div>
                        <div class="resume-skills">
                            ${skills.map((skill) => `<span class="resume-skill">${escapeHtml(skill)}</span>`).join("")}
                        </div>
                    </div>
                    `
                        : ""
                    }
                </div>
            `;

        document.getElementById("resumePreview").innerHTML = html;
      }

      // ========== UTILITY FUNCTIONS ==========
      function escapeHtml(text) {
        if (!text) return "";
        const div = document.createElement("div");
        div.textContent = text;
        return div.innerHTML;
      }

      function showNotification(message, type = "success") {
        const existing = document.querySelector(".notification");
        if (existing) existing.remove();

        const notification = document.createElement("div");
        notification.className = "notification";
        notification.style.borderLeftColor =
          type === "success" ? "#2a9d8f" : "#e63946";
        notification.innerHTML = `
                <i class="fas fa-${type === "success" ? "check-circle" : "exclamation-circle"}"></i>
                <span>${message}</span>
            `;
        document.body.appendChild(notification);

        setTimeout(() => {
          notification.style.animation = "slideOut 0.3s ease";
          setTimeout(() => notification.remove(), 300);
        }, 3000);
      }

      // ========== PDF DOWNLOAD ==========
      function downloadPDF() {
        const element = document.getElementById("resumePreview");
        const opt = {
          margin: [0.5, 0.5, 0.5, 0.5],
          filename: `${resumeData.personal.fullName || "Resume"}_Jobpitality.pdf`,
          image: { type: "jpeg", quality: 0.98 },
          html2canvas: { scale: 2, letterRendering: true },
          jsPDF: { unit: "in", format: "a4", orientation: "portrait" },
        };

        showNotification("Generating PDF...", "info");
        html2pdf()
          .set(opt)
          .from(element)
          .save()
          .then(() =>
            showNotification("Resume downloaded successfully!", "success"),
          )
          .catch((err) => showNotification("Error generating PDF", "error"));
      }

      // ========== TAB SWITCHING ==========
      function setupTabs() {
        const tabs = document.querySelectorAll(".form-tab");
        const panels = document.querySelectorAll(".form-panel");

        tabs.forEach((tab) => {
          tab.addEventListener("click", () => {
            const target = tab.dataset.tab;
            tabs.forEach((t) => t.classList.remove("active"));
            tab.classList.add("active");
            panels.forEach((panel) => panel.classList.remove("active"));
            document.getElementById(`${target}-panel`).classList.add("active");
          });
        });
      }

      // ========== EVENT LISTENERS ==========
      function setupEventListeners() {
        // Personal info updates
        fullNameInput.addEventListener("input", updatePersonalInfo);
        titleInput.addEventListener("input", updatePersonalInfo);
        emailInput.addEventListener("input", updatePersonalInfo);
        phoneInput.addEventListener("input", updatePersonalInfo);
        locationInput.addEventListener("input", updatePersonalInfo);
        linkedinInput.addEventListener("input", updatePersonalInfo);
        summaryInput.addEventListener("input", updatePersonalInfo);

        // Add buttons
        document
          .getElementById("addExperienceBtn")
          .addEventListener("click", addExperience);
        document
          .getElementById("addEducationBtn")
          .addEventListener("click", addEducation);
        document
          .getElementById("addSkillBtn")
          .addEventListener("click", addSkill);
        newSkillInput.addEventListener("keypress", (e) => {
          if (e.key === "Enter") addSkill();
        });

        // Preview refresh and download
        document
          .getElementById("refreshPreviewBtn")
          .addEventListener("click", () => {
            renderResume();
            showNotification("Preview refreshed", "success");
          });
        document
          .getElementById("downloadPdfBtn")
          .addEventListener("click", downloadPDF);
      }

      // ========== EXPOSE FUNCTIONS GLOBALLY ==========
      window.addExperience = addExperience;
      window.updateExperience = updateExperience;
      window.removeExperience = removeExperience;
      window.addEducation = addEducation;
      window.updateEducation = updateEducation;
      window.removeEducation = removeEducation;
      window.addSkill = addSkill;
      window.removeSkill = removeSkill;

      // ========== INITIALIZATION ==========
      document.addEventListener("DOMContentLoaded", () => {
        setupTabs();
        setupEventListeners();
        loadSavedResume();
      });
    </script>
  </body>
</html>
