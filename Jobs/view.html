<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>

        body { font-family: 'Inter', sans-serif; background: #f7fafc; color: #0d1b2a; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        .site-header { background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; padding: 0.75rem 0; border-bottom: 3px solid #ff9e00; }
        .header-container { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .logo h1 { font-size: 1.5rem; font-weight: 900; display: flex; align-items: center; gap: 0.5rem; }
        @media (min-width: 768px) { .logo h1 { font-size: 2.1rem; } }
        .logo h1 .brand-name { background: linear-gradient(90deg, #0d1b2a 0%, #ff9e00 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .mobile-menu-toggle { display: none; background: #ff9e00; border: none; width: 44px; height: 44px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 1023px) { .mobile-menu-toggle { display: flex; align-items: center; justify-content: center; } }
        .main-nav { display: flex; align-items: center; }
        @media (max-width: 1023px) {
            .main-nav { position: fixed; top: 0; right: -100%; width: 85%; max-width: 400px; height: 100vh; background: white; flex-direction: column; padding: 80px 20px 30px; transition: right 0.3s ease; z-index: 1001; gap: 1rem; }
            .main-nav.active { right: 0; }
        }
        .nav-menu { display: flex; list-style: none; gap: 1rem; }
        @media (max-width: 1023px) { .nav-menu { flex-direction: column; width: 100%; } }
        .nav-link { text-decoration: none; color: #415a77; font-weight: 600; padding: 0.5rem; }
        .nav-link:hover { color: #ff9e00; }
        .nav-cta { background: #0d1b2a; color: white !important; padding: 0.6rem 1.2rem; border-radius: 12px; text-decoration: none; font-weight: 700; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13,27,42,0.7); z-index: 999; }
        .mobile-overlay.active { display: block; }
        
        .job-details { padding: 3rem 0; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: #ff9e00; text-decoration: none; margin-bottom: 1.5rem; }
        .job-card-large { background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
        .job-title { font-size: 2rem; font-weight: 800; color: #0d1b2a; margin-bottom: 0.5rem; }
        .job-company { font-size: 1.125rem; color: #415a77; margin-bottom: 0.5rem; }
        .job-location, .job-type, .job-salary { display: flex; align-items: center; gap: 0.5rem; color: #415a77; margin-bottom: 0.5rem; }
        .apply-btn { background: #ff9e00; color: #0d1b2a; padding: 1rem 2rem; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .apply-btn:hover { background: #cc7e00; transform: translateY(-2px); }
        .job-section { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0; }
        .job-section h3 { font-size: 1.25rem; margin-bottom: 1rem; color: #0d1b2a; }
        .job-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
        .job-tag { background: #f7fafc; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; color: #415a77; }
        
        .footer { background: #0d1b2a; color: white; padding: 2rem 0; margin-top: 2rem; text-align: center; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; }
        
        @media (max-width: 768px) {
            .job-title { font-size: 1.5rem; }
            .job-card-large { padding: 1.5rem; }
        }
        .spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #e2e8f0; border-radius: 50%; border-top-color: #ff9e00; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">

                        <li><a href="/about/" class="nav-link">About</a></li>
                        <li><a href="/contact/" class="nav-link">Contact</a></li>
                    </ul>
                    <a href="tel:+2348039661354" class="nav-cta"><i class="fas fa-phone"></i> +234 803 966 1354</a>
                </nav>
                <div class="mobile-overlay" id="mobileOverlay"></div>
            </div>
        </div>
    </header>

    <section class="job-details">
        <div class="container">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Jobs</a>
            
            <div id="jobContent">
                <div style="text-align: center; padding: 3rem;">
                    <div class="spinner"></div>
                    <p style="margin-top: 1rem;">Loading job details...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Jobpitality. All rights reserved.</p>
        </div>
    </footer>
    <a href="https://wa.me/2348039661354" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        // Get job ID from URL parameter (e.g., /jobs/view.html?id=tt3)
        const urlParams = new URLSearchParams(window.location.search);
        let jobId = urlParams.get('id');
        let jobTitle = urlParams.get('title');
        
        // If no ID in params, try to get from path (e.g., /jobs/tt3.html)
        if (!jobId && !jobTitle) {
            const pathParts = window.location.pathname.split('/');
            const lastPart = pathParts[pathParts.length - 1];
            if (lastPart && lastPart !== 'view.html') {
                jobId = lastPart.replace('.html', '');
            }
        }
        
        // Complete job database - Add ALL your jobs from ALL category pages
        const allJobs = {
            // ===== TRAVEL & TOURISM JOBS (tt1 to tt20) =====
            "tt1": { title: "Travel Agency Manager", company: "Premium Travel Services", location: "Lagos, Nigeria", salary: "₦10-15M/year", type: "Full-time", description: "Lead our travel agency operations, manage team of consultants, and drive business growth. You will be responsible for P&L, team development, and customer satisfaction.", requirements: ["5+ years travel industry experience", "Leadership skills", "Strong customer service orientation", "P&L management experience"], tags: ["Operations", "Team Leadership", "Customer Service"] },
            "tt2": { title: "Tour Operations Director", company: "Adventure Tours NG", location: "Abuja, Nigeria", salary: "₦14-20M/year", type: "Full-time", description: "Oversee all tour operations, develop new tour packages, and manage vendor relationships across Nigeria.", requirements: ["8+ years tour operations", "Strategic planning", "Vendor management", "Budgeting experience"], tags: ["Tour Planning", "Vendor Management", "Strategic Planning"] },
            "tt3": { title: "Travel Consultant", company: "Global Travels", location: "Lagos, Nigeria", salary: "₦5-8M/year", type: "Full-time", description: "Assist clients with travel arrangements including flights, hotels, and tour packages. Provide expert advice on destinations.", requirements: ["2+ years travel consulting", "GDS knowledge (Amadeus/Sabre)", "Excellent communication", "Customer service skills"], tags: ["Flight Booking", "Hotel Reservations", "Itinerary Planning"] },
            "tt4": { title: "Tour Guide", company: "Cultural Heritage Tours", location: "Lagos, Nigeria", salary: "₦3-5M/year", type: "Full-time", description: "Lead engaging tours, share historical and cultural information with guests, and ensure memorable experiences.", requirements: ["Excellent public speaking", "Knowledge of local history", "Customer service skills", "Multi-lingual a plus"], tags: ["Storytelling", "History", "Customer Service"] },
            "tt5": { title: "Destination Marketing Manager", company: "Tourism Board", location: "Abuja, Nigeria", salary: "₦9-13M/year", type: "Full-time", description: "Develop and execute marketing campaigns to promote tourism destinations in Nigeria.", requirements: ["5+ years marketing experience", "Digital marketing expertise", "Campaign management", "Budget management"], tags: ["Marketing", "Brand Strategy", "Campaign Management"] },
            "tt6": { title: "Visa Processing Officer", company: "Travel Agency", location: "Lagos, Nigeria", salary: "₦4-6M/year", type: "Full-time", description: "Process visa applications, ensure compliance with embassy requirements, and maintain records.", requirements: ["Attention to detail", "Knowledge of visa processes", "Customer service", "Organizational skills"], tags: ["Visa Applications", "Documentation", "Customer Service"] },
            "tt7": { title: "Corporate Travel Manager", company: "Business Travel Solutions", location: "Lagos, Nigeria", salary: "₦8-12M/year", type: "Full-time", description: "Manage corporate travel accounts, negotiate with vendors, and optimize travel programs.", requirements: ["5+ years corporate travel", "Negotiation skills", "Client management", "Analytical skills"], tags: ["Corporate Travel", "Negotiation", "Client Relations"] },
            "tt8": { title: "Airline Customer Service Agent", company: "National Carrier", location: "Lagos, Nigeria", salary: "₦3-5M/year", type: "Full-time", description: "Assist passengers with check-in, boarding, and flight inquiries.", requirements: ["Customer service experience", "Communication skills", "Problem-solving", "Flexible schedule"], tags: ["Check-in", "Boarding", "Customer Service"] },
            "tt9": { title: "Eco-Tourism Coordinator", company: "Nature Reserves", location: "Port Harcourt, Nigeria", salary: "₦5-7M/year", type: "Full-time", description: "Develop and coordinate eco-tourism programs and conservation efforts.", requirements: ["Environmental science background", "Tour planning", "Community engagement", "Passion for nature"], tags: ["Conservation", "Tour Planning", "Community Engagement"] },
            "tt10": { title: "Travel Sales Executive", company: "Holiday Planners", location: "Abuja, Nigeria", salary: "₦4-7M/year", type: "Full-time", description: "Sell travel packages and meet sales targets.", requirements: ["Sales experience", "Target-driven", "Communication skills", "Travel knowledge"], tags: ["Sales", "Client Acquisition", "Package Selling"] },
            
            // ===== HOTELS & RESORTS JOBS (hr1 to hr12) =====
            "hr1": { title: "General Manager", company: "Luxury Beach Resort", location: "Lagos, Nigeria", salary: "₦18-25M/year", type: "Full-time", description: "Lead all resort operations including rooms, F&B, and guest services.", requirements: ["10+ years hotel management", "P&L responsibility", "Luxury experience", "Strong leadership"], tags: ["Leadership", "Operations", "Luxury Hospitality"] },
            "hr2": { title: "Director of Rooms", company: "5-Star Hotel Chain", location: "Abuja, Nigeria", salary: "₦15-20M/year", type: "Full-time", description: "Oversee front office, housekeeping, and guest relations departments.", requirements: ["8+ years rooms division", "Guest service excellence", "Team leadership", "Budget management"], tags: ["Rooms Division", "Guest Experience", "Management"] },
            "hr3": { title: "Front Office Manager", company: "Business Hotel", location: "Lagos, Nigeria", salary: "₦8-12M/year", type: "Full-time", description: "Manage front desk operations and guest relations.", requirements: ["5+ years front office experience", "Customer service excellence", "Team management", "Reservation systems"], tags: ["Front Desk", "Guest Relations", "Team Leadership"] },
            
            // ===== CULINARY JOBS (c1 to c24) =====
            "c1": { title: "Executive Chef", company: "5-Star Luxury Hotel", location: "Lagos, Nigeria", salary: "₦18-25M/year", type: "Full-time", description: "Lead culinary operations across multiple outlets, develop menus, and manage kitchen team.", requirements: ["10+ years culinary experience", "5+ years executive chef role", "Menu development expertise", "Budget management"], tags: ["Menu Development", "Kitchen Management", "Team Leadership"] },
            "c2": { title: "Pastry Chef", company: "Fine Dining Restaurant", location: "Lagos, Nigeria", salary: "₦8-12M/year", type: "Full-time", description: "Create exceptional desserts and lead pastry section.", requirements: ["5+ years pastry experience", "Creativity", "Attention to detail", "Team player"], tags: ["Pastry", "Dessert Creation", "Baking"] },
            "c3": { title: "Sous Chef", company: "Beach Resort", location: "Lagos, Nigeria", salary: "₦10-14M/year", type: "Full-time", description: "Assist Executive Chef in kitchen operations and team management.", requirements: ["7+ years kitchen experience", "Leadership skills", "Food safety knowledge", "Team player"], tags: ["Kitchen Operations", "Staff Training", "Quality Control"] },
            
            // ===== RESTAURANTS JOBS (r1 to r15) =====
            "r1": { title: "Executive Chef", company: "Fine Dining Restaurant", location: "Lagos, Nigeria", salary: "₦15-20M/year", type: "Full-time", description: "Lead kitchen operations and menu development.", requirements: ["10+ years culinary experience", "Fine dining background", "Creative menu development", "Team leadership"], tags: ["Fine Dining", "Menu Development", "Kitchen Management"] },
            "r2": { title: "Restaurant General Manager", company: "Casual Dining Chain", location: "Abuja, Nigeria", salary: "₦12-16M/year", type: "Full-time", description: "Oversee restaurant operations and team.", requirements: ["7+ years restaurant management", "P&L experience", "Customer focus", "Staff development"], tags: ["Operations", "P&L Management", "Team Leadership"] },
            "r3": { title: "Sous Chef", company: "Mediterranean Restaurant", location: "Lagos, Nigeria", salary: "₦8-11M/year", type: "Full-time", description: "Support Executive Chef in daily operations.", requirements: ["5+ years kitchen experience", "Mediterranean cuisine knowledge", "Team player", "Food safety certified"], tags: ["Food Prep", "Kitchen Leadership", "Quality Control"] },
            
            // ===== EVENTS & CATERING JOBS (ec1 to ec18) =====
            "ec1": { title: "Event Planning Director", company: "Luxury Event Company", location: "Lagos, Nigeria", salary: "₦14-20M/year", type: "Full-time", description: "Lead event planning team and oversee major events.", requirements: ["10+ years event planning", "Team leadership", "Client management", "Budget expertise"], tags: ["Event Strategy", "Client Relations", "Team Leadership"] },
            "ec2": { title: "Catering Manager", company: "Premium Catering Services", location: "Abuja, Nigeria", salary: "₦10-14M/year", type: "Full-time", description: "Manage catering operations and client relationships.", requirements: ["5+ years catering experience", "Menu planning", "Budget management", "Team leadership"], tags: ["Catering Operations", "Menu Planning", "Budget Management"] },
            
            // ===== MANAGEMENT JOBS (m1 to m24) =====
            "m1": { title: "Chief Operating Officer (COO)", company: "Luxury Hotel Group", location: "Lagos, Nigeria", salary: "₦35-50M/year", type: "Full-time", description: "Lead operations across multiple properties.", requirements: ["15+ years hospitality leadership", "Strategic planning", "P&L expertise", "Board experience"], tags: ["Strategic Planning", "Operations Excellence", "P&L Management"] },
            "m6": { title: "Director of Food & Beverage", company: "Luxury Hotel", location: "Lagos, Nigeria", salary: "₦14-20M/year", type: "Full-time", description: "Oversee all F&B operations across multiple outlets.", requirements: ["10+ years F&B management", "Multi-outlet experience", "Cost control", "Team development"], tags: ["F&B Operations", "Menu Engineering", "Cost Control"] }
        };
        
        // Also create a title-based lookup for when ID is not found
        function findJobByTitle(title) {
            if (!title) return null;
            // Decode URL encoded title
            const decodedTitle = decodeURIComponent(title).toLowerCase();
            for (const [id, job] of Object.entries(allJobs)) {
                if (job.title.toLowerCase() === decodedTitle) {
                    return { id, ...job };
                }
            }
            return null;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        function renderJob(job, id) {
            const container = document.getElementById('jobContent');
            container.innerHTML = `
                <div class="job-card-large">
                    <div class="job-header">
                        <div>
                            <h1 class="job-title">${escapeHtml(job.title)}</h1>
                            <div class="job-company"><i class="fas fa-building"></i> ${escapeHtml(job.company)}</div>
                            <div class="job-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location)}</div>
                            <div class="job-type"><i class="fas fa-briefcase"></i> ${escapeHtml(job.type)}</div>
                            <div class="job-salary"><i class="fas fa-money-bill-wave"></i> ${escapeHtml(job.salary)}</div>
                            <div class="job-tags">${(job.tags || []).map(tag => `<span class="job-tag">${escapeHtml(tag)}</span>`).join('')}</div>
                        </div>
                        <div>
                            <button class="apply-btn" onclick="applyForJob('${escapeHtml(job.title)}')"><i class="fas fa-paper-plane"></i> Apply Now</button>
                        </div>
                    </div>
                    
                    <div class="job-section">
                        <h3>Job Description</h3>
                        <p>${escapeHtml(job.description || 'No description provided.')}</p>
                    </div>
                    
                    <div class="job-section">
                        <h3>Requirements</h3>
                        <ul>${(job.requirements || ['Send your CV to jobpitality@gmail.com']).map(req => `<li>${escapeHtml(req)}</li>`).join('')}</ul>
                    </div>
                    
                    <div class="job-section">
                        <h3>How to Apply</h3>
                        <p>Click the "Apply Now" button above or send your CV and cover letter to <strong>jobpitality@gmail.com</strong>. Please include the job title in the subject line.</p>
                        <p style="margin-top: 1rem;">You can also call us at <strong>+234 812 770 6378</strong> for more information.</p>
                    </div>
                </div>
            `;
        }
        
        function showNotFound(searchedId, searchedTitle) {
            document.getElementById('jobContent').innerHTML = `
                <div class="job-card-large" style="text-align: center;">
                    <i class="fas fa-search" style="font-size: 4rem; color: #a0aec0; margin-bottom: 1rem;"></i>
                    <h2>Job Not Found</h2>
                    <p>We couldn't find the job you're looking for.</p>
                    <p style="margin-top: 0.5rem; font-size: 0.875rem; color: #a0aec0;">Searched for: ${escapeHtml(searchedId || searchedTitle || 'Unknown')}</p>
                    <p style="margin-top: 1rem;">Browse our <a href="/categories/travel-tourism/" style="color: #ff9e00;">current openings</a> or contact us at <strong>acquire@jobpitality.com</strong>.</p>
                    <a href="/" class="back-link" style="margin-top: 1rem; display: inline-block;">← Back to Home</a>
                </div>
            `;
        }
        
        function applyForJob(jobTitle) {
            const message = `How to apply for ${jobTitle}:\n\n📧 Email your CV to: jobpitality@gmail.com\n📞 Call us: +234 803 966 1354\n💬 WhatsApp: wa.me/2348127706378\n\nPlease mention the job title in your application.`;
            alert(message);
        }
        
        // Load the job
        function loadJob() {
            console.log("Looking for job with ID:", jobId, "Title:", jobTitle);
            
            let job = null;
            
            // First try to find by ID
            if (jobId && allJobs[jobId]) {
                job = allJobs[jobId];
                console.log("Found job by ID:", job.title);
            }
            // Then try to find by title
            else if (jobTitle) {
                job = findJobByTitle(jobTitle);
                if (job) console.log("Found job by title:", job.title);
            }
            // Finally, if we have a partial match, try to find any job with similar title
            else if (jobId && jobId.length > 3) {
                // Try to find by partial match in keys
                for (const [key, value] of Object.entries(allJobs)) {
                    if (jobId.toLowerCase().includes(key.toLowerCase()) || key.toLowerCase().includes(jobId.toLowerCase())) {
                        job = value;
                        console.log("Found job by partial key match:", job.title);
                        break;
                    }
                }
            }
            
            if (job) {
                renderJob(job, jobId);
            } else {
                showNotFound(jobId, jobTitle);
            }
        }
        
        // Mobile menu
        function initMobileMenu() {
            const toggle = document.getElementById('mobileMenuToggle');
            const nav = document.getElementById('mainNav');
            const overlay = document.getElementById('mobileOverlay');
            if (!toggle || !nav) return;
            toggle.addEventListener('click', () => {
                nav.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
            });
            if (overlay) {
                overlay.addEventListener('click', () => {
                    nav.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = 'auto';
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadJob();
            initMobileMenu();
        });
        
        window.applyForJob = applyForJob;
    </script>
</body>
</html>
