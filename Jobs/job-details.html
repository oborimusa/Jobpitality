<!doctype html>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f7fafc; color: #0d1b2a; line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        
        /* Header */
        .site-header { background: white; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; padding: 0.75rem 0; border-bottom: 3px solid #ff9e00; }
        .header-container { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .logo h1 { font-size: 1.5rem; font-weight: 900; display: flex; align-items: center; gap: 0.5rem; }
        @media (min-width: 768px) { .logo h1 { font-size: 2.1rem; } }
        .logo h1 .brand-name { background: linear-gradient(90deg, #0d1b2a 0%, #ff9e00 100%); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .mobile-menu-toggle { display: none; background: #ff9e00; border: none; width: 44px; height: 44px; border-radius: 8px; cursor: pointer; }
        @media (max-width: 1023px) { .mobile-menu-toggle { display: flex; align-items: center; justify-content: center; } }
        .main-nav { display: flex; align-items: center; }
        @media (max-width: 1023px) {
            .main-nav { position: fixed; top: 0; right: -100%; width: 85%; max-width: 400px; height: 100vh; background: white; flex-direction: column; padding: 80px 20px 30px; transition: right 0.3s ease; z-index: 1001; gap: 1rem; }
            .main-nav.active { right: 0; }
        }
        .nav-menu { display: flex; list-style: none; gap: 1rem; }
        @media (max-width: 1023px) { .nav-menu { flex-direction: column; width: 100%; } }
        .nav-link { text-decoration: none; color: #415a77; font-weight: 600; padding: 0.5rem; }
        .nav-link:hover { color: #ff9e00; }
        .nav-cta { background: #0d1b2a; color: white !important; padding: 0.6rem 1.2rem; border-radius: 12px; text-decoration: none; font-weight: 700; }
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13,27,42,0.7); z-index: 999; }
        .mobile-overlay.active { display: block; }
        
        /* Job Details */
        .job-details { padding: 3rem 0; }
        .back-link { display: inline-flex; align-items: center; gap: 0.5rem; color: #ff9e00; text-decoration: none; margin-bottom: 1.5rem; }
        .job-card-large { background: white; border-radius: 24px; padding: 2rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .job-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
        .job-title { font-size: 2rem; font-weight: 800; color: #0d1b2a; margin-bottom: 0.5rem; }
        .job-company { font-size: 1.125rem; color: #415a77; margin-bottom: 0.5rem; }
        .job-location, .job-type, .job-salary { display: flex; align-items: center; gap: 0.5rem; color: #415a77; margin-bottom: 0.5rem; }
        .apply-btn { background: #ff9e00; color: #0d1b2a; padding: 1rem 2rem; border: none; border-radius: 50px; font-weight: 700; cursor: pointer; transition: all 0.3s; }
        .apply-btn:hover { background: #cc7e00; transform: translateY(-2px); }
        .job-section { margin-top: 2rem; padding-top: 2rem; border-top: 1px solid #e2e8f0; }
        .job-section h3 { font-size: 1.25rem; margin-bottom: 1rem; color: #0d1b2a; }
        .job-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; }
        .job-tag { background: #f7fafc; padding: 0.25rem 0.75rem; border-radius: 50px; font-size: 0.75rem; color: #415a77; }
        
        .footer { background: #0d1b2a; color: white; padding: 2rem 0; margin-top: 2rem; text-align: center; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; z-index: 1000; text-decoration: none; }
        
        @media (max-width: 768px) {
            .job-title { font-size: 1.5rem; }
            .job-card-large { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="header-container">
                <div class="logo"><a href="/" style="text-decoration: none;"><h1><i class="fas fa-bolt"></i> <span class="brand-name">JOBPITALITY</span></h1></a></div>
                <button class="mobile-menu-toggle" id="mobileMenuToggle"><i class="fas fa-bars"></i></button>
                <nav class="main-nav" id="mainNav">
                    <ul class="nav-menu">
                        <li><a href="/" class="nav-link">Home</a></li>
                        <li><a href="/categories/hotels-resorts/" class="nav-link">Jobs</a></li>
                        <li><a href="/about/" class="nav-link">About</a></li>
                        <li><a href="/contact/" class="nav-link">Contact</a></li>
                    </ul>
                    <a href="tel:+2348039661354" class="nav-cta"><i class="fas fa-phone"></i> +234 803 966 1354</a>
                </nav>
                <div class="mobile-overlay" id="mobileOverlay"></div>
            </div>
        </div>
    </header>

    <section class="job-details">
        <div class="container">
            <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Back to Jobs</a>
            
            <div id="jobContent">
                <div style="text-align: center; padding: 3rem;">
                    <div class="spinner" style="width: 40px; height: 40px; border: 3px solid #e2e8f0; border-top-color: #ff9e00; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem;"></div>
                    <p>Loading job details...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Jobpitality. All rights reserved.</p>
        </div>
    </footer>

    <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid rgba(0,0,0,0.1); border-radius: 50%; border-top-color: #ff9e00; animation: spin 0.8s linear infinite; }
    </style>

    <script>
        // Get job ID from URL (e.g., /jobs/0RT7AK8OiPtKjM8oePq8.html)
        const pathParts = window.location.pathname.split('/');
        const jobId = pathParts[pathParts.length - 1].replace('.html', '');
        
        // Demo job data (in production, fetch from Firebase)
        const demoJobs = {
            "1": { title: "Executive Chef", company: "Luxury Hotel Group", location: "Lagos, Nigeria", salary: "₦12-18M/year", type: "Full-time", description: "We are seeking an experienced Executive Chef to lead our culinary team at a prestigious luxury hotel. The ideal candidate will have extensive fine dining experience, menu development skills, and strong leadership abilities.", requirements: ["10+ years culinary experience", "5+ years in leadership role", "Formal culinary training", "Menu development expertise", "Budget management skills"], benefits: ["Health insurance", "Accommodation allowance", "Performance bonus", "Professional development"], tags: ["Fine Dining", "Leadership", "Menu Development"] },
            "2": { title: "F&B Director", company: "Resort Chain", location: "Abuja, Nigeria", salary: "₦10-15M/year", type: "Full-time", description: "Join our growing resort chain as Food & Beverage Director. You'll oversee all F&B operations across multiple properties.", requirements: ["8+ years F&B management", "Multi-unit experience", "P&L management", "Vendor relations"], benefits: ["Health insurance", "Travel allowance", "Bonus structure"], tags: ["Beverage", "Operations", "Cost Control"] }
        };
        
        // Get job from Firebase or demo data
        async function loadJob() {
            try {
                // Try Firebase first
                if (typeof firebase !== 'undefined' && firebase.apps.length) {
                    const db = firebase.firestore();
                    const doc = await db.collection('jobs').doc(jobId).get();
                    if (doc.exists) {
                        renderJob(doc.data(), jobId);
                        return;
                    }
                }
                // Fallback to demo data
                if (demoJobs[jobId]) {
                    renderJob(demoJobs[jobId], jobId);
                } else {
                    showNotFound();
                }
            } catch (error) {
                console.error('Error loading job:', error);
                if (demoJobs[jobId]) {
                    renderJob(demoJobs[jobId], jobId);
                } else {
                    showNotFound();
                }
            }
        }
        
        function renderJob(job, id) {
            const container = document.getElementById('jobContent');
            container.innerHTML = `
                <div class="job-card-large">
                    <div class="job-header">
                        <div>
                            <h1 class="job-title">${escapeHtml(job.title)}</h1>
                            <div class="job-company"><i class="fas fa-building"></i> ${escapeHtml(job.company)}</div>
                            <div class="job-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(job.location)}</div>
                            <div class="job-type"><i class="fas fa-briefcase"></i> ${escapeHtml(job.type)}</div>
                            <div class="job-salary"><i class="fas fa-money-bill-wave"></i> ${escapeHtml(job.salary)}</div>
                            <div class="job-tags">${(job.tags || []).map(tag => `<span class="job-tag">${escapeHtml(tag)}</span>`).join('')}</div>
                        </div>
                        <div>
                            <button class="apply-btn" onclick="applyForJob()"><i class="fas fa-paper-plane"></i> Apply Now</button>
                        </div>
                    </div>
                    
                    <div class="job-section">
                        <h3>Job Description</h3>
                        <p>${escapeHtml(job.description || 'No description provided.')}</p>
                    </div>
                    
                    <div class="job-section">
                        <h3>Requirements</h3>
                        <ul>${(job.requirements || ['No specific requirements listed.']).map(req => `<li>${escapeHtml(req)}</li>`).join('')}</ul>
                    </div>
                    
                    ${job.benefits ? `
                    <div class="job-section">
                        <h3>Benefits</h3>
                        <ul>${job.benefits.map(b => `<li>${escapeHtml(b)}</li>`).join('')}</ul>
                    </div>
                    ` : ''}
                    
                    <div class="job-section">
                        <h3>How to Apply</h3>
                        <p>Click the "Apply Now" button above to submit your application. Our recruitment team will review your profile and contact you within 3-5 business days.</p>
                    </div>
                </div>
            `;
        }
        
        function showNotFound() {
            document.getElementById('jobContent').innerHTML = `
                <div class="job-card-large" style="text-align: center;">
                    <i class="fas fa-search" style="font-size: 4rem; color: #a0aec0; margin-bottom: 1rem;"></i>
                    <h2>Job Not Found</h2>
                    <p>The job you're looking for doesn't exist or has been removed.</p>
                    <a href="/" class="back-link" style="margin-top: 1rem; display: inline-block;">← Back to Jobs</a>
                </div>
            `;
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }
        
        function applyForJob() {
            alert('Application feature coming soon! Please email your CV to acquire@jobpitality.com');
        }
        
        // Mobile menu
        function initMobileMenu() {
            const toggle = document.getElementById('mobileMenuToggle');
            const nav = document.getElementById('mainNav');
            const overlay = document.getElementById('mobileOverlay');
            if (!toggle || !nav) return;
            toggle.addEventListener('click', () => {
                nav.classList.toggle('active');
                overlay.classList.toggle('active');
                document.body.style.overflow = nav.classList.contains('active') ? 'hidden' : 'auto';
            });
            if (overlay) {
                overlay.addEventListener('click', () => {
                    nav.classList.remove('active');
                    overlay.classList.remove('active');
                    document.body.style.overflow = 'auto';
                });
            }
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            loadJob();
            initMobileMenu();
        });
    </script>

    </script>
</body>
