<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employer Dashboard – Jobspitality</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5" id="mainContent">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3 id="employerInfo">Loading...</h3>
    <button class="btn btn-danger" id="logoutBtn">Logout</button>
  </div>

  <form id="jobForm">
    <div class="mb-3">
      <input type="text" id="jobTitle" class="form-control" placeholder="Job Title" required />
    </div>
    <div class="mb-3">
      <textarea id="jobDescription" class="form-control" placeholder="Job Description" required></textarea>
    </div>
    <div class="mb-3">
      <input type="text" id="jobLocation" class="form-control" placeholder="Job Location" required />
    </div>
    <button type="submit" class="btn btn-primary">Post Job</button>
  </form>

  <hr>

  <h4>My Posted Jobs</h4>
  <div class="table-responsive">
    <table class="table table-bordered">
      <thead>
        <tr>
          <th>Title</th>
          <th>Description</th>
          <th>Location</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="jobsTableBody"></tbody>
    </table>
  </div>
</div>

<div id="spinner" class="text-center my-5" style="display: none;">
  <div class="spinner-border text-primary"></div>
  <p class="mt-2">Loading...</p>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.10.0/firebase-firestore-compat.js"></script>

<script>
  const firebaseConfig = {
  apiKey: "AIzaSyBxeiG78oHv8wSLGRK_GAAD_mqvZKJtu30",
  authDomain: "jobpitality-1cfb2.firebaseapp.com",
  projectId: "jobpitality-1cfb2",
  storageBucket: "jobpitality-1cfb2.firebasestorage.app",
  messagingSenderId: "185191165097",
  appId: "1:185191165097:web:e0aeab622e8d89ef9a8db8",
  measurementId: "G-SF5LWDZDKF"
};




  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  auth.onAuthStateChanged(async (user) => {
    if (!user) {
      window.location.href = "login.html";
      return;
    }

    console.log("User UID:", user.uid); // Safe to log now

    try {
      const doc = await db.collection("users").doc(user.uid).get();

      if (!doc.exists) {
        alert("⛔ Access Denied. No user data found.");
        await auth.signOut();
        window.location.href = "login.html";
        return;
      }

      const userData = doc.data();
      if (userData.role !== "employer" && userData.role !== "superadmin") {
        alert("⛔ Access Denied. Employers and Superadmin only.");
        await auth.signOut();
        window.location.href = "login.html";
        return;
      }

      // ✅ Set user info in UI
      document.getElementById("employerInfo").textContent =
        `Welcome, ${userData.fullName || user.email}`;

      // ✅ Load jobs for this UID
      loadJobs(user.uid);

    } catch (error) {
      console.error("Auth Error:", error);
      alert("Error fetching user data.");
      await auth.signOut();
      window.location.href = "login.html";
    }
  });

  function loadJobs(uid) {
    const jobsTableBody = document.getElementById('jobsTableBody');
    jobsTableBody.innerHTML = '';

    db.collection('jobs')
      .where('postedBy', '==', uid)
      .orderBy('createdAt', 'desc')
      .get()
      .then(snapshot => {
        snapshot.forEach(doc => {
          const job = doc.data();
          const row = `<tr>
            <td>${job.title}</td>
            <td>${job.description.substring(0, 50)}...</td>
            <td>${job.location}</td>
            <td>${job.createdAt ? job.createdAt.toDate().toLocaleDateString() : ''}</td>
          </tr>`;
          jobsTableBody.innerHTML += row;
        });
        hideSpinner();
      })
      .catch(error => {
        console.error('Error loading jobs:', error);
        alert('Failed to load jobs: ' + error.message);
        hideSpinner();
      });
  }

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
